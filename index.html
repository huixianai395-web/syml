
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Noctis</title>
  <style>
    :root{
      --bg:#090f1c; --bg2:#121a2c; --bg3:#1a2440; --bd:#2a3655;
      --tx:#e9e1d5; --tx2:#9da8c2; --tx3:#6f7a97;
      --ac1:#b7926d; --ac2:#d9b98b; --ok:#61b37e; --err:#ce6f8d;
      --shadow:0 10px 30px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{
      display:flex;flex-direction:column;
      background:
      radial-gradient(1200px 500px at 20% -10%, rgba(217,185,139,.08), transparent 45%),
      radial-gradient(800px 400px at 100% 0%, rgba(122,162,247,.08), transparent 55%),
      var(--bg);
      color:var(--tx);
      font-family:-apple-system,BlinkMacSystemFont,PingFang SC,Microsoft YaHei,sans-serif;
    }

    .hd{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 12px;background:rgba(18,26,44,.85);backdrop-filter: blur(8px);
      border-bottom:1px solid var(--bd);
    }
    .hdL{display:flex;align-items:center;gap:10px;min-width:0}
    .icon{
      width:32px;height:32px;border:1px solid var(--bd);border-radius:10px;
      background:var(--bg3);color:var(--tx2);font-weight:700
    }
    .av{
      width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#13161d;font-weight:800;overflow:hidden;flex-shrink:0
    }
    .av img{width:100%;height:100%;object-fit:cover}
    .nm{font-size:15px;font-weight:700}
    .sub{font-size:11px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
    .st{font-size:11px;color:var(--ok)} .st.off{color:var(--tx3)}

    .main{flex:1;overflow:hidden;position:relative}
    .page{height:100%;overflow:auto;display:none}
    .page.active{display:block}

    .inboxWrap{padding:12px}
    .inboxHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .inboxTitle{font-size:22px;font-weight:800}
    .inboxSub{font-size:12px;color:var(--tx3)}
    .sessionList{display:flex;flex-direction:column;gap:10px}
    .sessionItem{
      background:rgba(26,36,64,.78);
      border:1px solid var(--bd);
      border-radius:14px;
      padding:10px;
      display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);
    }
    .sessionAvatar{
      width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));
      display:grid;place-items:center;color:#111;font-weight:800
    }
    .sessionAvatar img{width:100%;height:100%;object-fit:cover}
    .sessionMid{flex:1;min-width:0}
    .sessionName{font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sessionLast{font-size:13px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .sessionTime{font-size:12px;color:var(--tx3);margin-left:6px;flex-shrink:0}
    .dotBtn{border:none;background:transparent;color:var(--tx3);font-size:20px;padding:0 4px}

    .chatWrap{height:100%;display:flex;flex-direction:column}
    .chat{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .welcome{
      margin:auto;background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
      padding:14px 12px;color:var(--tx2);font-size:13px;line-height:1.7;max-width:92%; box-shadow:var(--shadow);
    }

    .line{display:flex;gap:8px;align-items:flex-end}
    .line.me{justify-content:flex-end}
    .msgAv{
      width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;
      display:grid;place-items:center;background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-size:11px;font-weight:700
    }
    .msgAv img{width:100%;height:100%;object-fit:cover}
    .msg{
      max-width:78%;padding:10px 12px;border-radius:14px;font-size:14px;line-height:1.6;word-break:break-word;
      box-shadow:0 6px 18px rgba(0,0,0,.18); animation:pop .18s ease-out;
    }
    .msg.imgMsg{padding:6px 6px 4px}
    .msg.stickerMsg{
      padding:4px 4px 2px !important;
      background:transparent !important;
      border:none !important;
      box-shadow:none !important;
    }
    .msg.stickerMsg .tm{margin-top:2px;text-align:right;opacity:.55}
    @keyframes pop{from{opacity:.2;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
    .ai{background:var(--bg3);border:1px solid var(--bd);border-bottom-left-radius:4px}
    .meBubble{background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;border-bottom-right-radius:4px}
    .tm{font-size:10px;opacity:.6;margin-top:4px}
    .chatImg{
      max-width:min(48vw,180px);
      max-height:180px;
      border-radius:12px;
      display:block;
      border:1px solid rgba(255,255,255,.15);
      object-fit:cover;
    }
    .msg.stickerMsg .chatImg{
      width:108px;
      max-width:108px;
      max-height:108px;
      border:none;
      border-radius:10px;
      object-fit:contain;
      background:transparent;
    }

    .typ{align-self:flex-start;background:var(--bg3);border:1px solid var(--bd);border-radius:14px;padding:10px 12px}
    .typ i{display:inline-block;width:5px;height:5px;margin-right:4px;background:var(--tx2);border-radius:50%;animation:b 1.1s infinite}
    .typ i:nth-child(2){animation-delay:.2s}.typ i:nth-child(3){animation-delay:.4s}
    @keyframes b{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
    .cur{display:inline-block;animation:blink .8s step-end infinite}
    @keyframes blink{50%{opacity:0}}

    .md h1,.md h2,.md h3{margin:.2em 0 .35em 0;line-height:1.35}
    .md h1{font-size:1.12em}.md h2{font-size:1.07em}.md h3{font-size:1.02em}
    .md ul{padding-left:1.2em;margin:.28em 0}
    .md li{margin:.18em 0}
    .md code{padding:1px 6px;border-radius:6px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.12);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.92em}
    .md pre{margin:.42em 0;overflow:auto;border:1px solid rgba(255,255,255,.12);background:#0b1220;border-radius:10px;padding:10px}
    .md pre code{padding:0;border:none;background:none}
    .md a{color:#8fb4ff;text-decoration:none}

    .inputBar{display:flex;flex-direction:column;gap:8px;padding:10px;background:rgba(18,26,44,.9);border-top:1px solid var(--bd)}
    .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .toolBtn{
      min-width:44px;height:34px;padding:0 10px;border:1px solid var(--bd);border-radius:10px;background:var(--bg3);color:var(--tx2);font-size:12px
    }
    .sendRow{display:flex;gap:8px;align-items:flex-end}
    #inp{
      flex:1;resize:none;max-height:120px;min-height:40px;border:1px solid var(--bd);border-radius:20px;
      background:var(--bg3);color:var(--tx);padding:10px 14px;font-size:14px;outline:none
    }
    #sendBtn{
      width:40px;height:40px;border:none;border-radius:50%;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700
    }
    #sendBtn:disabled{opacity:.35}

  .panelDock{
  position:fixed;
  left:0;right:0;
  bottom:calc(58px + env(safe-area-inset-bottom));
  height:38vh;max-height:320px;
  background:rgba(18,26,44,.98);
  border-top:1px solid var(--bd);
  border-top-left-radius:14px;border-top-right-radius:14px;
  transform:translateY(calc(100% + 20px)); /* 彻底藏到屏幕外 */
  transition:.22s ease;
  z-index:50;
  display:flex;flex-direction:column;
  box-shadow:0 -10px 30px rgba(0,0,0,.35);
  pointer-events:none; /* 隐藏时不挡点击 */
}
.panelDock.show{
  transform:translateY(0);
  pointer-events:auto;
}
    .panelDock.show{transform:translateY(0)}
    .panelHd{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--bd)}
    .panelT{font-size:13px;font-weight:700}
    .panelBody{flex:1;overflow:auto;padding:8px}
    .emojiPanel{display:none;gap:6px;flex-wrap:wrap}
    .emojiPanel.show{display:flex}
    .emoji{width:34px;height:34px;border:none;background:#111a2d;border:1px solid var(--bd);border-radius:8px;color:#fff;font-size:18px;line-height:1}
    .stickerBtn{
      width:62px;height:62px;border:1px solid var(--bd);border-radius:10px;background:#111a2d;padding:0;overflow:hidden;position:relative
    }
    .stickerBtn img{width:100%;height:100%;object-fit:cover;display:block}
    .stickerName{
      position:absolute;left:0;right:0;bottom:0;font-size:10px;line-height:1.3;background:rgba(0,0,0,.45);color:#fff;
      padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .stickerEmpty{font-size:12px;color:var(--tx3)}

    .wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
    .card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:12px;box-shadow:var(--shadow);}
    .ct{font-size:14px;font-weight:700;margin-bottom:10px}
    .f{margin-bottom:10px}
    .fl{font-size:11px;color:var(--tx2);margin-bottom:5px}
    .fi,.fs,.ta{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;color:var(--tx);padding:10px 12px;font-size:13px;outline:none}
    .ta{min-height:90px;resize:vertical;line-height:1.6}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .row .f{flex:1;min-width:140px}
    .btn{padding:10px 12px;border:none;border-radius:10px;font-size:13px;font-weight:700;color:#111;background:linear-gradient(135deg,var(--ac1),var(--ac2))}
    .btn2{padding:10px 12px;border:1px solid var(--bd);border-radius:10px;font-size:13px;color:var(--tx);background:var(--bg3);font-weight:600}
    .btnDanger{border:1px solid #6d3649;color:#f3b4c4;background:transparent}
    .mini,.note{font-size:11px;color:var(--tx3)}

    .list{display:flex;flex-direction:column;gap:8px}
    .roleItem{border:1px solid var(--bd);border-radius:12px;background:var(--bg3);padding:10px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .roleItem.active{border-color:var(--ac2);box-shadow:0 0 0 1px rgba(217,185,139,.22) inset}
    .roleL{display:flex;gap:8px;align-items:center;min-width:0}
    .rAv{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700;overflow:hidden;flex-shrink:0}
    .rAv img{width:100%;height:100%;object-fit:cover}
    .rName{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rSub{font-size:11px;color:var(--tx2)}

    .preview{width:44px;height:44px;border-radius:50%;border:1px solid var(--bd);overflow:hidden;display:grid;place-items:center;background:var(--bg3);color:var(--tx2);font-size:12px}
    .preview img{width:100%;height:100%;object-fit:cover}

    .tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:8px 10px;border-top:1px solid var(--bd);background:rgba(18,26,44,.9)}
    .tab{border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);border-radius:10px;padding:9px 6px;font-size:12px;font-weight:700}
    .tab.active{color:#111;border-color:transparent;background:linear-gradient(135deg,var(--ac1),var(--ac2))}

    .toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:#222d44;border:1px solid var(--bd);padding:7px 14px;border-radius:16px;font-size:12px;z-index:99}
    .lockMask{position:fixed;inset:0;background:rgba(7,10,18,.88);backdrop-filter: blur(4px);display:none;align-items:center;justify-content:center;z-index:9999}
    .lockMask.show{display:flex}
    .lockCard{width:min(92vw,420px);background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:16px;box-shadow:var(--shadow);text-align:center}
    .lockTitle{font-size:16px;font-weight:700;margin-bottom:8px}
    .lockSub{font-size:12px;color:var(--tx2);margin-bottom:12px}
    .switchRow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  </style>
</head>
<body>
  <div class="hd">
    <div class="hdL">
      <button class="icon" onclick="goBack()">←</button>
      <div class="av" id="topAv">N</div>
      <div style="min-width:0">
        <div class="nm">Noctis</div>
        <div class="sub" id="topRole">当前角色：未选择</div>
      </div>
    </div>
    <div id="status" class="st off">未配置</div>
  </div>

  <div class="main">
    <section id="page-inbox" class="page active">
      <div class="inboxWrap">
        <div class="inboxHead"><div><div class="inboxTitle">聊天</div><div class="inboxSub">我的联系人</div></div></div>
        <div id="sessionList" class="sessionList"></div>
      </div>
    </section>

    <section id="page-chat" class="page">
      <div class="chatWrap">
        <div id="chat" class="chat"></div>
        <div class="inputBar">
          <div class="tools">
            <button class="toolBtn" onclick="openImagePick()">相册</button>
            <button class="toolBtn" onclick="openStickerPicker()">入库</button>
            <button class="toolBtn" onclick="toggleDock('emoji')">表情</button>
            <button class="toolBtn" onclick="toggleDock('sticker')">贴纸</button>
            <button class="toolBtn" onclick="openStickerImportModal()">导入</button>
            <input id="imgPick" type="file" accept="image/*" style="display:none" onchange="pickImage(event)" />
            <input id="stickerPick" type="file" accept="image/*" multiple style="display:none" onchange="pickSticker(event)" />
          </div>
          <div class="sendRow">
            <textarea id="inp" rows="1" placeholder="说点什么……" oninput="autoGrow(this)" onkeydown="hotKey(event)"></textarea>
            <button id="sendBtn" onclick="send()">↑</button>
          </div>
        </div>
      </div>
    </section>

    <section id="page-roles" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">角色列表</div>
          <div id="roleList" class="list"></div>
          <div class="mini" style="margin-top:8px">切换角色会切换对应聊天记录。</div>
        </div>
        <div class="card">
          <div class="ct">新建 / 编辑角色</div>
          <input type="hidden" id="rId" /><input type="hidden" id="rAvatarImg" />
          <div class="row">
            <div class="f"><div class="fl">角色名</div><input id="rName" class="fi" /></div>
            <div class="f"><div class="fl">头像字</div><input id="rAvatar" class="fi" maxlength="2" /></div>
          </div>
          <div class="f">
            <div class="fl">角色头像（上传）</div>
            <div class="row" style="align-items:center">
              <div id="rPreview" class="preview">无图</div>
              <input id="rAvatarFile" type="file" accept="image/*" class="fi" onchange="onRoleAvatarPick(event)" />
              <button class="btn2" type="button" onclick="clearRoleAvatar()">清空头像</button>
            </div>
          </div>
          <div class="f"><div class="fl">开场白</div><input id="rGreeting" class="fi" /></div>
          <div class="f"><div class="fl">System Prompt</div><textarea id="rPrompt" class="ta"></textarea></div>
          <div class="row">
            <button class="btn" onclick="saveRole()">保存角色</button>
            <button class="btn2" onclick="resetRoleForm()">清空表单</button>
            <button class="btn2 btnDanger" onclick="deleteRole()">删除当前</button>
          </div>
        </div>
      </div>
    </section>

    <section id="page-worldbook" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">世界书</div>
          <div class="note" style="margin-bottom:8px">按关键词命中，发送时自动注入上下文。</div>
          <div id="wbList" class="list"></div>
        </div>
        <div class="card">
          <div class="ct">新增 / 编辑词条</div>
          <input type="hidden" id="wbId" />
          <div class="f"><div class="fl">关键词（逗号分隔）</div><input id="wbKeys" class="fi" /></div>
          <div class="f"><div class="fl">内容</div><textarea id="wbContent" class="ta"></textarea></div>
          <div class="row"><label class="btn2" style="display:flex;align-items:center;gap:6px"><input id="wbEnabled" type="checkbox" checked />启用</label></div>
          <div class="row">
            <button class="btn" onclick="saveWB()">保存词条</button>
            <button class="btn2" onclick="resetWBForm()">清空表单</button>
            <button class="btn2 btnDanger" onclick="deleteWB()">删除当前</button>
          </div>
        </div>
      </div>
    </section>

    <section id="page-settings" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">我的头像</div>
          <input type="hidden" id="meAvatarImg" />
          <div class="row" style="align-items:center">
            <div id="mePreview" class="preview">我</div>
            <input id="meAvatarFile" type="file" accept="image/*" class="fi" onchange="onMeAvatarPick(event)" />
            <button class="btn2" type="button" onclick="clearMeAvatar()">清空头像</button>
          </div>
        </div>

        <div class="card">
          <div class="ct">API 设置</div>
          <div class="f"><div class="fl">反代地址</div><input id="cUrl" class="fi" /></div>
          <div class="f"><div class="fl">API 密钥</div><input id="cKey" class="fi" type="password" /></div>
          <div class="row">
            <div class="f" style="flex:2"><div class="fl">模型</div><select id="cModel" class="fs"><option value="">先拉取模型</option></select></div>
            <div class="f" style="flex:0 0 auto;align-self:flex-end"><button id="fetchBtn" class="btn2" onclick="fetchModels()">拉取模型</button></div>
          </div>
          <div class="row">
            <div class="f"><div class="fl">Temperature</div><input id="cTemp" class="fi" type="number" min="0" max="2" step="0.1" value="0.8" /></div>
            <div class="f"><div class="fl">最大回复长度</div><input id="cMax" class="fi" type="number" min="50" max="8192" step="50" value="800" /></div>
          </div>
          <div class="row"><button class="btn" onclick="saveCfg()">保存配置</button><button class="btn2" onclick="testOnce()">测试连接</button></div>
        </div>

        <div class="card">
          <div class="ct">安全</div>
          <div class="switchRow f"><div class="fl" style="margin:0">启用锁屏（PIN）</div><input id="lockEnabled" type="checkbox" onchange="toggleLockEnabled(this.checked)" /></div>
          <div class="f"><div class="fl">PIN（4~8位数字）</div><input id="lockPin" class="fi" type="password" inputmode="numeric" maxlength="8" /></div>
          <div class="row"><button class="btn2" onclick="saveLock()">保存锁屏设置</button><button class="btn2" onclick="lockNow()">立即锁屏</button></div>
        </div>

        <div class="card">
          <div class="ct">数据管理</div>
          <div class="row">
            <button class="btn2" onclick="clearCurrentChat()">清空当前角色聊天</button>
            <button class="btn2" onclick="clearStickers()">清空表情包库</button>
            <button class="btn2" onclick="exportAllData()">导出全部数据</button>
            <button class="btn2" onclick="openImportFile()">导入数据</button>
            <button class="btn2 btnDanger" onclick="clearAllLocal()">清空全部本地数据</button>
            <input id="importFile" type="file" accept="application/json" style="display:none" onchange="importAllData(event)" />
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="panelDock" id="panelDock">
    <div class="panelHd">
      <div id="panelTitle" class="panelT">表情</div>
      <button class="btn2" style="padding:6px 10px" onclick="closeDock()">收起</button>
    </div>
    <div class="panelBody">
      <div id="emojiPanel" class="emojiPanel"></div>
      <div id="stickerPanel" class="emojiPanel"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-page="inbox" onclick="('inbox',this)">会话</button>
    <button class="tab" data-page="chat" onclick="('chat',this)">聊天</button>
    <button class="tab" data-page="roles" onclick="switchTab('roles',this)">角色</button>
    <button class="tab" data-page="worldbook" onclick="switchTab('worldbook',this)">世界书</button>
    <button class="tab" data-page="settings" onclick="switchTab('settings',this)">设置</button>
  </div>

  <div id="lockMask" class="lockMask">
    <div class="lockCard">
      <div class="lockTitle">已锁定</div>
      <div class="lockSub">输入 PIN 解锁</div>
      <input id="unlockPin" class="fi" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" />
      <div class="row" style="margin-top:10px;justify-content:center"><button class="btn" onclick="unlock()">解锁</button></div>
    </div>
  </div>

  <div id="stickerImportMask" class="lockMask" onclick="maskCloseStickerImport(event)">
    <div class="lockCard" style="text-align:left">
      <div class="lockTitle">批量添加表情包</div>
      <div class="note" style="margin-bottom:8px">每行一个，支持：URL / 名字 URL / URL 名字</div>
      <textarea id="stickerBatchInput" class="ta" style="min-height:180px"></textarea>
      <div class="row" style="margin-top:10px;justify-content:flex-end">

        <button class="btn" onclick="importStickerBatch()">导入表情</button>
      </div>
    </div>
  </div>

<script>
let C={url:'',key:'',model:'',temp:0.8,max:800,selfAvatarImg:'',lockEnabled:false,lockPin:''};
let roles=[],activeRoleId='',HMap={},streaming=false,currentPage='inbox',stickers=[],worldbook=[],dockMode='';
const EMOJIS=['😀','😎','🥺','🥰','😭','😤','🤍','💙','💜','💛','🔥','✨','🎀','🍓','🫶','😴','🙄','😈','📌','✅'];
const $=s=>document.querySelector(s),chat=$('#chat');

function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function now(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function esc(s=''){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function normBaseUrl(u=''){return u.trim().replace(/\/+$/,'').replace(/\/v1$/,'')}
function apiUrl(base,path){return normBaseUrl(base)+'/v1'+path}
function uid(){return 'r_'+Math.random().toString(36).slice(2,10)}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200)}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function hotKey(e){if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();send()}}
function makeHeaders(key='',json=true){
  const h={}; if(json) h['Content-Type']='application/json';
  const k=String(key||'').trim(); if(k) h['Authorization']='Bearer '+k;
  return h;
}

function fileToDataURL(file){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(file)})}
async function compressImageFile(file,maxW=1280,maxH=1280,quality=0.82){
  const dataUrl=await fileToDataURL(file);
  const img=await new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=dataUrl});
  const scale=Math.min(maxW/img.width,maxH/img.height,1),w=Math.max(1,Math.round(img.width*scale)),h=Math.max(1,Math.round(img.height*scale));
  const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);
  return canvas.toDataURL('image/jpeg',quality);
}

function currentRole(){return roles.find(r=>r.id===activeRoleId)||null}
function currentHistory(){if(!activeRoleId) return [];if(!Array.isArray(HMap[activeRoleId])) HMap[activeRoleId]=[];return HMap[activeRoleId]}
function avatarHTML(img,text){if(img) return `<img src="${img}" alt="">`;return esc((text||'AI').slice(0,2))}
function setStatus(){const s=$('#status');if(C.url&&C.model){s.textContent='在线';s.className='st'}else{s.textContent='未配置';s.className='st off'}}
function refreshHeader(){const r=currentRole();$('#topRole').textContent='当前角色：'+(r?r.name:'未选择');$('#topAv').innerHTML=avatarHTML(r?.avatarImg,r?.avatar||'N')}

function switchTab(name,btn){
  currentPage=name;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  $('#page-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(name==='inbox') renderInbox();
  if(name!=='chat') closeDock();
}
function goBack(){
  if($('#lockMask').classList.contains('show')) return;
  if($('#stickerImportMask').classList.contains('show')){closeStickerImportModal();return;}
  if($('#panelDock').classList.contains('show')){closeDock();return;}
  if(currentPage!=='inbox'){switchTab('inbox',document.querySelector('.tab[data-page="inbox"]'));return;}
  toast('已在首页');
}

function toggleDock(mode){
  if(currentPage!=='chat') return;
  const dock=$('#panelDock'), ep=$('#emojiPanel'), sp=$('#stickerPanel'), title=$('#panelTitle');
  const chatEl=$('#chat');
  if(dock.classList.contains('show')&&dockMode===mode){closeDock();return;}
  dock.classList.add('show'); dockMode=mode;
  ep.classList.remove('show'); sp.classList.remove('show');
  if(mode==='emoji'){title.textContent='表情';ep.classList.add('show')}
  else{title.textContent='贴纸';sp.classList.add('show')}
  chatEl.style.paddingBottom='calc(14px + 38vh)';
  chatEl.scrollTop=chatEl.scrollHeight;
}
function closeDock(){
  $('#panelDock').classList.remove('show');
  dockMode='';
  $('#chat').style.paddingBottom='14px';
}

function markdownToHtml(src=''){
  let s=String(src??''); const blocks=[];
  s=s.replace(/```([^\n`]*)\n?([\s\S]*?)```/g,(_,l,c)=>{const i=blocks.length;blocks.push({code:esc(c||'')});return `@@CODE_${i}@@`});
  s=esc(s).replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');
  s=s.replace(/^\s*-\s+(.*)$/gm,'<li>$1</li>').replace(/(?:<li>[\s\S]*?<\/li>)/g,m=>`<ul>${m}</ul>`);
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>').replace(/\n/g,'<br>');
  s=s.replace(/@@CODE_(\d+)@@/g,(_,i)=>`<pre><code>${blocks[Number(i)]?.code||''}</code></pre>`);
  return `<div class="md">${s}</div>`;
}
function renderMsgContent(m){
  if(m.type==='image'){
    const isSticker=!!m?.meta?.stickerName;
    return `<img class="chatImg ${isSticker?'stickerMsgImg':''}" src="${m.content}" alt="img" />`;
  }
  return markdownToHtml(m.content||'');
}
function renderChat(){
  const r=currentRole(),H=currentHistory();
  if(!r){chat.innerHTML=`<div class="welcome"><b>欢迎使用 Noctis</b><br>先去「角色」页创建角色，再去「设置」页填 API。</div>`;return;}
  if(!H.length){chat.innerHTML=`<div class="welcome"><b>${esc(r.name)}</b> 已就位。<br>${r.greeting?esc(r.greeting):'你可以开始聊天了。'}<br><br>支持：文本 / 图片 / 表情包。</div>`;return;}
  chat.innerHTML=H.map(m=>{
    const isMe=m.role==='user',avImg=isMe?(C.selfAvatarImg||''):(r.avatarImg||''),avTxt=isMe?'我':(r.avatar||'AI');
    const isImage = m.type==='image';
    const isSticker = !!m?.meta?.stickerName;
    const msgClass = ['msg',isMe?'meBubble':'ai',isImage?'imgMsg':'',isSticker?'stickerMsg':''].filter(Boolean).join(' ');
    return `<div class="line ${isMe?'me':''}">
      ${isMe?'':`<div class="msgAv">${avatarHTML(avImg,avTxt)}</div>`}
      <div class="${msgClass}">${renderMsgContent(m)}<div class="tm">${m.time||''}</div></div>
      ${isMe?`<div class="msgAv">${avatarHTML(avImg,avTxt)}</div>`:''}
    </div>`;
  }).join('');
  chat.scrollTop=chat.scrollHeight;
}
function renderInbox(){
  const box=$('#sessionList');
  if(!roles.length){box.innerHTML=`<div class="welcome">还没有联系人，先去“角色”页创建。</div>`;return;}
  const items=roles.map(r=>{
    const H=Array.isArray(HMap[r.id])?HMap[r.id]:[],last=H[H.length-1];
    let preview=r.greeting||'点击进入聊天'; if(last){preview=last.type==='image'?'[图片]':((last.role==='user'?'我: ':'')+(last.content||''));}
    return {r,preview,time:last?.time||'--:--'};
  });
  box.innerHTML=items.map(({r,preview,time})=>`
    <div class="sessionItem" onclick="openRoleChat('${r.id}')">
      <div class="sessionAvatar">${avatarHTML(r.avatarImg,r.avatar||'AI')}</div>
      <div class="sessionMid"><div class="sessionName">${esc(r.name||'未命名')} <span style="font-size:14px">🔥</span></div><div class="sessionLast">${esc(preview)}</div></div>
      <div class="sessionTime">${esc(time)}</div><button class="dotBtn" onclick="event.stopPropagation();editRole('${r.id}')">⋮</button>
    </div>
  `).join('');
}
function openRoleChat(id){activeRoleId=id;save('nx_active_role',activeRoleId);refreshHeader();renderRoles();renderChat();switchTab('chat',document.querySelector('.tab[data-page="chat"]'))}
function addTyping(){const d=document.createElement('div');d.className='line';d.id='typing';d.innerHTML='<div class="msgAv">AI</div><div class="typ"><i></i><i></i><i></i></div>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight}
function removeTyping(){const t=$('#typing');if(t)t.remove()}

function renderRoles(){
  const list=$('#roleList');
  if(!roles.length){list.innerHTML=`<div class="mini">还没有角色，先在下面创建一个。</div>`;return;}
  list.innerHTML=roles.map(r=>`<div class="roleItem ${r.id===activeRoleId?'active':''}">
    <div class="roleL"><div class="rAv">${avatarHTML(r.avatarImg,r.avatar||'AI')}</div><div style="min-width:0"><div class="rName">${esc(r.name||'未命名')}</div><div class="rSub">${r.prompt?'已设置人设':'无默认人设'}</div></div></div>
    <div style="display:flex;gap:6px"><button class="btn2" onclick="pickRole('${r.id}')">使用</button><button class="btn2" onclick="editRole('${r.id}')">编辑</button></div>
  </div>`).join('');
}
function setRolePreview(img,text='无图'){const el=$('#rPreview');el.innerHTML=img?`<img src="${img}" alt="">`:esc(text)}
function resetRoleForm(){$('#rId').value='';$('#rName').value='';$('#rAvatar').value='';$('#rGreeting').value='';$('#rPrompt').value='';$('#rAvatarImg').value='';$('#rAvatarFile').value='';setRolePreview('', '无图')}
async function onRoleAvatarPick(e){const f=e.target.files?.[0];if(!f)return;if(f.size>2*1024*1024){toast('图片请小于2MB');e.target.value='';return;}try{const data=await compressImageFile(f,512,512,0.82);$('#rAvatarImg').value=data;setRolePreview(data)}catch{toast('读取图片失败')}}
function clearRoleAvatar(){$('#rAvatarImg').value='';$('#rAvatarFile').value='';setRolePreview('', '无图')}
function saveRole(){
  const id=$('#rId').value||uid(),name=$('#rName').value.trim(),avatar=($('#rAvatar').value.trim()||'AI').slice(0,2),avatarImg=$('#rAvatarImg').value||'',greeting=$('#rGreeting').value.trim(),prompt=$('#rPrompt').value.trim();
  if(!name){toast('角色名不能为空');return;}
  const obj={id,name,avatar,avatarImg,prompt,greeting},idx=roles.findIndex(x=>x.id===id);
  if(idx>=0) roles[idx]=obj; else roles.unshift(obj);
  if(!activeRoleId) activeRoleId=id;
  save('nx_roles',roles);save('nx_active_role',activeRoleId);renderRoles();refreshHeader();renderChat();renderInbox();toast('角色已保存');
}
function editRole(id){const r=roles.find(x=>x.id===id);if(!r)return;$('#rId').value=r.id;$('#rName').value=r.name||'';$('#rAvatar').value=r.avatar||'';$('#rGreeting').value=r.greeting||'';$('#rPrompt').value=r.prompt||'';$('#rAvatarImg').value=r.avatarImg||'';$('#rAvatarFile').value='';setRolePreview(r.avatarImg||'',r.avatar||'无图');switchTab('roles',document.querySelector('.tab[data-page="roles"]'))}
function pickRole(id){activeRoleId=id;save('nx_active_role',activeRoleId);refreshHeader();renderRoles();renderChat();renderInbox();toast('已切换角色')}
function deleteRole(){const id=$('#rId').value||activeRoleId;if(!id){toast('没有可删除角色');return;}const r=roles.find(x=>x.id===id);if(!r){toast('角色不存在');return;}if(!confirm(`删除角色「${r.name}」？`))return;roles=roles.filter(x=>x.id!==id);delete HMap[id];if(activeRoleId===id)activeRoleId=roles[0]?.id||'';save('nx_roles',roles);save('nx_active_role',activeRoleId);save('nx_hmap',HMap);resetRoleForm();renderRoles();refreshHeader();renderChat();renderInbox();toast('已删除')}

function setMePreview(img){const el=$('#mePreview');el.innerHTML=img?`<img src="${img}" alt="">`:'我'}
async function onMeAvatarPick(e){const f=e.target.files?.[0];if(!f)return;if(f.size>2*1024*1024){toast('图片请小于2MB');e.target.value='';return;}try{const data=await compressImageFile(f,512,512,0.82);C.selfAvatarImg=data;$('#meAvatarImg').value=data;setMePreview(data);save('nx_cfg',C);renderChat();renderInbox()}catch{toast('读取图片失败')}}
function clearMeAvatar(){C.selfAvatarImg='';$('#meAvatarImg').value='';$('#meAvatarFile').value='';setMePreview('');save('nx_cfg',C);renderChat();renderInbox()}
function fillCfgForm(){
  $('#cUrl').value=C.url||'';$('#cKey').value=C.key||'';$('#cTemp').value=C.temp??0.8;$('#cMax').value=C.max??800;
  $('#meAvatarImg').value=C.selfAvatarImg||'';setMePreview(C.selfAvatarImg||'');
  $('#lockEnabled').checked=!!C.lockEnabled;$('#lockPin').value=C.lockPin||'';
  const sel=$('#cModel'); if(C.model){if(![...sel.options].some(o=>o.value===C.model)){const o=document.createElement('option');o.value=C.model;o.textContent=C.model;sel.appendChild(o)} sel.value=C.model;}
}
function saveCfg(){C.url=normBaseUrl($('#cUrl').value);C.key=$('#cKey').value.trim();C.model=$('#cModel').value;C.temp=parseFloat($('#cTemp').value)||0.8;C.max=parseInt($('#cMax').value)||800;C.selfAvatarImg=$('#meAvatarImg').value||C.selfAvatarImg||'';save('nx_cfg',C);setStatus();toast('配置已保存');renderChat()}
function toggleLockEnabled(v){C.lockEnabled=!!v}
function saveLock(){const pin=$('#lockPin').value.trim();if(C.lockEnabled){if(!/^\d{4,8}$/.test(pin)){toast('PIN需4~8位数字');return;}C.lockPin=pin}else{C.lockPin=pin&&/^\d{4,8}$/.test(pin)?pin:''}save('nx_cfg',C);toast('锁屏设置已保存')}
function lockNow(){if(!C.lockEnabled){toast('先启用锁屏');return;}if(!/^\d{4,8}$/.test(C.lockPin||'')){toast('先保存有效PIN');return;}$('#unlockPin').value='';$('#lockMask').classList.add('show')}
function unlock(){const val=$('#unlockPin').value.trim();if(val===(C.lockPin||'')){$('#lockMask').classList.remove('show');$('#unlockPin').value='';toast('已解锁')}else toast('PIN错误')}

function clearCurrentChat(){if(!activeRoleId){toast('先选角色');return;}if(!confirm('清空当前角色聊天记录？'))return;HMap[activeRoleId]=[];save('nx_hmap',HMap);renderChat();renderInbox();toast('已清空')}
function normalizeSticker(x){if(!x)return null;if(typeof x==='string')return {name:'表情',src:x};if(typeof x==='object'&&x.src)return {name:(x.name||'表情').trim()||'表情',src:x.src};return null}
function clearStickers(){if(!confirm('清空表情包库？'))return;stickers=[];save('nx_stickers',stickers);renderStickerPanel();toast('已清空表情包')}
function clearAllLocal(){if(!confirm('清空全部本地数据？不可恢复。'))return;['nx_cfg','nx_roles','nx_active_role','nx_hmap','nx_stickers','nx_worldbook'].forEach(k=>localStorage.removeItem(k));location.reload()}

function openImagePick(){$('#imgPick').click()}
async function pickImage(e){const f=e.target.files?.[0];e.target.value='';if(!f)return;if(!activeRoleId){toast('先创建并选择角色');return;}if(f.size>12*1024*1024){toast('图片太大，换一张');return;}try{const data=await compressImageFile(f,1280,1280,0.82);const H=currentHistory();H.push({role:'user',type:'image',content:data,time:now()});save('nx_hmap',HMap);renderChat();renderInbox()}catch{toast('图片发送失败')}}

function buildEmojiPanel(){const p=$('#emojiPanel');p.innerHTML=EMOJIS.map(x=>`<button class="emoji" onclick="addEmoji('${x}')">${x}</button>`).join('')}
function addEmoji(x){const inp=$('#inp');inp.value+=x;inp.focus();autoGrow(inp)}

function openStickerPicker(){$('#stickerPick').click()}
function fileNameNoExt(n=''){return String(n).replace(/\.[^.]+$/,'').trim()||'表情'}
async function pickSticker(e){
  const files=Array.from(e.target.files||[]);e.target.value='';if(!files.length)return;let added=0;
  for(const f of files){if(!f.type.startsWith('image/'))continue;try{const data=await compressImageFile(f,420,420,0.78);stickers.unshift({name:fileNameNoExt(f.name),src:data});added++;}catch{} if(stickers.length>200) stickers=stickers.slice(0,200);}
  save('nx_stickers',stickers);renderStickerPanel();toast(added?`已加入${added}张表情包`:'没有可用图片');
}
function renderStickerPanel(){
  const p=$('#stickerPanel');
  if(!stickers.length){p.innerHTML=`<div class="stickerEmpty">还没有表情包，点“入库”或“导入”。</div>`;return;}
  p.innerHTML=stickers.map((it,i)=>`<button class="stickerBtn" onclick="sendSticker(${i})" title="${esc(it.name||'表情')}"><img src="${it.src}" alt=""><span class="stickerName">${esc(it.name||'表情')}</span></button>`).join('');
}
function sendSticker(i){const it=stickers[i];if(!it||!it.src)return;if(!activeRoleId){toast('先创建并选择角色');return;}const H=currentHistory();H.push({role:'user',type:'image',content:it.src,time:now(),meta:{stickerName:it.name||''}});save('nx_hmap',HMap);renderChat();renderInbox();closeDock()}
function openStickerImportModal(){$('#stickerBatchInput').value='';$('#stickerImportMask').classList.add('show')}
function closeStickerImportModal(){$('#stickerImportMask').classList.remove('show')}
function maskCloseStickerImport(e){if(e.target.id==='stickerImportMask')closeStickerImportModal()}
function importStickerBatch(){
  const raw=$('#stickerBatchInput').value||'',lines=raw.split('\n').map(s=>s.trim()).filter(Boolean);if(!lines.length){toast('先填内容');return;}
  let ok=0;
  for(const line of lines){
    const m=line.match(/https?:\/\/\S+/i); if(!m) continue;
    const url=m[0],left=line.slice(0,m.index).trim(),right=line.slice((m.index||0)+url.length).trim();
    let name=(left||right||'');
    if(!name){try{const u=new URL(url);const seg=u.pathname.split('/').pop()||'';name=decodeURIComponent(seg).replace(/\.[^.]+$/,'')||'表情'}catch{name='表情'}}
    stickers.unshift({name,src:url});ok++;if(stickers.length>200) stickers=stickers.slice(0,200);
  }
  save('nx_stickers',stickers);renderStickerPanel();closeStickerImportModal();toast(ok?`已导入${ok}条`:'没有识别到有效URL');
}

function wbId(){return 'wb_'+Math.random().toString(36).slice(2,10)}
function resetWBForm(){$('#wbId').value='';$('#wbKeys').value='';$('#wbContent').value='';$('#wbEnabled').checked=true}
function renderWB(){
  const box=$('#wbList'); if(!box) return;
  if(!worldbook.length){box.innerHTML=`<div class="mini">还没有词条，先创建一个。</div>`;return;}
  box.innerHTML=worldbook.map(x=>`<div class="roleItem"><div class="roleL" style="align-items:flex-start"><div style="min-width:0"><div class="rName">${esc((x.keys||[]).join(', ')||'无关键词')}</div><div class="rSub">${esc((x.content||'').slice(0,90))}${(x.content||'').length>90?'…':''}</div><div class="mini">${x.enabled?'已启用':'已停用'}</div></div></div><div><button class="btn2" onclick="editWB('${x.id}')">编辑</button></div></div>`).join('');
}
function saveWB(){const id=$('#wbId').value||wbId(),keys=$('#wbKeys').value.split(',').map(s=>s.trim()).filter(Boolean),content=$('#wbContent').value.trim(),enabled=$('#wbEnabled').checked;if(!keys.length){toast('关键词不能为空');return;}if(!content){toast('内容不能为空');return;}const obj={id,keys,content,enabled},i=worldbook.findIndex(x=>x.id===id);if(i>=0)worldbook[i]=obj;else worldbook.unshift(obj);save('nx_worldbook',worldbook);renderWB();resetWBForm();toast('世界书已保存')}
function editWB(id){const x=worldbook.find(v=>v.id===id);if(!x)return;$('#wbId').value=x.id;$('#wbKeys').value=(x.keys||[]).join(', ');$('#wbContent').value=x.content||'';$('#wbEnabled').checked=!!x.enabled;switchTab('worldbook',document.querySelector('.tab[data-page="worldbook"]'))}
function deleteWB(){const id=$('#wbId').value;if(!id){toast('没有可删除词条');return;}const x=worldbook.find(v=>v.id===id);if(!x){toast('词条不存在');return;}if(!confirm('删除当前词条？'))return;worldbook=worldbook.filter(v=>v.id!==id);save('nx_worldbook',worldbook);renderWB();resetWBForm();toast('已删除')}
function buildWBSystemPrompt(userText){const t=(userText||'').toLowerCase();const hits=worldbook.filter(x=>x.enabled&&(x.keys||[]).some(k=>t.includes(String(k).toLowerCase())));if(!hits.length)return '';return hits.map((h,i)=>`[世界书${i+1}] ${h.content}`).join('\n')}

function exportAllData(){
  const data={version:1,nx_cfg:C,nx_roles:roles,nx_active_role:activeRoleId,nx_hmap:HMap,nx_stickers:stickers,nx_worldbook:worldbook};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=`noctis-backup-${Date.now()}.json`;a.click();URL.revokeObjectURL(a.href);toast('已导出');
}
function openImportFile(){$('#importFile').click()}
async function importAllData(e){
  const f=e.target.files?.[0];e.target.value='';if(!f)return;
  try{
    const j=JSON.parse(await f.text());
    if(j.nx_cfg) C=j.nx_cfg; if(Array.isArray(j.nx_roles)) roles=j.nx_roles; if(typeof j.nx_active_role==='string') activeRoleId=j.nx_active_role;
    if(j.nx_hmap&&typeof j.nx_hmap==='object') HMap=j.nx_hmap; if(Array.isArray(j.nx_stickers)) stickers=j.nx_stickers; if(Array.isArray(j.nx_worldbook)) worldbook=j.nx_worldbook;
    stickers=stickers.map(normalizeSticker).filter(Boolean);
    save('nx_cfg',C);save('nx_roles',roles);save('nx_active_role',activeRoleId);save('nx_hmap',HMap);save('nx_stickers',stickers);save('nx_worldbook',worldbook);
    fillCfgForm();renderRoles();renderStickerPanel();renderWB();refreshHeader();setStatus();renderChat();renderInbox();toast('导入成功');
  }catch{toast('导入失败：JSON格式不对')}
}
async function fetchModels(){
  const url=normBaseUrl($('#cUrl').value),key=$('#cKey').value.trim();if(!url){toast('先填反代地址');return;}
  const btn=$('#fetchBtn');btn.disabled=true;btn.textContent='拉取中…';
  try{
    const r=await fetch(apiUrl(url,'/models'),{headers:makeHeaders(key,false)});
    if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
    const j=await r.json();let list=[];
    if(Array.isArray(j?.data)) list=j.data.map(x=>x.id).filter(Boolean);
    else if(Array.isArray(j)) list=j.map(x=>typeof x==='string'?x:x?.id).filter(Boolean);
    list=[...new Set(list)].sort();if(!list.length) throw new Error('没拿到模型');
    const sel=$('#cModel');sel.innerHTML='';
    list.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
    if(C.model&&list.includes(C.model)) sel.value=C.model;
    toast(`模型 ${list.length} 个`);
  }catch(e){toast('拉取失败: '+String(e.message||e).slice(0,120))}
  finally{btn.disabled=false;btn.textContent='拉取模型'}
}
async function testOnce(){
  const tUrl=normBaseUrl($('#cUrl').value),tKey=$('#cKey').value.trim(),tModel=$('#cModel').value;
  if(!tUrl||!tModel){toast('URL/模型没填全');return;}
  try{
    const body={model:tModel,messages:[{role:'user',content:'回1'}],temperature:0.2,max_tokens:16,stream:false};
    const r=await fetch(apiUrl(tUrl,'/chat/completions'),{
      method:'POST',
      headers:makeHeaders(tKey,true),
      body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
    const j=await r.json();
    const out=j?.choices?.[0]?.message?.content ?? '';
    if(!String(out).trim()) throw new Error('返回为空或模型不支持chat');
    toast('连接正常');
  }catch(e){toast('测试失败: '+String(e.message||e).slice(0,160))}
}
async function send(){
  if($('#lockMask').classList.contains('show')||$('#stickerImportMask').classList.contains('show')) return;
  const inp=$('#inp'),text=inp.value.trim(); if(!text||streaming) return;
  const role=currentRole(); if(!role){toast('先创建并选择角色');return;} if(!C.url||!C.model){toast('先配置URL/模型');return;}
  inp.value='';inp.style.height='auto';const H=currentHistory();H.push({role:'user',type:'text',content:text,time:now()});save('nx_hmap',HMap);renderChat();renderInbox();
  streaming=true;$('#sendBtn').disabled=true;$('#status').textContent='正在输入…';addTyping();

  const M=H.map(x=>({role:x.role==='assistant'?'assistant':'user',content:x.type==='image'?'[图片]':(x.content||'')}));
  const wbPrompt=buildWBSystemPrompt(text),systemMsgs=[]; if(role.prompt) systemMsgs.push({role:'system',content:role.prompt}); if(wbPrompt) systemMsgs.push({role:'system',content:wbPrompt});
  const payload={model:C.model,messages:[...systemMsgs,...M.slice(-40)],temperature:C.temp,max_tokens:C.max};

  try{
    let r=await fetch(apiUrl(C.url,'/chat/completions'),{method:'POST',headers:makeHeaders(C.key,true),body:JSON.stringify({...payload,stream:true})});
    if(!r.ok){
      const err1=await r.text().catch(()=> '');
      r=await fetch(apiUrl(C.url,'/chat/completions'),{method:'POST',headers:makeHeaders(C.key,true),body:JSON.stringify({...payload,stream:false})});
      if(!r.ok){
        const err2=await r.text().catch(()=> '');
        throw new Error(`${r.status}: ${(err2||err1||'请求失败').slice(0,220)}`);
      }
      const out=(await r.json())?.choices?.[0]?.message?.content?.trim()||'……';
      H.push({role:'assistant',type:'text',content:out,time:now()});save('nx_hmap',HMap);removeTyping();renderChat();renderInbox();
    }else{
      removeTyping();const at=now();const holderLine=document.createElement('div');
      holderLine.className='line';
      holderLine.innerHTML=`<div class="msgAv">${avatarHTML(role.avatarImg,role.avatar||'AI')}</div><div class="msg ai"><div class="md"><span class="cur">▊</span></div><div class="tm">${at}</div></div>`;
      chat.appendChild(holderLine);chat.scrollTop=chat.scrollHeight;const holder=holderLine.querySelector('.msg .md');
      let full='',buf='';const reader=r.body.getReader(),dec=new TextDecoder();
      while(true){const {done,value}=await reader.read();if(done) break;buf+=dec.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop();
        for(const line of lines){const s=line.trim();if(!s.startsWith('data:')) continue;const data=s.slice(5).trim();if(data==='[DONE]') continue;
          try{const j=JSON.parse(data),delta=j?.choices?.[0]?.delta?.content;if(delta){full+=delta;holder.innerHTML=markdownToHtml(full)+`<span class="cur">▊</span>`;chat.scrollTop=chat.scrollHeight;}}catch{}
        }
      }
      if(!full) full='……'; holder.innerHTML=markdownToHtml(full); H.push({role:'assistant',type:'text',content:full,time:at}); save('nx_hmap',HMap); renderInbox();
    }
  }catch(e){removeTyping();H.push({role:'assistant',type:'text',content:'[请求失败] '+String(e.message||e).slice(0,220),time:now()});save('nx_hmap',HMap);renderChat();renderInbox()}
  finally{streaming=false;$('#sendBtn').disabled=false;setStatus();}
}

function initDefaultRoleIfEmpty(){if(roles.length)return;const id=uid();roles=[{id,name:'默认助手',avatar:'AI',avatarImg:'',greeting:'你好，先去角色页改你的人设。',prompt:''}];activeRoleId=id;save('nx_roles',roles);save('nx_active_role',activeRoleId)}
function init(){
  C=load('nx_cfg',C);roles=load('nx_roles',[]);activeRoleId=load('nx_active_role','');HMap=load('nx_hmap',{});stickers=load('nx_stickers',[]);worldbook=load('nx_worldbook',[]);
  stickers=stickers.map(normalizeSticker).filter(Boolean);save('nx_stickers',stickers);
  if(typeof C.selfAvatarImg!=='string') C.selfAvatarImg=''; if(typeof C.lockEnabled!=='boolean') C.lockEnabled=false; if(typeof C.lockPin!=='string') C.lockPin=''; if(typeof HMap!=='object'||!HMap) HMap={};
  initDefaultRoleIfEmpty(); if(!activeRoleId&&roles[0]) activeRoleId=roles[0].id;
  buildEmojiPanel();renderStickerPanel();renderWB();fillCfgForm();renderRoles();refreshHeader();setStatus();renderChat();renderInbox();
  if(C.lockEnabled&&/^\d{4,8}$/.test(C.lockPin||'')) $('#lockMask').classList.add('show');
}
init();
<script>
/* ===== 一键补丁：修底部挡住 + API测试 ===== */
(function () {
  // 1) 强制修复 panelDock 隐藏仍挡住
  const st = document.createElement('style');
  st.textContent = `
  .panelDock{
    transform:translateY(calc(100% + 24px)) !important;
    pointer-events:none !important;
    bottom:calc(58px + env(safe-area-inset-bottom)) !important;
    height:38vh !important;
    max-height:320px !important;
  }
  .panelDock.show{
    transform:translateY(0) !important;
    pointer-events:auto !important;
  }`;
  document.head.appendChild(st);

  // 2) 覆盖函数（不用删原函数）
  window.closeDock = function(){
    const d=document.querySelector('#panelDock');
    const c=document.querySelector('#chat');
    if(d) d.classList.remove('show');
    window.dockMode='';
    if(c) c.style.paddingBottom='14px';
  };

  window.switchTab = function(name,btn){
    window.closeDock();
    window.currentPage=name;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    const page=document.querySelector('#page-'+name);
    if(page) page.classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    if(btn) btn.classList.add('active');
    if(name==='inbox' && typeof window.renderInbox==='function') window.renderInbox();
  };

  window.toggleDock = function(mode){
    if(window.currentPage!=='chat') return;
    const dock=document.querySelector('#panelDock');
    const ep=document.querySelector('#emojiPanel');
    const sp=document.querySelector('#stickerPanel');
    const title=document.querySelector('#panelTitle');
    const chatEl=document.querySelector('#chat');
    if(!dock||!ep||!sp||!title||!chatEl) return;

    if(dock.classList.contains('show') && window.dockMode===mode){ window.closeDock(); return; }

    dock.classList.add('show');
    window.dockMode=mode;
    ep.classList.remove('show'); sp.classList.remove('show');
    if(mode==='emoji'){ title.textContent='表情'; ep.classList.add('show'); }
    else { title.textContent='贴纸'; sp.classList.add('show'); }

    chatEl.style.paddingBottom='calc(14px + 38vh)';
    chatEl.scrollTop=chatEl.scrollHeight;
  };

  // 页面初始化后再收一次，防残留
  setTimeout(()=>{ try{ window.closeDock(); }catch(e){} }, 50);

  // 3) API测试：自动尝试多种鉴权头
  function _k(v){ return String(v||'').replace(/\s+/g,'').trim(); }
  window.testOnce = async function(){
    const tUrl=(window.normBaseUrl?window.normBaseUrl(document.querySelector('#cUrl')?.value||''):'');
    const tKey=_k(document.querySelector('#cKey')?.value||'');
    const tModel=document.querySelector('#cModel')?.value||'';
    if(!tUrl||!tModel){ window.toast&&toast('URL/模型没填全'); return; }

    const body={model:tModel,messages:[{role:'user',content:'回1'}],temperature:0.2,max_tokens:16,stream:false};
    const authModes=[
      {'Authorization':'Bearer '+tKey},
      {'x-api-key':tKey},
      {'api-key':tKey},
      {'Authorization':tKey}
    ];
    let last='';

    for(const m of authModes){
      try{
        const headers={'Content-Type':'application/json',...m};
        if(!tKey){ delete headers.Authorization; delete headers['x-api-key']; delete headers['api-key']; }
        const r=await fetch((window.apiUrl?apiUrl(tUrl,'/chat/completions'):tUrl+'/v1/chat/completions'),{
          method:'POST',headers,body:JSON.stringify(body)
        });
        if(!r.ok){ last=`${r.status} ${await r.text()}`; continue; }
        const j=await r.json();
        const out=j?.choices?.[0]?.message?.content ?? '';
        if(String(out).trim()){ window.toast&&toast('连接正常'); return; }
        last='empty output';
      }catch(e){ last=String(e.message||e); }
    }
    window.toast&&toast('测试失败: '+String(last).slice(0,160));
  };
})();
</script>
</script>
