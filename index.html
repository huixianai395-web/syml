<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 v2.0 Final</title>
  <style>
    /* 极致美化：保留原版变量，注入高级感 */
    :root {
      --p-color: #007aff; 
      --bg-light: #f2f2f7; 
      --bubble-me: #007aff; 
      --bubble-ai: #ffffff;
      --glass: rgba(255, 255, 255, 0.8);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;overflow:hidden}
    #app{max-width:430px;height:100dvh;margin:0 auto;position:relative;background:#111;padding-top:env(safe-area-inset-top)}
    
    .screen{position:absolute;inset:0;display:none;background:var(--bg-light);top:env(safe-area-inset-top);flex-direction:column}
    .screen.active{display:flex}

    /* Header 优化 */
    .header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:0.5px solid #d1d1d6;z-index:10;flex-shrink:0}
    .btn{border:none;border-radius:20px;padding:6px 14px;font-size:14px;background:#e5e5ea;color:#000;cursor:pointer;font-weight:500}
    .btn.p{background:var(--p-color);color:#fff}
    .mode-tag{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:4px;background:#ff9500;color:#fff;font-weight:bold}

    /* 聊天区：兼容双模式 */
    #chatMsgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:var(--bg-light);scroll-behavior:smooth}
    .msg-row{display:flex;gap:10px;max-width:88%;margin-bottom:4px}
    .msg-row.me{align-self:flex-end;flex-direction:row-reverse}
    
    /* 线上模式：果冻气泡 */
    .online .bubble{padding:10px 14px;font-size:15px;line-height:1.45;word-break:break-word;position:relative;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
    .online .bubble.ai{background:var(--bubble-ai);color:#000;border-radius:18px 18px 18px 4px}
    .online .bubble.me{background:var(--bubble-me);color:#fff;border-radius:18px 18px 4px 18px}
    .online .chat-avatar{width:36px;height:36px;border-radius:10px;object-fit:cover;align-self:flex-end}

    /* 线下/酒馆模式：极致沉浸 */
    .offline #chatMsgs{background:linear-gradient(to bottom, #1a1a1c, #2c2c2e);gap:24px}
    .offline .msg-row{max-width:100%;flex-direction:column;align-items:center;align-self:center}
    .offline .chat-avatar{width:90px;height:90px;border-radius:50%;border:3px solid rgba(255,255,255,0.1);margin-bottom:12px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
    .offline .bubble{width:94%;background:rgba(255,255,255,0.05);color:#efeff4;padding:20px;border-radius:20px;font-size:16px;line-height:1.8;border:0.5px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px)}
    .offline .me{opacity:0.7;transform:scale(0.95)}
    .offline .me .chat-avatar{display:none}

    /* 输入栏 */
    .chatInputBar{padding:10px 16px;background:var(--glass);backdrop-filter:blur(20px);display:flex;gap:10px;align-items:flex-end;border-top:0.5px solid #d1d1d6;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
    .ta{flex:1;border:1px solid #d1d1d6;border-radius:20px;padding:10px 15px;max-height:120px;font-size:16px;outline:none;background:#fff;resize:none}

    /* 弹窗与设置 */
    .modal-mask{position:absolute;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;place-items:center;padding:20px}
    .modal-card{width:100%;background:#fff;border-radius:24px;padding:20px;max-height:85dvh;overflow-y:auto}
    .card{background:#fff;border-radius:16px;padding:15px;margin-bottom:12px;border:0.5px solid #e5e5ea}
    .input{width:100%;padding:12px;border:1px solid #d1d1d6;border-radius:10px;margin-top:8px;font-size:15px}
  </style>
</head>
<body>
<div id="app">
  <section id="wechat" class="screen active">
    <div class="header"><b>消息</b><button class="btn p" id="addContactBtn">＋</button></div>
    <div class="page" id="contactList" style="padding:16px;flex:1;overflow-y:auto"></div>
  </section>

  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" onclick="show('wechat')">返回</button>
      <div style="text-align:center"><b id="chatTitle">聊天</b><span id="modeStatus" class="mode-tag">线上</span></div>
      <button class="btn" id="toggleModeBtn">切换</button>
    </div>
    <div id="chatMsgs" class="online"></div>
    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="发消息..." rows="1"></textarea>
      <button class="btn p" id="sendBtn">发送</button>
    </div>
  </section>

  <div id="apiModal" class="modal-mask" style="display:none">
    <div class="modal-card">
      <h3>核心配置</h3>
      <div class="card"><span>API Key</span><input id="apiKey" class="input" type="password" /></div>
      <div class="card"><span>Base URL</span><input id="apiBase" class="input" placeholder="https://..." /></div>
      <div class="card"><span>模型名称</span><input id="apiModel" class="input" placeholder="gpt-4o-mini" /></div>
      <button class="btn p" style="width:100%" onclick="saveConfig()">保存配置</button>
    </div>
  </div>

  <div id="contactModal" class="modal-mask">
    <div class="modal-card">
      <h3>创建角色</h3>
      <input id="newName" class="input" placeholder="昵称" />
      <textarea id="newPersona" class="ta" style="height:120px;margin-top:10px;width:100%" placeholder="输入灵魂设定..."></textarea>
      <button class="btn" style="margin-top:10px" onclick="$('newFile').click()">上传高清头像</button>
      <input type="file" id="newFile" hidden accept="image/*" />
      <div style="margin-top:20px;display:flex;gap:10px">
        <button class="btn p" id="saveNewContact">保存</button>
        <button class="btn" onclick="$('contactModal').style.display='none'">取消</button>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const getJ = (k, d) => JSON.parse(localStorage.getItem(k) || JSON.stringify(d));
  const setJ = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { alert('内存不足，请清理聊天记录'); } };

  let currentId = null;
  let chatMode = 'online';
  let tempAvatar = '';

  // 深度提示词：注入灵魂
  const PROMPTS = {
    online: (n, p) => `你是${n}。人设：${p}。现在是即时聊天，回复需口语化、生活化，像真实的人。可以用*动作*表达。长回复请务必使用"\\n\\n"来拆分气泡。`,
    offline: (n, p) => `你是${n}。人设：${p}。现在是酒馆/演绎模式。请提供深度的环境、心理和神态描写。输出一段极具文学美感的长回复。`
  };

  window.show = id => { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); $(id).classList.add('active'); };

  // 图片压缩 logic
  $('newFile').onchange = (e) => {
    const f = e.target.files[0];
    const r = new FileReader();
    r.onload = (re) => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = 180; c.height = 180;
        c.getContext('2d').drawImage(img, 0, 0, 180, 180);
        tempAvatar = c.toDataURL('image/webp', 0.6);
      };
      img.src = re.target.result;
    };
    r.readAsDataURL(f);
  };

  // 核心 API 调用
  async function sendMsg() {
    const text = $('chatInput').value.trim();
    if (!text || !currentId) return;

    const chats = getJ('chats_v2', {});
    chats[currentId] = chats[currentId] || [];
    chats[currentId].push({ role: 'user', text });
    $('chatInput').value = '';
    renderChat();

    const contact = getJ('contacts_v2', []).find(c => c.id === currentId);
    const api = getJ('api_v2', {base:'', key:'', model:''});

    try {
      const res = await fetch(`${api.base.replace(/\/+$/, '')}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${api.key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: api.model,
          messages: [
            { role: 'system', content: PROMPTS[chatMode](contact.name, contact.persona) },
            ...chats[currentId].slice(-12).map(m => ({ role: m.role==='user'?'user':'assistant', content: m.text }))
          ]
        })
      });
      const data = await res.json();
      const reply = data.choices[0].message.content;

      // 线上模式气泡拆分
      if (chatMode === 'online') {
        reply.split(/\n\n+/).filter(s => s.trim()).forEach(s => chats[currentId].push({ role: 'assistant', text: s }));
      } else {
        chats[currentId].push({ role: 'assistant', text: reply });
      }
      setJ('chats_v2', chats);
      renderChat();
    } catch(e) { alert('API连接失败，检查设置'); }
  }

  function renderChat() {
    const chats = getJ('chats_v2', {})[currentId] || [];
    const contact = getJ('contacts_v2', []).find(c => c.id === currentId);
    $('chatMsgs').className = chatMode;
    $('chatMsgs').innerHTML = chats.map(m => `
      <div class="msg-row ${m.role === 'user' ? 'me' : ''}">
        <img class="chat-avatar" src="${m.role==='user' ? '' : contact.avatar}" style="${m.role==='user'?'display:none':''}" />
        <div class="bubble ${m.role === 'user' ? 'me' : 'ai'}">${m.text}</div>
      </div>
    `).join('');
    $('chatMsgs').scrollTop = $('chatMsgs').scrollHeight;
  }

  // 模式切换
  $('toggleModeBtn').onclick = () => {
    chatMode = chatMode === 'online' ? 'offline' : 'online';
    $('modeStatus').textContent = chatMode === 'online' ? '线上' : '剧情';
    $('modeStatus').style.background = chatMode === 'online' ? '#ff9500' : '#5856d6';
    renderChat();
  };

  // 联系人管理
  $('addContactBtn').onclick = () => $('contactModal').style.display = 'grid';
  $('saveNewContact').onclick = () => {
    const list = getJ('contacts_v2', []);
    list.unshift({ id: Date.now(), name: $('newName').value, persona: $('newPersona').value, avatar: tempAvatar });
    setJ('contacts_v2', list);
    location.reload();
  };

  window.openChat = id => { currentId = id; const c = getJ('contacts_v2', []).find(x=>x.id===id); $('chatTitle').textContent=c.name; show('chatRoom'); renderChat(); };
  
  // 初始化渲染
  const contacts = getJ('contacts_v2', []);
  $('contactList').innerHTML = contacts.map(c => `
    <div class="card" onclick="openChat(${c.id})" style="display:flex;align-items:center;gap:15px">
      <img src="${c.avatar}" style="width:50px;height:50px;border-radius:12px;object-fit:cover" />
      <b>${c.name}</b>
    </div>
  `).join('');

  if (!getJ('api_v2', null)) $('apiModal').style.display = 'grid';
  window.saveConfig = () => {
    setJ('api_v2', { base: $('apiBase').value, key: $('apiKey').value, model: $('apiModel').value });
    $('apiModal').style.display = 'none';
  };
  $('sendBtn').onclick = sendMsg;
})();
</script>
</body>
</html>
