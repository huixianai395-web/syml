<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>小手机 · 导入修复版</title>
  <style>
    :root{
      --glass: rgba(255,255,255,.28);
      --glass-border: rgba(255,255,255,.46);
      --text:#fff;
      --line:#e9e9ef;
      --blue:#2f66d8;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    #phone{width:100%;max-width:430px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:#111}
    .screen{position:absolute;inset:0;display:none;background:#f7f7fb}
    .screen.active{display:block}

    #home{color:var(--text)}
    .wallpaper{
      position:absolute;inset:0;z-index:0;
      background:
        linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
        url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
    }
    #petals{position:absolute;inset:0;z-index:1;pointer-events:none}
    .layer{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;padding:18px 12px 14px}
    .clock{margin-top:8px;padding:4px 4px 0;text-shadow:0 2px 12px rgba(0,0,0,.22)}
    .date{font-size:15px;opacity:.95;margin-left:2px}
    .time{font-size:72px;line-height:1.02;letter-spacing:-2px;font-weight:760;margin-top:2px}
    .widgets{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .widget{
      background:var(--glass);border:1px solid var(--glass-border);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-radius:18px;padding:10px 12px;
    }
    .widget .t{font-size:12px;opacity:.88}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}
    .grid{margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px;padding:0 2px}
    .icon{text-align:center}
    .icon-box{
      width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;
      background:var(--glass);border:1px solid var(--glass-border);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      font-size:27px;transition:transform .12s ease;cursor:pointer
    }
    .icon:active .icon-box{transform:scale(.88)}
    .label{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}
    .dock-wrap{margin-top:auto;padding:10px 2px 0}
    .dock{
      border-radius:26px;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
      background:rgba(255,255,255,.26);border:1px solid rgba(255,255,255,.42);
      backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    }

    .header{
      height:52px;display:flex;align-items:center;justify-content:space-between;
      padding:0 12px;background:#fff;border-bottom:1px solid var(--line)
    }
    .btn{border:none;border-radius:10px;padding:8px 12px;font-size:13px;background:#edf2ff;color:#173a7a;cursor:pointer}
    .btn.p{background:var(--blue);color:#fff}
    .page{height:calc(100% - 52px);overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#777}
    .input,.ta{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff}
    .ta{min-height:180px;resize:vertical}
    .row{display:flex;gap:8px;align-items:center}

    .wechat-list{padding:8px 10px;display:flex;flex-direction:column;gap:8px}
    .wechat-item{
      background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;
      display:flex;align-items:center;gap:10px;cursor:pointer;
    }
    .wechat-avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff;flex-shrink:0}
    .wechat-main{flex:1;min-width:0}
    .wechat-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
    .wechat-name{font-weight:600;color:#222}
    .wechat-time{font-size:11px;color:#999;white-space:nowrap}
    .wechat-preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wechat-badge{
      min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ff4d4f;color:#fff;
      font-size:11px;display:flex;align-items:center;justify-content:center;
    }

    .modal-mask{position:absolute;inset:0;background:rgba(0,0,0,.35);z-index:99;display:none;place-items:center}
    .modal-card{
      width:88%;max-width:360px;background:#fff;border-radius:14px;padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
  </style>
</head>
<body>
<div id="phone">

  <section id="home" class="screen active">
    <div class="wallpaper" id="wallpaper"></div>
    <canvas id="petals"></canvas>
    <div class="layer">
      <div class="clock">
        <div class="date" id="dateText">1月1日 周一</div>
        <div class="time" id="timeText">12:00</div>
      </div>

      <div class="widgets">
        <div class="widget"><div class="t">纪念日</div><div class="v">第 233 天</div></div>
        <div class="widget"><div class="t">天气</div><div class="v">22°C 晴</div></div>
      </div>

      <div class="grid">
        <div class="icon" onclick="show('wechat')"><div class="icon-box">💬</div><div class="label">微信</div></div>
        <div class="icon" onclick="show('probe')"><div class="icon-box">📱</div><div class="label">查手机</div></div>
        <div class="icon" onclick="show('books')"><div class="icon-box">📚</div><div class="label">书籍工坊</div></div>
        <div class="icon" onclick="show('fanfic')"><div class="icon-box">🖋️</div><div class="label">同人文</div></div>
        <div class="icon" onclick="show('pdd')"><div class="icon-box">🛍️</div><div class="label">拼多多</div></div>
      </div>

      <div class="dock-wrap">
        <div class="dock">
          <div class="icon" onclick="show('worldbook')"><div class="icon-box">📖</div><div class="label">世界书</div></div>
          <div class="icon" onclick="show('appearance')"><div class="icon-box">🎨</div><div class="label">外观</div></div>
          <div class="icon" onclick="show('api')"><div class="icon-box">🔑</div><div class="label">API</div></div>
        </div>
      </div>
    </div>
  </section>

  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" onclick="show('home')">‹ 返回</button>
      <b>微信</b>
      <div class="row">
        <button class="btn" id="addRoleBtn" type="button">+</button>
        <button class="btn p" id="groupBtn" type="button">群聊</button>
      </div>
    </div>
    <div class="page" style="padding:0;">
      <div style="padding:10px 12px;border-bottom:1px solid #eee;background:#fff;">
        <input id="wechatSearch" class="input" placeholder="搜索联系人" />
      </div>
      <div id="wechatList" class="wechat-list"></div>
    </div>
  </section>

  <section id="probe" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>查手机</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>
  <section id="books" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>书籍工坊</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>
  <section id="fanfic" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>同人文</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>
  <section id="pdd" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>拼多多</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>
  <section id="worldbook" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>世界书</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>

  <section id="appearance" class="screen">
    <div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>外观</b><button class="btn p" id="applyWpBtn" type="button">应用</button></div>
    <div class="page">
      <div class="card"><div class="small">壁纸URL</div><input id="wpUrl" class="input" placeholder="https://..." /></div>
      <div class="card"><div class="small">本地上传</div><input id="wpFile" type="file" accept="image/*" /></div>
    </div>
  </section>

  <section id="api" class="screen"><div class="header"><button class="btn" onclick="show('home')">‹ 返回</button><b>API</b><span></span></div><div class="page"><div class="card">骨架页</div></div></section>

  <div id="roleModal" class="modal-mask">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">创建角色</h3>

      <div class="small">昵称</div>
      <input id="roleName" class="input" placeholder="例如：沈昼白" />

      <div class="small" style="margin-top:8px;">分组（可自定义）</div>
      <input id="roleGroupInput" class="input" list="roleGroupList" placeholder="例如：朋友 / 家人 / 同学 / 恋人 / 工作..." />
      <datalist id="roleGroupList"></datalist>

      <div class="small" style="margin-top:8px;">头像（本地上传 或 URL）</div>
      <div class="row">
        <button class="btn" type="button" id="pickAvatarBtn">上传头像</button>
        <input id="roleAvatar" class="input" placeholder="https://..." />
      </div>
      <input id="roleAvatarFile" type="file" accept="image/*" style="display:none;" />
      <img id="roleAvatarPreview" style="width:56px;height:56px;border-radius:12px;object-fit:cover;margin-top:8px;display:none;border:1px solid #eee;" />

      <div class="small" style="margin-top:8px;">人设</div>
      <textarea id="rolePersona" class="ta" placeholder="写角色性格、背景、说话方式..."></textarea>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px;">
        <button class="btn" type="button" id="cancelRoleBtn">取消</button>
        <button class="btn p" type="button" id="saveRoleBtn">保存</button>
      </div>
    </div>
  </div>

  <input type="file" id="roleImportInput" accept=".json,.png,.jpg,.jpeg,.webp,application/json,image/*" style="display:none;" />
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  const WECHAT_KEY = 'wechat_contacts_fast_v1';
  const GROUP_KEY = 'wechat_groups_fast_v1';
  let roleAvatarData = '';

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el = $(id); if(el) el.classList.add('active');
  }
  window.show = show;

  function escapeHtml(s=''){
    return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  }

  // clock
  function tick(){
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    const w = ['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
    $('timeText').textContent = `${h}:${m}`;
    $('dateText').textContent = `${n.getMonth()+1}月${n.getDate()}日 ${w}`;
  }

  // petals
  function initPetals(){
    const canvas = $('petals');
    const ctx = canvas.getContext('2d');
    let ps = [];
    function resize(){
      const box = $('phone');
      canvas.width = box.clientWidth;
      canvas.height = box.clientHeight;
      ps = Array.from({length:36},()=>({
        x:Math.random()*canvas.width, y:Math.random()*canvas.height,
        rx:Math.random()*2.2+1, ry:Math.random()*1.6+0.8,
        vx:(Math.random()-.5)*0.35, vy:Math.random()*0.55+0.2,
        a:Math.random()*0.45+0.15
      }));
    }
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ps.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.y>canvas.height+10){p.y=-10;p.x=Math.random()*canvas.width;}
        if(p.x<-10)p.x=canvas.width+10;
        if(p.x>canvas.width+10)p.x=-10;
        ctx.beginPath(); ctx.ellipse(p.x,p.y,p.rx,p.ry,0,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,214,214,${p.a})`; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); draw();
    window.addEventListener('resize', resize);
  }

  // wallpaper
  function applyWallpaper(){
    const url = ($('wpUrl').value || '').trim();
    if(!url) return alert('先填壁纸URL');
    $('wallpaper').style.background = `linear-gradient(160deg, rgba(40,96,255,.28), rgba(125,221,255,.14)), url('${url}') center/cover no-repeat`;
    localStorage.setItem('wp', url);
    alert('壁纸已应用');
  }

  function initWallpaper(){
    const saved = localStorage.getItem('wp');
    if(saved){
      $('wallpaper').style.background = `linear-gradient(160deg, rgba(40,96,255,.28), rgba(125,221,255,.14)), url('${saved}') center/cover no-repeat`;
    }
    $('applyWpBtn').addEventListener('click', applyWallpaper);
    $('wpFile').addEventListener('change', e=>{
      const f = e.target.files?.[0];
      if(!f) return;
      const fr = new FileReader();
      fr.onload = ()=>{
        const data = fr.result;
        $('wallpaper').style.background = `linear-gradient(160deg, rgba(40,96,255,.28), rgba(125,221,255,.14)), url('${data}') center/cover no-repeat`;
        localStorage.setItem('wp', data);
        alert('本地壁纸已应用');
      };
      fr.readAsDataURL(f);
      e.target.value='';
    });
  }

  // contacts
  function getWechatContacts(){
    const raw = localStorage.getItem(WECHAT_KEY);
    if(raw){ try{return JSON.parse(raw);}catch(e){} }
    const seed=[{
      id:'c_'+Date.now(),
      name:'沈昼白',
      group:'朋友',
      avatar:'https://i.postimg.cc/y8xWzCqj/anime-boy.jpg',
      persona:'计算机系大三，爱分享日常',
      preview:'在吗 我刚遛狗回来',
      time:'刚刚',
      unread:2
    }];
    localStorage.setItem(WECHAT_KEY, JSON.stringify(seed));
    return seed;
  }
  function setWechatContacts(arr){
    localStorage.setItem(WECHAT_KEY, JSON.stringify(arr));
  }

  function getGroups(){
    const raw = localStorage.getItem(GROUP_KEY);
    if(raw){ try{return JSON.parse(raw);}catch(e){} }
    const init=['朋友','家人','同学','同事'];
    localStorage.setItem(GROUP_KEY, JSON.stringify(init));
    return init;
  }
  function saveGroups(arr){
    localStorage.setItem(GROUP_KEY, JSON.stringify([...new Set(arr.map(x=>String(x).trim()).filter(Boolean))]));
  }
  function addGroupIfNeeded(g){
    const v = String(g||'').trim();
    if(!v) return;
    const gs = getGroups();
    if(!gs.includes(v)){ gs.push(v); saveGroups(gs); }
  }

  function renderGroupOptions(){
    $('roleGroupList').innerHTML = getGroups().map(g=>`<option value="${escapeHtml(g)}"></option>`).join('');
  }

  function renderWechatList(keyword=''){
    const k = String(keyword||'').trim();
    const arr = getWechatContacts().filter(c=>{
      if(!k) return true;
      return (c.name||'').includes(k) || (c.group||'').includes(k) || (c.preview||'').includes(k);
    });

    $('wechatList').innerHTML = arr.map(c=>`
      <div class="wechat-item" data-id="${c.id}">
        <img class="wechat-avatar" src="${c.avatar || 'https://via.placeholder.com/88x88?text=头像'}" />
        <div class="wechat-main">
          <div class="wechat-top">
            <div class="wechat-name">${escapeHtml(c.name)}</div>
            <div class="wechat-time">${escapeHtml(c.time||'')}</div>
          </div>
          <div class="wechat-preview">${escapeHtml(c.preview||'点击进入聊天')}</div>
        </div>
        ${c.unread ? `<div class="wechat-badge">${c.unread}</div>` : ''}
      </div>
    `).join('') || `<div class="card small">暂无联系人，点右上角 + 创建或导入。</div>`;

    document.querySelectorAll('.wechat-item').forEach(item=>{
      item.onclick = ()=>{
        const id = item.dataset.id;
        const c = getWechatContacts().find(x=>x.id===id);
        alert(`下一步接入真实聊天页：${c?.name || ''}`);
      };
    });
  }

  // modal
  function openRoleModal(){ $('roleModal').style.display='grid'; renderGroupOptions(); }
  function closeRoleModal(){ $('roleModal').style.display='none'; }

  function saveRole(){
    const name = ($('roleName').value||'').trim();
    const group = ($('roleGroupInput').value||'').trim() || '未分组';
    const avatarUrl = ($('roleAvatar').value||'').trim();
    const persona = ($('rolePersona').value||'').trim();

    if(!name) return alert('昵称不能为空');
    addGroupIfNeeded(group);

    const arr = getWechatContacts();
    arr.unshift({
      id:'c_'+Date.now()+'_'+Math.floor(Math.random()*9999),
      name,
      group,
      avatar: roleAvatarData || avatarUrl || '',
      persona,
      preview:'新的聊天已创建',
      time:'刚刚',
      unread:0
    });

    try{
      setWechatContacts(arr);
    }catch(e){
      return alert('保存失败：本地存储空间不足');
    }

    $('roleName').value='';
    $('roleGroupInput').value='';
    $('roleAvatar').value='';
    $('rolePersona').value='';
    roleAvatarData='';
    $('roleAvatarPreview').style.display='none';
    $('roleAvatarPreview').src='';

    closeRoleModal();
    renderWechatList();
    alert('角色已保存');
  }

  // import
  function normalizeRoleObj(x){
    if(!x || typeof x !== 'object') return null;
    const name = (x.name || x.char_name || x.character_name || '').trim?.() || '';
    if(!name) return null;
    return {
      name,
      group: x.group || x.category || '朋友',
      avatar: x.avatar || x.avatar_url || '',
      persona: x.persona || x.description || x.prompt || '',
      preview: x.preview || '已导入角色',
      unread: Number(x.unread || 0)
    };
  }

  function readFileText(file){
    return new Promise((resolve,reject)=>{
      const fr = new FileReader();
      fr.onload = ()=>resolve(fr.result);
      fr.onerror = reject;
      fr.readAsText(file, 'utf-8');
    });
  }

  function compressImageToDataURL(file, maxSide=640, quality=0.78){
    return new Promise((resolve,reject)=>{
      const fr = new FileReader();
      fr.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let w = img.width, h = img.height;
          const scale = Math.min(1, maxSide / Math.max(w,h));
          w = Math.round(w*scale); h = Math.round(h*scale);
          const c = document.createElement('canvas');
          c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          resolve(c.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = fr.result;
      };
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  async function importRoleFile(file){
    const lower = (file.name||'').toLowerCase();
    const isJson = file.type === 'application/json' || lower.endsWith('.json');
    const isImage = file.type.startsWith('image/') || /\.(png|jpg|jpeg|webp)$/i.test(lower);

    if(isJson){
      let text = await readFileText(file);
      text = text.replace(/^\uFEFF/, '');
      let data;
      try{ data = JSON.parse(text); }catch(e){ throw new Error('JSON格式错误'); }

      const list = Array.isArray(data) ? data : [data];
      const arr = getWechatContacts();
      let ok = 0;

      for(const item of list){
        const n = normalizeRoleObj(item);
        if(!n) continue;
        addGroupIfNeeded(n.group);
        arr.unshift({
          id:'c_'+Date.now()+'_'+Math.floor(Math.random()*9999),
          name:n.name,
          group:n.group,
          avatar:n.avatar || '',
          persona:n.persona || '',
          preview:n.preview,
          time:'刚刚',
          unread:n.unread
        });
        ok++;
      }

      if(!ok) throw new Error('JSON里没有可识别角色（至少需要 name）');
      setWechatContacts(arr);
      renderWechatList();
      alert('JSON导入成功：'+ok+'个角色');
      return;
    }

    if(isImage){
      const avatar = await compressImageToDataURL(file, 640, 0.78);
      const baseName = file.name.replace(/\.[^.]+$/, '');
      const name = (prompt('输入角色名：', baseName) || '').trim();
      if(!name) throw new Error('已取消导入');

      const group = (prompt('输入分组（可自定义）：','朋友') || '朋友').trim() || '朋友';
      const persona = (prompt('可选：输入角色人设：','') || '').trim();
      addGroupIfNeeded(group);

      const arr = getWechatContacts();
      arr.unshift({
        id:'c_'+Date.now()+'_'+Math.floor(Math.random()*9999),
        name,
        group,
        avatar,
        persona,
        preview:'已从图片导入',
        time:'刚刚',
        unread:0
      });

      setWechatContacts(arr);
      renderWechatList();
      alert('图片导入成功');
      return;
    }

    throw new Error('暂不支持该格式，请使用 JSON 或图片文件');
  }

  // bind
  function bind(){
    $('addRoleBtn').onclick = ()=>{
      const create = confirm('点“确定”创建角色；点“取消”导入JSON/PNG/图片');
      if(create) openRoleModal();
      else $('roleImportInput').click();
    };
    $('groupBtn').onclick = ()=>alert('群聊选择器下一步接入');
    $('wechatSearch').oninput = e=>renderWechatList(e.target.value||'');

    $('cancelRoleBtn').onclick = closeRoleModal;
    $('saveRoleBtn').onclick = saveRole;

    $('roleImportInput').onchange = async (e)=>{
      const f = e.target.files?.[0];
      if(!f) return;
      try{
        document.body.style.cursor = 'progress';
        await importRoleFile(f);
      }catch(err){
        alert('导入失败：'+err.message);
      }finally{
        document.body.style.cursor = '';
        e.target.value = '';
      }
    };

    $('pickAvatarBtn').onclick = ()=> $('roleAvatarFile').click();
    $('roleAvatarFile').onchange = async (e)=>{
      const f = e.target.files?.[0];
      if(!f) return;
      roleAvatarData = await compressImageToDataURL(f, 640, 0.78);
      $('roleAvatarPreview').src = roleAvatarData;
      $('roleAvatarPreview').style.display = 'block';
      e.target.value = '';
    };

    $('roleModal').onclick = (e)=>{ if(e.target.id==='roleModal') closeRoleModal(); };
  }

  // init
  tick();
  setInterval(tick, 1000);
  initPetals();
  initWallpaper();
  bind();
  renderGroupOptions();
  renderWechatList();
})();
</script>
</body>
</html>
