<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 v1.3.5 稳定</title>
  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);

      --line:#e6e9f5;
      --bg:#f6f8ff;
      --blue:#2f66d8;
      --blue2:#5f8eff;
      --text:#243250;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;height:100%;
      background:linear-gradient(160deg,#2c57c8,#5ba9ff);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }

    #app{
      width:100%;
      max-width:430px;
      height:100dvh;
      min-height:100dvh;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      background:var(--bg);
    }

    .screen{position:absolute;inset:0;display:none;background:var(--bg)}
    .screen.active{display:block}

    .header{
      height:calc(52px + var(--safe-top));
      padding-top:var(--safe-top);
      display:flex;align-items:center;justify-content:space-between;
      padding-left:12px;padding-right:12px;
      background:linear-gradient(180deg,#f9fbff,#f4f8ff);
      border-bottom:1px solid var(--line);
    }

    .btn{
      border:none;border-radius:10px;padding:8px 12px;font-size:13px;
      background:#edf2ff;color:#173a7a;cursor:pointer;
    }
    .btn.p{background:var(--blue);color:#fff}
    .btn.d{background:#d9534f;color:#fff}
    .btn:active{transform:translateY(1px)}

    .page{
      height:calc(100% - (52px + var(--safe-top)));
      overflow:auto;
      padding:12px;
      padding-bottom:calc(12px + var(--safe-bottom));
      display:flex;flex-direction:column;gap:10px;
      background:var(--bg);
    }

    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#778;line-height:1.5}
    .row{display:flex;gap:8px;align-items:center}
    .input,.ta,.select{
      width:100%;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fff;
      font-size:16px;
      outline:none;
    }
    .input:focus,.ta:focus,.select:focus{
      border-color:#bcd0ff;
      box-shadow:0 0 0 2px rgba(90,130,230,.12);
    }
    .ta{resize:none}
    .hidden{display:none !important}

    /* HOME */
    #home{color:#fff;background:transparent}
    .wall{
      position:absolute;
      left:0;right:0;
      top:calc(-1 * var(--safe-top));
      height:calc(100% + var(--safe-top));
      z-index:0;
      background:
        linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
        url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
    }
    .home-layer{
      position:relative;z-index:2;height:100%;
      padding:calc(18px + var(--safe-top)) 12px calc(14px + var(--safe-bottom));
      display:flex;flex-direction:column;
    }
    .date{font-size:15px;opacity:.96}
    .time{
      font-size:72px;line-height:1.02;font-weight:760;letter-spacing:-2px;
      text-shadow:0 2px 12px rgba(0,0,0,.2);
    }

    /* 风铃 */
    .windchime{
      position:absolute;
      top:calc(6px + var(--safe-top));
      right:12px;
      width:74px;height:128px;
      transform-origin:top center;
      animation:chimeSwing 3.2s ease-in-out infinite;
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.26));
      pointer-events:none;z-index:3;
    }
    .windchime .ring{
      width:28px;height:10px;margin:0 auto;
      border:2px solid rgba(255,255,255,.95);
      border-radius:999px;background:rgba(255,255,255,.18);
    }
    .windchime .line{
      position:absolute;top:10px;width:2px;
      background:linear-gradient(to bottom,rgba(255,255,255,.95),rgba(255,255,255,.18));
      transform-origin:top center;
    }
    .windchime .line span{
      position:absolute;left:50%;transform:translateX(-50%);
      border-radius:999px;background:rgba(255,255,255,.92);
      box-shadow:0 0 10px rgba(255,255,255,.5);
    }
    .windchime .l1{left:17px;height:42px;animation:lineSwingA 3.2s ease-in-out infinite}
    .windchime .l2{left:35px;height:55px;animation:lineSwingB 3.2s ease-in-out infinite}
    .windchime .l3{left:53px;height:46px;animation:lineSwingC 3.2s ease-in-out infinite}
    .windchime .l1 span{bottom:-6px;width:8px;height:8px}
    .windchime .l2 span{bottom:-7px;width:10px;height:10px}
    .windchime .l3 span{bottom:-6px;width:8px;height:8px}
    .windchime .pendulum{
      position:absolute;left:35px;top:66px;transform:translateX(-50%);
      width:2px;height:42px;
      background:linear-gradient(to bottom,rgba(255,255,255,.85),rgba(255,255,255,.2));
    }
    .windchime .pendulum::after{
      content:"";
      position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);
      width:22px;height:14px;border-radius:4px 4px 8px 8px;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(220,240,255,.72));
      box-shadow:0 0 12px rgba(255,255,255,.5);
    }
    @keyframes chimeSwing{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-8deg)}}
    @keyframes lineSwingA{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-5deg)}}
    @keyframes lineSwingB{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-3deg)}}
    @keyframes lineSwingC{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

    .widgets{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .widget{
      background:rgba(255,255,255,.30);
      border:1px solid rgba(255,255,255,.48);
      border-radius:18px;padding:10px 12px;backdrop-filter:blur(12px)
    }
    .widget .t{font-size:12px;opacity:.9}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}

    .grid{margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px}
    .icon{text-align:center;cursor:pointer}
    .ibox{
      width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;
      background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.45);font-size:27px;
      transition:transform .12s ease;
    }
    .icon:active .ibox{transform:scale(.88)}
    .lab{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}

    /* list */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{
      background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;
      display:flex;gap:10px;align-items:center;
    }
    .avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff;flex-shrink:0}
    .main{flex:1;min-width:0;cursor:pointer}
    .name{font-weight:600;color:#222}
    .preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t{font-size:11px;color:#999}

    /* chat header */
    .chat-head-center{
      min-width:0;flex:1;text-align:center;padding:0 8px;
      display:flex;flex-direction:column;gap:2px;
    }
    .chat-head-title{
      color:#1f2742;font-weight:700;font-size:15px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .chat-head-sub{
      color:#6b7598;font-size:11px;line-height:1;
      min-height:12px;
    }
    .icon-btn{
      width:34px;height:34px;border:none;border-radius:10px;cursor:pointer;
      background:linear-gradient(180deg,#f3f7ff,#e8f0ff);
      border:1px solid #d7e3ff;
      color:#4a67a8;font-size:18px;
      display:grid;place-items:center;
      box-shadow:0 1px 3px rgba(61,93,161,.12);
    }
    .icon-btn:active{transform:translateY(1px)}

    /* chat list area */
    #chatMsgs{
      height:calc(100% - (52px + var(--safe-top)) - (78px + var(--safe-bottom)));
      overflow:auto;
      padding:12px;
      background:linear-gradient(180deg,#edf2ff,#edf1f8);
      display:flex;flex-direction:column;gap:10px;
    }
    .msg-row{display:flex;gap:8px;align-items:flex-end}
    .msg-row.me{justify-content:flex-end}
    .chat-avatar{
      width:32px;height:32px;border-radius:10px;object-fit:cover;background:#dde6ff;flex-shrink:0;
    }
    .bubble{
      max-width:74%;
      padding:10px 12px;
      border-radius:14px;
      line-height:1.48;
      word-break:break-word;
      white-space:pre-wrap;
      letter-spacing:.2px;
      color:var(--text);
    }
    .bubble.me{
      background:linear-gradient(160deg,#5f8eff,#2f66d8);
      color:#fff;border-bottom-right-radius:7px;
      box-shadow:0 2px 8px rgba(47,102,216,.22);
    }
    .bubble.ai{
      background:#fff;border:1px solid #e8e8ef;border-bottom-left-radius:7px;
    }

    /* offline layout */
    #chatRoom.offline-layout #chatMsgs{
      background:linear-gradient(180deg,#f2f6ff,#edf2ff);
      padding:10px 8px;gap:14px;
    }
    #chatRoom.offline-layout .msg-row{display:block;max-width:100%}
    #chatRoom.offline-layout .msg-head{
      display:flex;align-items:center;gap:8px;margin:0 6px 7px;
      color:#5d678b;font-size:12px;font-weight:600;
    }
    #chatRoom.offline-layout .msg-row.me .msg-head{justify-content:flex-end}
    #chatRoom.offline-layout .chat-avatar{
      width:44px;height:44px;border-radius:14px;
      box-shadow:0 2px 10px rgba(54,77,130,.16);
      border:1px solid rgba(255,255,255,.7);
    }
    #chatRoom.offline-layout .bubble{
      width:calc(100% - 12px);max-width:calc(100% - 12px);
      margin:0 6px;
      border-radius:17px;
      padding:13px 14px;
      line-height:1.66;
      font-size:15px;
      box-shadow:0 2px 9px rgba(60,85,140,.08);
    }
    #chatRoom.offline-layout .msg-row.me .bubble{
      margin-left:auto;
      background:linear-gradient(180deg,#4f7dff,#2f66d8);
      color:#fff;border-bottom-right-radius:10px;
    }
    #chatRoom.offline-layout .msg-row:not(.me) .bubble{
      background:#fff;border:1px solid #e2e9ff;border-bottom-left-radius:10px;
    }
    .status-card{
      display:block;
      background:linear-gradient(180deg,#f9fbff,#f3f7ff);
      border:1px dashed #cfdcff;
      border-radius:11px;
      padding:9px 10px;
      margin-bottom:9px;
      color:#4f5f8c;
      font-size:12px;
      line-height:1.55;
    }

    /* input bar */
    .chatInputBar{
      position:absolute;left:0;right:0;bottom:0;
      padding:10px;
      padding-bottom:calc(10px + var(--safe-bottom));
      background:linear-gradient(180deg,#f9fbff,#f4f7ff);
      border-top:1px solid #e2e8fb;
      display:flex;gap:8px;align-items:flex-end;
      box-shadow:0 -4px 16px rgba(56,89,162,.06);
    }
    #chatInput{
      flex:1;
      height:44px;min-height:44px;max-height:120px;
      overflow-y:auto;resize:none;
      border:1px solid #d8e1fb;
      background:#fff;border-radius:14px;
      padding:11px 12px;
      box-shadow:inset 0 1px 2px rgba(52,80,146,.06);
      color:#223050;
    }
    .send-actions{display:flex;gap:8px;align-items:center;align-self:flex-end}

    .store-btn{
      width:42px;height:42px;border-radius:12px;border:none;cursor:pointer;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(233,244,255,.92));
      border:1px solid #cfe3ff;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 2px 8px rgba(88,126,196,.18);
      position:relative;display:grid;place-items:center;
    }
    .store-btn::before{
      content:"";
      width:15px;height:15px;border-radius:999px;
      background:radial-gradient(circle at 35% 30%, #fff, #d8eeff 62%, #a5cfff);
      border:1px solid rgba(167,201,244,.75);
      box-shadow:0 0 8px rgba(186,224,255,.45);
    }

    .send-btn{
      min-width:64px;height:42px;padding:0 14px;border:none;border-radius:12px;cursor:pointer;
      color:#fff;font-weight:600;font-size:14px;
      background:linear-gradient(160deg,var(--blue2),var(--blue));
      box-shadow:0 3px 10px rgba(47,102,216,.28);
      border:1px solid rgba(45,96,205,.55);
    }
    .store-btn:active,.send-btn:active{transform:translateY(1px) scale(.98)}

    /* modal */
    .modal{
      position:absolute;inset:0;background:rgba(0,0,0,.34);
      display:none;place-items:center;z-index:99;padding:12px;
    }
    .modal.active{display:grid}
    .modal-card{
      width:100%;max-width:370px;max-height:90dvh;overflow:auto;
      background:#fff;border-radius:14px;padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .preview-img{
      width:64px;height:64px;border-radius:12px;object-fit:cover;
      border:1px solid #eee;background:#f3f5ff;
    }

    .seg{
      display:flex;gap:6px;align-items:center;
      padding:4px;border-radius:12px;
      background:#e9eefc;border:1px solid #dce4fb;width:max-content;
    }
    .seg button{
      border:none;background:transparent;color:#38538d;
      padding:6px 12px;border-radius:9px;cursor:pointer;font-size:12px;
    }
    .seg button.active{
      background:#fff;color:#244ea5;font-weight:600;
      box-shadow:0 1px 3px rgba(35,67,137,.15);
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="home-layer">
      <div class="windchime" aria-hidden="true">
        <div class="ring"></div>
        <div class="line l1"><span></span></div>
        <div class="line l2"><span></span></div>
        <div class="line l3"><span></span></div>
        <div class="pendulum"></div>
      </div>

      <div class="date" id="homeDate"></div>
      <div class="time" id="homeTime"></div>

      <div class="widgets">
        <div class="widget"><div class="t">纪念日</div><div class="v">第 233 天</div></div>
        <div class="widget"><div class="t">天气</div><div class="v">22°C 晴</div></div>
      </div>

      <div class="grid">
        <div class="icon" data-nav="wechat"><div class="ibox">💬</div><div class="lab">微信</div></div>
        <div class="icon" data-nav="api"><div class="ibox">🔑</div><div class="lab">API</div></div>
      </div>
    </div>
  </section>

  <!-- WECHAT -->
  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>微信</b>
      <button class="btn" id="addContactBtn">+联系人</button>
    </div>
    <div class="page">
      <input id="searchInput" class="input" placeholder="搜索联系人" />
      <div id="contactList" class="list"></div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" data-nav="wechat">‹ 返回</button>
      <div class="chat-head-center">
        <div id="chatTitle" class="chat-head-title">聊天</div>
        <div id="chatSubStatus" class="chat-head-sub">在线</div>
      </div>
      <button class="icon-btn" id="chatToolsBtn" title="聊天工具">✦</button>
    </div>

    <div id="chatMsgs"></div>

    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="输入消息..."></textarea>
      <div class="send-actions">
        <button class="store-btn" id="storeBtn" title="储存" aria-label="储存"></button>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
    </div>
  </section>

  <!-- API -->
  <section id="api" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>API 设置</b>
      <button class="btn p" id="saveApiBtn">保存</button>
    </div>
    <div class="page">
      <div class="card">
        <div class="small">API预设</div>
        <div class="row" style="margin-top:8px;">
          <select id="apiPresetSelect" class="select"></select>
          <button class="btn" id="newPresetBtn">新建</button>
          <button class="btn d" id="delPresetBtn">删</button>
        </div>
      </div>

      <div class="card"><div class="small">Base URL</div><input id="apiBase" class="input" placeholder="https://api.cetaceang.qzz.io" /></div>
      <div class="card"><div class="small">API Key</div><input id="apiKey" class="input" type="password" /></div>
      <div class="card">
        <div class="small">Model</div>
        <select id="apiModel" class="select"></select>
        <div style="margin-top:8px"><button class="btn" id="fetchModelsBtn">拉取模型</button></div>
      </div>
      <div class="card"><div class="small">Temperature</div><input id="apiTemp" class="input" type="number" min="0" max="2" step="0.1" value="0.85" /></div>

      <div class="card">
        <button class="btn" id="testApiBtn">测试连接</button>
        <div id="apiStatus" class="small" style="margin-top:8px;">状态：未测试</div>
      </div>
    </div>
  </section>

  <!-- 创建联系人 -->
  <div id="contactModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">创建联系人</h3>
      <div class="small">昵称</div>
      <input id="newName" class="input" placeholder="例如：沈昼白" />

      <div class="small" style="margin-top:8px;">头像（上传 或 URL）</div>
      <div class="row">
        <button class="btn" id="pickAvatarBtn">上传</button>
        <input id="newAvatarUrl" class="input" placeholder="https://..." />
      </div>
      <input id="newAvatarFile" type="file" accept="image/*" class="hidden" />
      <img id="newAvatarPreview" class="preview-img hidden" style="margin-top:8px;" />

      <div class="small" style="margin-top:8px;">人设</div>
      <textarea id="newPersona" class="ta" style="min-height:200px;"></textarea>

      <div class="row" style="justify-content:flex-end;margin-top:10px;">
        <button class="btn" id="cancelCreateBtn">取消</button>
        <button class="btn p" id="saveCreateBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 聊天工具 -->
  <div id="chatToolsModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">聊天模式与人设</h3>

      <div class="small">模式切换（即时生效）</div>
      <div class="seg" style="margin-top:8px;">
        <button id="toolModeOnlineBtn" class="active">线上</button>
        <button id="toolModeOfflineBtn">线下</button>
      </div>
      <div class="small" style="margin-top:8px;color:#5f6b92;">线上：自由条数短气泡；线下：一条长消息（酒馆风）</div>

      <hr style="opacity:.2;margin:14px 0;">
      <div class="small"><b>线下字数区间</b></div>
      <div class="row" style="margin-top:8px;">
        <div style="flex:1">
          <div class="small">最小字数</div>
          <input id="toolOfflineMin" class="input" type="number" min="60" max="2000" />
        </div>
        <div style="flex:1">
          <div class="small">最大字数</div>
          <input id="toolOfflineMax" class="input" type="number" min="80" max="2600" />
        </div>
      </div>

      <hr style="opacity:.2;margin:14px 0;">
      <div class="small"><b>对方人设（当前联系人）</b></div>
      <textarea id="toolAiPersona" class="ta" style="min-height:110px;margin-top:8px;"></textarea>

      <div class="small" style="margin-top:10px;"><b>我的人设（全局）</b></div>
      <textarea id="toolMyPersona" class="ta" style="min-height:100px;margin-top:8px;"></textarea>

      <div class="row" style="justify-content:flex-end;margin-top:12px;">
        <button class="btn" id="closeToolsBtn">取消</button>
        <button class="btn p" id="saveToolsBtn">保存</button>
      </div>
    </div>
  </div>

</div>

<script>
(() => {
  // -------- storage wrapper (防止某些环境 localStorage 不稳定) --------
  const memoryStore = {};
  const S = {
    get(key, fallback){
      try{
        const raw = localStorage.getItem(key);
        if(raw==null) return key in memoryStore ? memoryStore[key] : fallback;
        return JSON.parse(raw);
      }catch{
        return key in memoryStore ? memoryStore[key] : fallback;
      }
    },
    set(key, value){
      memoryStore[key] = value;
      try{ localStorage.setItem(key, JSON.stringify(value)); }catch{}
    }
  };

  // keys
  const K_CONTACT='mp_v135_contacts';
  const K_CHAT='mp_v135_chats';
  const K_API='mp_v135_api';
  const K_ME='mp_v135_me';
  const K_PREF='mp_v135_pref';

  // states
  let currentId = null;
  let createAvatar = '';

  // utils
  const $ = id => document.getElementById(id);
  const clean = s => String(s||'').replace(/[\u0000-\u001F\u007F\uFFFD]/g,'').trim();
  const clamp = (n,min,max)=>Math.max(min,Math.min(max,n));
  const sleep = ms => new Promise(r=>setTimeout(r,ms));
  const esc = s => String(s||'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));

  // nav
  function show(id){

  function compressImage(file,maxSide=260,quality=0.5){
    return new Promise((resolve,reject)=>{
      const fr = new FileReader();
      fr.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let w = img.width, h = img.height;
          const s = Math.min(1,maxSide/Math.max(w,h));
          w = Math.round(w*s); h = Math.round(h*s);
          const c = document.createElement('canvas');
          c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          let out='';
          try{ out=c.toDataURL('image/webp',quality);}catch{}
          if(!out || out.startsWith('data:,')) out=c.toDataURL('image/jpeg',quality);
          resolve(out);
        };
        img.onerror = reject;
        img.src = fr.result;
      };
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  // split helpers
  function splitSentence(text){
    const arr = text.match(/[^。！？!?；;]+[。！？!?；;]?/g);
    return (arr && arr.length) ? arr.map(s=>s.trim()).filter(Boolean) : [text];
  }

  function splitLongSmart(s, target=28, hardMax=36){
    const out=[];
    let str=s.trim();
    while(str.length>hardMax){
      let cut=-1;
      const nearMin=Math.max(10,target-8);
      const nearMax=Math.min(str.length-1,target+8);

      for(let i=nearMax;i>=nearMin;i--){
        if('，、；：,;:'.includes(str[i])){ cut=i+1; break; }
      }
      if(cut<0){
        for(let i=nearMax;i>=nearMin;i--){
          if(str[i]===' '){ cut=i+1; break; }
        }
      }
      if(cut<0) cut=target;

      out.push(str.slice(0,cut).trim());
      str=str.slice(cut).trim();
    }
    if(str) out.push(str);
    return out.filter(Boolean);
  }

  function splitOnlineBubbles(raw){
    let txt = clean(raw);
    if(!txt) return ['...'];

    txt = txt.replace(/^```[\w-]*\n?/,'').replace(/```$/,'').trim();

    // 先按换行
    let lines = txt.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    if(lines.length<=1) lines = splitSentence(txt);

    const bubbles = [];
    for(let line of lines){
      if(!line) continue;

      if(line.length<=36){
        bubbles.push(line);
        continue;
      }

      // 长句先按句子分，再聚合
      const segs = splitSentence(line);
      let buf='';
      for(let seg of segs){
        seg = seg.trim();
        if(!seg) continue;

        if(seg.length>36){
          if(buf){ bubbles.push(buf); buf=''; }
          bubbles.push(...splitLongSmart(seg,28,36));
          continue;
        }
        if((buf+seg).length<=30){
          buf += seg;
        }else{
          if(buf) bubbles.push(buf);
          buf = seg;
        }
      }
      if(buf) bubbles.push(buf);
    }

    // 清理碎片
    const merged=[];
    for(const b of bubbles){
      if(!merged.length){ merged.push(b); continue; }
      if(b.length<=2 && (merged[merged.length-1].length + b.length)<=36){
        merged[merged.length-1] += b;
      }else{
        merged.push(b);
      }
    }
    return merged.filter(Boolean).slice(0,24);
  }

  async function callApi(messages, cfg){
    if(!cfg?.base || !cfg?.key) throw new Error('请先到 API 页配置并保存 Base URL / API Key');
    const url = buildUrl(cfg.base,'/v1/chat/completions');

    const r = await fetch(url,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+cfg.key
      },
      body:JSON.stringify({
        model: cfg.model || 'gpt-4o-mini',
        temperature: Number(cfg.temp ?? 0.85),
        messages
      })
    });
    const data = await r.json().catch(()=>({}));
    if(!r.ok) throw new Error(data?.error?.message || ('HTTP '+r.status));
    return clean(data?.choices?.[0]?.message?.content || '');
  }

  async function sendMsg(){
    if(!currentId) return;

    const input = clean($('chatInput').value);
    if(input) pushUser(input);
    $('chatInput').value='';
    resetInputH();
    renderChat();

    const map = getChats();
    const hist = (map[currentId]||[]).filter(x=>x.text);
    if(!hist.length) return;

    const pref = getPref();
    const contact = getContacts().find(x=>x.id===currentId);
    const me = getMe();
    const cfg = getActiveApiCfg();

    setChatSubStatus('对方正在输入…');

    try{
      const system = pref.mode==='online'
        ? onlinePrompt(contact, me)
        : offlinePrompt(contact, me, pref.offlineMinLen, pref.offlineMaxLen);

      const messages = [
        {role:'system', content:system},
        ...hist.slice(-28).map(x=>({role:x.role==='user'?'user':'assistant',content:x.text}))
      ];

      let out = await callApi(messages, cfg);

      if(pref.mode==='online'){
        const parts = splitOnlineBubbles(out);
        await emitAiSequential(parts, map);

        const arr = getContacts();
        const i = arr.findIndex(x=>x.id===currentId);
        if(i>=0){
          arr[i].preview = parts[0] || '...';
          arr[i].time = '刚刚';
          setContacts(arr);
        }
        renderContacts($('searchInput').value||'');
      }else{
        // 线下太短则补写一轮
        if(out.length < Math.floor(pref.offlineMinLen*0.75)){
          const rescue = [
            {role:'system',content:system},
            ...hist.slice(-20).map(x=>({role:x.role==='user'?'user':'assistant',content:x.text})),
            {role:'user',content:`请重写，严格控制在 ${pref.offlineMinLen}-${pref.offlineMaxLen} 字，且保留“状态+正文”格式。`}
          ];
          out = await callApi(rescue, cfg);
        }

        await sleep(900 + Math.floor(Math.random()*350));
        map[currentId].push({role:'assistant',text:out||'…',time:Date.now()});
        setChats(map);
        renderChat();

        const arr = getContacts();
        const i = arr.findIndex(x=>x.id===currentId);
        if(i>=0){
          arr[i].preview='[线下沉浸回复]';
          arr[i].time='刚刚';
          setContacts(arr);
        }
        renderContacts($('searchInput').value||'');
      }

      setChatSubStatus('在线');
    }catch(e){
      map[currentId].push({role:'assistant',text:'请求失败：'+clean(e.message),time:Date.now()});
      setChats(map);
      renderChat();
      setChatSubStatus('在线');
    }
  }

  $('sendBtn').onclick = sendMsg;

  // Enter=储存；Ctrl/Cmd+Enter=发送
  $('chatInput').addEventListener('keydown', e=>{
    if(e.key==='Enter' && !e.shiftKey){
      e.preventDefault();
      if(e.ctrlKey || e.metaKey) sendMsg();
      else storeCurrentInput();
    }
  });

  // init
  loadApiForm();
  renderContacts();
  applyModeUI();
})();
</script>
</body>
</html>
