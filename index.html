
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EPhone · 基础版</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171b24;
      --panel-2:#1f2531;
      --line:#2b3445;
      --text:#eaf0ff;
      --sub:#9aa5b5;
      --accent:#5b8cff;
      --danger:#ff4d4f;
      --ok:#28c76f;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;height:100%;background:#080a0f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);}
    #phone{
      width:min(430px,100vw);
      height:100dvh;
      margin:0 auto;
      background:linear-gradient(180deg,#10141d 0%,#0d1017 100%);
      border-left:1px solid #1b2230;
      border-right:1px solid #1b2230;
      overflow:hidden;
      position:relative;
    }
    #status-bar{
      height:30px;
      padding:8px 12px 0;
      display:flex;justify-content:space-between;align-items:center;
      color:var(--sub);font-size:12px;
    }
    .screen{
      position:absolute;inset:30px 0 0;
      display:none;flex-direction:column;
    }
    .screen.active{display:flex;}
    .header{
      height:52px;display:flex;align-items:center;justify-content:space-between;
      padding:0 14px;border-bottom:1px solid var(--line);
      background:rgba(13,16,23,.88);backdrop-filter:blur(8px);
      font-weight:600;
    }
    .back{font-size:24px;line-height:1;cursor:pointer;user-select:none;color:#dbe4ff;}
    .ghost{width:24px;}
    .btn{
      border:none;border-radius:10px;padding:10px 12px;cursor:pointer;
      background:var(--panel-2);color:var(--text);font-weight:600;
    }
    .btn.primary{background:var(--accent);color:#fff;}
    .btn.danger{background:var(--danger);color:#fff;}
    .btn.small{padding:6px 10px;font-size:12px;border-radius:8px;}
    /* Home */
    #home{padding:12px 14px 16px;overflow:auto;}
    .card{
      background:var(--panel);border:1px solid var(--line);border-radius:14px;
      padding:14px;
    }
    .profile{display:flex;gap:12px;align-items:flex-start;}
    .avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:1px solid #2f3a4f;}
    .name{margin:2px 0 6px;font-size:16px;font-weight:700;}
    .bio{margin:0;color:var(--sub);font-size:13px;line-height:1.45;}
    .grid{
      margin-top:14px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;
    }
    .app{
      border:1px solid var(--line);background:var(--panel-2);border-radius:12px;
      min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:6px;cursor:pointer;
    }
    .app .emoji{font-size:22px;line-height:1;}
    .app small{font-size:12px;color:var(--sub);}
    /* list */
    #chat-list-wrap{display:flex;flex-direction:column;min-height:0;flex:1;}
    #chat-list{overflow:auto;flex:1;}
    .chat-item{
      display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);
      cursor:pointer;
    }
    .chat-item img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:1px solid #2f3a4f;}
    .meta{flex:1;min-width:0;}
    .meta .top{display:flex;justify-content:space-between;gap:10px;align-items:center;}
    .meta .n{font-weight:600;}
    .meta .t{font-size:12px;color:var(--sub);}
    .meta .l{margin-top:4px;color:var(--sub);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .toolbar{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:8px;background:rgba(13,16,23,.9);}
    .toolbar input{
      flex:1;background:#141923;border:1px solid var(--line);color:var(--text);
      border-radius:10px;padding:10px 12px;outline:none;
    }
    /* chat */
    #chat-messages{
      flex:1;min-height:0;overflow:auto;padding:12px;
      display:flex;flex-direction:column;gap:10px;
    }
    .msg{
      max-width:82%;padding:10px 12px;border-radius:14px;
      font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word;
      border:1px solid transparent;
    }
    .msg.ai{align-self:flex-start;background:#222b3a;border-color:#303c52;border-bottom-left-radius:6px;}
    .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:6px;}
    .msg.sys{
      align-self:center;max-width:100%;font-size:12px;color:var(--sub);
      background:transparent;border:none;padding:4px 0;
    }
    #input-row{
      border-top:1px solid var(--line);padding:10px;display:flex;gap:8px;background:rgba(13,16,23,.9);
    }
    #input-row textarea{
      flex:1;resize:none;max-height:120px;height:42px;
      background:#141923;border:1px solid var(--line);color:var(--text);
      border-radius:10px;padding:10px 12px;outline:none;
      font:inherit;line-height:1.4;
    }
    /* api */
    .form{padding:14px;overflow:auto;}
    .form .g{margin-bottom:10px;}
    .form label{display:block;margin-bottom:6px;font-size:13px;color:var(--sub);}
    .form input{
      width:100%;background:#141923;border:1px solid var(--line);
      color:var(--text);border-radius:10px;padding:11px 12px;outline:none;
    }
    .hint{font-size:12px;color:var(--sub);margin:6px 0 0;line-height:1.4;}
    .toast{
      position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
      background:#161d2a;border:1px solid #2c3850;color:#dce7ff;
      border-radius:10px;padding:8px 12px;font-size:12px;z-index:99;
    }
  </style>
</head>
<body>
  <div id="phone">
    <div id="status-bar">
      <span id="time">12:00</span>
      <span id="battery">100%</span>
    </div>

    <!-- 主屏幕 -->
    <section id="screen-home" class="screen active">
      <div id="home">
        <div class="card profile">
          <img class="avatar" src="https://i.postimg.cc/y8xWzCqj/anime-boy.jpg" alt="avatar">
          <div>
            <div class="name">弥洛</div>
            <p class="bio">基础版先跑通：主屏幕、聊天、API 设置。</p>
          </div>
        </div>

        <div class="grid">
          <div class="app" id="go-chat-list">
            <div class="emoji">💬</div><small>消息</small>
          </div>
          <div class="app" id="go-api">
            <div class="emoji">⚙️</div><small>API设置</small>
          </div>
        </div>
      </div>
    </section>

    <!-- 聊天列表 -->
    <section id="screen-chat-list" class="screen">
      <div class="header">
        <span class="back" data-back="screen-home">‹</span>
        <span>消息</span>
        <button class="btn small" id="add-chat">+ 会话</button>
      </div>
      <div id="chat-list-wrap">
        <div id="chat-list"></div>
        <div class="toolbar">
          <input id="new-chat-name" placeholder="新会话名（可空）">
          <button class="btn primary" id="create-chat">创建</button>
        </div>
      </div>
    </section>

    <!-- 聊天界面 -->
    <section id="screen-chat" class="screen">
      <div class="header">
        <span class="back" data-back="screen-chat-list">‹</span>
        <span id="chat-title">聊天</span>
        <button class="btn small danger" id="clear-chat">清空</button>
      </div>
      <div id="chat-messages"></div>
      <div id="input-row">
        <textarea id="chat-input" placeholder="输入消息..." rows="1"></textarea>
        <button class="btn primary" id="send">发送</button>
      </div>
    </section>

    <!-- API设置 -->
    <section id="screen-api" class="screen">
      <div class="header">
        <span class="back" data-back="screen-home">‹</span>
        <span>API 设置</span>
        <span class="ghost"></span>
      </div>
      <div class="form">
        <div class="g">
          <label for="proxyUrl">反代地址（不带 /v1）</label>
          <input id="proxyUrl" type="text" placeholder="https://api.openai.com">
        </div>
        <div class="g">
          <label for="apiKey">API Key</label>
          <input id="apiKey" type="password" placeholder="sk-...">
        </div>
        <div class="g">
          <label for="model">模型</label>
          <input id="model" type="text" placeholder="gpt-4o-mini">
        </div>
        <div class="g">
          <label for="temperature">Temperature (0~2)</label>
          <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.8">
          <p class="hint">如需图片理解请换支持视觉的模型。基础版先走文本。</p>
        </div>
        <button class="btn primary" id="save-api" style="width:100%;">保存 API 设置</button>
      </div>
    </section>
  </div>

  <script>
    const STORE = "ephone_base_v1";
    const state = {
      screen: "screen-home",
      currentChatId: null,
      data: {
        api: {
          proxyUrl: "",
          apiKey: "",
          model: "gpt-4o-mini",
          temperature: 0.8
        },
        chats: [
          {
            id: "default",
            name: "弥洛",
            avatar: "https://i.postimg.cc/y8xWzCqj/anime-boy.jpg",
            messages: [
              { role: "assistant", content: "先把基础版跑通，再往上叠功能。", time: Date.now() }
            ]
          }
        ]
      }
    };

    // ---------- init ----------
    (function init(){
      load();
      bind();
      renderClock();
      setInterval(renderClock, 30000);
      fillApiForm();
      renderChatList();
    })();

    function bind(){
      document.getElementById("go-chat-list").onclick = () => show("screen-chat-list");
      document.getElementById("go-api").onclick = () => show("screen-api");

      document.querySelectorAll(".back").forEach(el=>{
        el.onclick = () => show(el.dataset.back);
      });

      document.getElementById("save-api").onclick = saveApi;

      document.getElementById("create-chat").onclick = createChat;
      document.getElementById("add-chat").onclick = () => {
        document.getElementById("new-chat-name").focus();
      };

      document.getElementById("send").onclick = sendMessage;
      const input = document.getElementById("chat-input");
      input.addEventListener("input", autoGrow);
      input.addEventListener("keydown", (e)=>{
        if(e.key==="Enter" && !e.shiftKey){
          e.preventDefault();
          sendMessage();
        }
      });

      document.getElementById("clear-chat").onclick = () => {
        const chat = curChat();
        if(!chat) return;
        chat.messages = [];
        persist();
        renderMessages([]);
      };
    }

    function show(id){
      document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      state.screen = id;
      if(id==="screen-chat-list") renderChatList();
    }

    // ---------- clock ----------
    function renderClock(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,"0");
      const mm = String(d.getMinutes()).padStart(2,"0");
      document.getElementById("time").textContent = `${hh}:${mm}`;
    }

    // ---------- storage ----------
    function load(){
      try{
        const raw = localStorage.getItem(STORE);
        if(!raw) return;
        const parsed = JSON.parse(raw);
        if(parsed?.api && Array.isArray(parsed?.chats)) state.data = parsed;
      }catch(e){
        console.warn(e);
      }
    }
    function persist(){
      localStorage.setItem(STORE, JSON.stringify(state.data));
    }

    // ---------- API ----------
    function fillApiForm(){
      const a = state.data.api;
      document.getElementById("proxyUrl").value = a.proxyUrl || "";
      document.getElementById("apiKey").value = a.apiKey || "";
      document.getElementById("model").value = a.model || "gpt-4o-mini";
      document.getElementById("temperature").value = a.temperature ?? 0.8;
    }

    function saveApi(){
      state.data.api.proxyUrl = document.getElementById("proxyUrl").value.trim();
      state.data.api.apiKey = document.getElementById("apiKey").value.trim();
      state.data.api.model = document.getElementById("model").value.trim() || "gpt-4o-mini";
      state.data.api.temperature = Number(document.getElementById("temperature").value || 0.8);
      persist();
      toast("API 设置已保存");
    }

    // ---------- chat list ----------
    function renderChatList(){
      const list = document.getElementById("chat-list");
      list.innerHTML = "";
      state.data.chats.forEach(chat=>{
        const last = chat.messages[chat.messages.length-1];
        const item = document.createElement("div");
        item.className = "chat-item";
        item.innerHTML = `
          <img src="${escAttr(chat.avatar)}" alt="${escAttr(chat.name)}">
          <div class="meta">
            <div class="top">
              <span class="n">${esc(chat.name)}</span>
              <span class="t">${last ? time(last.time) : ""}</span>
            </div>
            <div class="l">${esc(last ? last.content : "还没有消息")}</div>
          </div>
        `;
        item.onclick = ()=>openChat(chat.id);
        list.appendChild(item);
      });
    }

    function createChat(){
      const v = document.getElementById("new-chat-name");
      const name = v.value.trim() || `新会话 ${state.data.chats.length + 1}`;
      const id = "c_" + Date.now();
      state.data.chats.unshift({
        id, name,
        avatar:"https://i.postimg.cc/y8xWzCqj/anime-boy.jpg",
        messages:[]
      });
      v.value = "";
      persist();
      renderChatList();
      toast("会话已创建");
    }

    function openChat(id){
      state.currentChatId = id;
      const chat = curChat();
      document.getElementById("chat-title").textContent = chat?.name || "聊天";
      renderMessages(chat?.messages || []);
      show("screen-chat");
    }

    function curChat(){
      return state.data.chats.find(c=>c.id===state.currentChatId);
    }

    // ---------- messages ----------
    function renderMessages(messages){
      const box = document.getElementById("chat-messages");
      box.innerHTML = "";
      if(!messages.length){
        const d = document.createElement("div");
        d.className = "msg sys";
        d.textContent = "开始聊天吧";
        box.appendChild(d);
      }else{
        messages.forEach(m=>{
          const d = document.createElement("div");
          d.className = "msg " + (m.role==="user" ? "user" : "ai");
          d.textContent = m.content;
          box.appendChild(d);
        });
      }
      box.scrollTop = box.scrollHeight;
    }

    function pushMsg(role, content){
      const chat = curChat();
      if(!chat) return;
      chat.messages.push({role, content, time: Date.now()});
      persist();
      renderMessages(chat.messages);
    }

    async function sendMessage(){
      const chat = curChat();
      if(!chat){
        toast("请先选择会话");
        return;
      }
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if(!text) return;

      input.value = "";
      input.style.height = "42px";

      pushMsg("user", text);

      const box = document.getElementById("chat-messages");
      const typing = document.createElement("div");
      typing.className = "msg sys";
      typing.textContent = "对方正在输入...";
      box.appendChild(typing);
      box.scrollTop = box.scrollHeight;

      try{
        const reply = await callAPI(chat.messages);
        typing.remove();
        pushMsg("assistant", reply || "（空响应）");
      }catch(err){
        typing.remove();
        pushMsg("assistant", "请求失败：" + err.message);
      }
    }

    async function callAPI(messages){
      const cfg = state.data.api;
      if(!cfg.proxyUrl || !cfg.apiKey || !cfg.model){
        throw new Error("请先在 API 设置填写反代地址、Key、模型");
      }

      const url = cfg.proxyUrl.replace(/\/+$/,"") + "/v1/chat/completions";
      const payload = {
        model: cfg.model,
        temperature: cfg.temperature,
        messages: messages.map(m=>({
          role: m.role === "assistant" ? "assistant" : "user",
          content: m.content
        }))
      };

      const res = await fetch(url,{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":"Bearer " + cfg.apiKey
        },
        body: JSON.stringify(payload)
      });

      if(!res.ok){
        const txt = await res.text();
        throw new Error(`HTTP ${res.status} ${txt}`);
      }

      const data = await res.json();
      return data?.choices?.[0]?.message?.content?.trim() || "";
    }

    // ---------- helpers ----------
    function autoGrow(e){
      const el = e.target;
      el.style.height = "42px";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }
    function time(ts){
      const d = new Date(ts);
      return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }
    function esc(s=""){
      return s.replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }
    function escAttr(s=""){ return esc(s); }
    function toast(text){
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = text;
      document.getElementById("phone").appendChild(t);
      setTimeout(()=>t.remove(), 1300);
    }
  </script>
</body>
</html>
