<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 v1.3.7a 稳定修复</title>
  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --line:#e6e9f5;
      --bg:#f6f8ff;
      --blue:#2f66d8;
      --blue2:#5f8eff;
      --glass: rgba(255,255,255,.30);
      --glass-border: rgba(255,255,255,.48);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;height:100%;
      background:linear-gradient(160deg,#2c57c8,#5ba9ff);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    #app{
      width:100%;
      max-width:430px;
      height:100dvh;
      min-height:100dvh;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      background:var(--bg);
    }

    .screen{position:absolute;inset:0;display:none;background:var(--bg)}
    .screen.active{display:block}

    .header{
      height:calc(52px + var(--safe-top));
      padding-top:var(--safe-top);
      display:flex;align-items:center;justify-content:space-between;
      padding-left:12px;padding-right:12px;
      background:linear-gradient(180deg,#f8f9ff,#f6f8ff);
      border-bottom:1px solid var(--line);
    }

    .btn{
      border:none;border-radius:10px;padding:8px 12px;font-size:13px;
      background:#edf2ff;color:#173a7a;cursor:pointer;
    }
    .btn.p{background:var(--blue);color:#fff}
    .btn.d{background:#d9534f;color:#fff}
    .btn:active{transform:translateY(1px)}

    .page{
      height:calc(100% - (52px + var(--safe-top)));
      overflow:auto;
      padding:12px;
      padding-bottom:calc(12px + var(--safe-bottom));
      display:flex;flex-direction:column;gap:10px;
      background:var(--bg);
    }

    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#777;line-height:1.5}
    .row{display:flex;gap:8px;align-items:center}
    .input,.ta,.select{
      width:100%;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fff;
      font-size:16px;
      outline:none;
    }
    .input:focus,.ta:focus,.select:focus{
      border-color:#bcd0ff;
      box-shadow:0 0 0 2px rgba(90,130,230,.12);
    }
    .ta{resize:none}
    .hidden{display:none !important}

    /* HOME */
    #home{color:#fff}
    .wall{
      position:absolute;inset:0;z-index:0;
      background:
        linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
        url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
    }
    .home-layer{
      position:relative;z-index:2;height:100%;
      padding:calc(18px + var(--safe-top)) 12px calc(14px + var(--safe-bottom));
      display:flex;flex-direction:column;
    }
    .date{font-size:15px;opacity:.95}
    .time{
      font-size:72px;line-height:1.02;font-weight:760;letter-spacing:-2px;
      text-shadow:0 2px 12px rgba(0,0,0,.2);
    }

    /* 风铃 */
    .windchime{
      position:absolute;
      top:calc(6px + var(--safe-top));
      right:12px;
      width:72px;height:126px;
      transform-origin:top center;
      animation:chimeSwing 3.2s ease-in-out infinite;
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.26));
      pointer-events:none;
      z-index:3;
    }
    .windchime .ring{
      width:28px;height:10px;margin:0 auto;
      border:2px solid rgba(255,255,255,.95);
      border-radius:999px;
      background:rgba(255,255,255,.18);
    }
    .windchime .line{
      position:absolute;top:10px;width:2px;
      background:linear-gradient(to bottom,rgba(255,255,255,.95),rgba(255,255,255,.18));
      transform-origin:top center;
    }
    .windchime .line span{
      position:absolute;left:50%;transform:translateX(-50%);
      border-radius:999px;background:rgba(255,255,255,.92);
      box-shadow:0 0 10px rgba(255,255,255,.5);
    }
    .windchime .l1{left:17px;height:42px;animation:lineSwingA 3.2s ease-in-out infinite}
    .windchime .l2{left:35px;height:55px;animation:lineSwingB 3.2s ease-in-out infinite}
    .windchime .l3{left:53px;height:46px;animation:lineSwingC 3.2s ease-in-out infinite}
    .windchime .l1 span{bottom:-6px;width:8px;height:8px}
    .windchime .l2 span{bottom:-7px;width:10px;height:10px}
    .windchime .l3 span{bottom:-6px;width:8px;height:8px}
    .windchime .pendulum{
      position:absolute;left:35px;top:66px;transform:translateX(-50%);
      width:2px;height:42px;
      background:linear-gradient(to bottom,rgba(255,255,255,.85),rgba(255,255,255,.2));
    }
    .windchime .pendulum::after{
      content:"";
      position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);
      width:22px;height:14px;border-radius:4px 4px 8px 8px;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(220,240,255,.72));
      box-shadow:0 0 12px rgba(255,255,255,.5);
    }
    @keyframes chimeSwing{0%,100%{transform:rotate(8deg)}50%{transform:rotate(-8deg)}}
    @keyframes lineSwingA{0%,100%{transform:rotate(6deg)}50%{transform:rotate(-5deg)}}
    @keyframes lineSwingB{0%,100%{transform:rotate(3deg)}50%{transform:rotate(-3deg)}}
    @keyframes lineSwingC{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

    .widgets{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .widget{
      background:var(--glass);border:1px solid var(--glass-border);
      border-radius:18px;padding:10px 12px;backdrop-filter:blur(12px)
    }
    .widget .t{font-size:12px;opacity:.88}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}

    .grid{margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px}
    .icon{text-align:center;cursor:pointer}
    .ibox{
      width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;
      background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.45);font-size:27px;
      transition:transform .12s ease;
    }
    .icon:active .ibox{transform:scale(.88)}
    .lab{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}

    /* 联系人 */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{
      background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;
      display:flex;gap:10px;align-items:center;
    }
    .avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff;flex-shrink:0}
    .main{flex:1;min-width:0;cursor:pointer}
    .name{font-weight:600;color:#222}
    .preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t{font-size:11px;color:#999}
    .more-btn{
      border:none;background:#f2f5ff;color:#6173a8;border:1px solid #dfe6ff;
      border-radius:8px;padding:6px 8px;cursor:pointer;font-size:12px;
    }

    /* Chat Header */
    .chat-head-center{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      flex:1;min-width:0;padding:0 8px;
    }
    .chat-head-title{
      width:100%;text-align:center;
      font-weight:700;color:#222;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .chat-head-sub{
      font-size:11px;color:#7a86a8;line-height:1.2;margin-top:2px;min-height:13px;
    }
    .icon-btn{
      width:32px;height:32px;border-radius:10px;border:1px solid #d7e3ff;
      background:linear-gradient(180deg,#f3f7ff,#e8f0ff);
      color:#4a67a8;font-size:16px;cursor:pointer;
      display:grid;place-items:center;
      box-shadow:0 1px 3px rgba(61,93,161,.12);
    }

    /* Chat */
    #chatMsgs{
      height:calc(100% - (52px + var(--safe-top)) - (74px + var(--safe-bottom)));
      overflow:auto;
      padding:12px;
      background:linear-gradient(180deg,#edf2ff,#edf1f8);
      display:flex;flex-direction:column;gap:10px;
    }
    .msg-row{display:flex;gap:8px;align-items:flex-end}
    .msg-row.me{justify-content:flex-end}
    .chat-avatar{
      width:32px;height:32px;border-radius:10px;object-fit:cover;background:#dde6ff;flex-shrink:0;
    }
    .bubble{
      max-width:74%;
      padding:10px 12px;
      border-radius:14px;
      line-height:1.45;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .bubble.me{background:#2f66d8;color:#fff;border-bottom-right-radius:6px}
    .bubble.ai{background:#fff;border:1px solid #e8e8ef;border-bottom-left-radius:6px}

    /* 线下模式 */
    #chatRoom.offline-mode #chatMsgs{
      padding:10px 8px;gap:14px;
      background:linear-gradient(180deg,#f2f6ff,#edf2ff);
    }
    #chatRoom.offline-mode .msg-row{display:block;max-width:100%}
    #chatRoom.offline-mode .msg-head{
      display:flex;align-items:center;gap:8px;margin:0 6px 7px;
      color:#5d678b;font-size:12px;font-weight:600;
    }
    #chatRoom.offline-mode .msg-row.me .msg-head{justify-content:flex-end}
    #chatRoom.offline-mode .chat-avatar{
      width:44px;height:44px;border-radius:14px;
      box-shadow:0 2px 10px rgba(54,77,130,.16);
      border:1px solid rgba(255,255,255,.7);
    }
    #chatRoom.offline-mode .bubble{
      width:calc(100% - 12px);
      max-width:calc(100% - 12px);
      margin:0 6px;
      border-radius:17px;
      padding:13px 14px;
      line-height:1.66;
      font-size:15px;
      box-shadow:0 2px 9px rgba(60,85,140,.08);
    }
    #chatRoom.offline-mode .msg-row.me .bubble{
      margin-left:auto;
      background:linear-gradient(180deg,#4f7dff,#2f66d8);
      color:#fff;border-bottom-right-radius:10px;
    }
    #chatRoom.offline-mode .msg-row:not(.me) .bubble{
      background:#fff;border:1px solid #e2e9ff;border-bottom-left-radius:10px;
    }
    .status-card{
      display:block;
      background:linear-gradient(180deg,#f9fbff,#f3f7ff);
      border:1px dashed #cfdcff;
      border-radius:11px;
      padding:9px 10px;
      margin-bottom:9px;
      color:#4f5f8c;
      font-size:12px;
      line-height:1.55;
    }

    .chatInputBar{
      position:absolute;left:0;right:0;bottom:0;
      padding:10px;
      padding-bottom:calc(10px + var(--safe-bottom));
      background:linear-gradient(180deg,#f8f9ff,#f6f8ff);
      border-top:1px solid #e4e8f5;
      display:flex;gap:8px;align-items:flex-end;
    }
    #chatInput{
      flex:1;height:44px;min-height:44px;max-height:96px;overflow-y:auto;resize:none;
    }
    .send-actions{display:flex;gap:8px;align-items:center;align-self:flex-end}

    .btn.store{
      width:40px;height:40px;padding:0;border-radius:999px;
      border:1px solid #cfe3ff;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(233,244,255,.92));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 2px 8px rgba(88,126,196,.18);
      position:relative;
    }
    .btn.store::after{
      content:"";
      position:absolute;left:50%;top:50%;
      width:12px;height:12px;border-radius:999px;
      transform:translate(-50%,-50%);
      background:radial-gradient(circle at 35% 30%, #fff, #d8eeff 62%, #a5cfff);
      border:1px solid rgba(167,201,244,.75);
      box-shadow:0 0 8px rgba(186,224,255,.45);
    }

    /* modal */
    .modal{
      position:absolute;inset:0;background:rgba(0,0,0,.35);
      display:none;place-items:center;z-index:99;padding:12px;
    }
    .modal.active{display:grid}
    .modal-card{
      width:100%;max-width:360px;max-height:90dvh;overflow:auto;
      background:#fff;border-radius:14px;padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }

    .seg{
      display:flex;gap:6px;align-items:center;
      padding:4px;border-radius:12px;
      background:#e9eefc;border:1px solid #dce4fb;width:max-content;
    }
    .seg button{
      border:none;background:transparent;color:#38538d;
      padding:6px 12px;border-radius:9px;cursor:pointer;font-size:12px;
    }
    .seg button.active{
      background:#fff;color:#244ea5;font-weight:600;
      box-shadow:0 1px 3px rgba(35,67,137,.15);
    }

    .avatar-row{display:flex;align-items:center;gap:10px;margin-top:8px}
    .mini-avatar{
      width:46px;height:46px;border-radius:12px;object-fit:cover;background:#eef2ff;border:1px solid #dfe6ff;
    }
    .avatar-actions{display:flex;gap:8px;flex-wrap:wrap}
    .avatar-btn{
      border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;
      background:#edf2ff;color:#2b4f97;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="home-layer">
      <div class="windchime" aria-hidden="true">
        <div class="ring"></div><div class="line l1"><span></span></div><div class="line l2"><span></span></div><div class="line l3"><span></span></div><div class="pendulum"></div>
      </div>
      <div class="date" id="homeDate"></div>
      <div class="time" id="homeTime"></div>
      <div class="widgets">
        <div class="widget"><div class="t">纪念日</div><div class="v">第 233 天</div></div>
        <div class="widget"><div class="t">天气</div><div class="v">22°C 晴</div></div>
      </div>
      <div class="grid">
        <div class="icon" data-nav="wechat"><div class="ibox">💬</div><div class="lab">微信</div></div>
        <div class="icon" data-nav="api"><div class="ibox">🔑</div><div class="lab">API</div></div>
      </div>
    </div>
  </section>

  <!-- WECHAT -->
  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>微信</b>
      <button class="btn" id="addContactBtn">+联系人</button>
    </div>
    <div class="page">
      <input id="searchInput" class="input" placeholder="搜索联系人" />
      <div id="contactList" class="list"></div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" data-nav="wechat">‹ 返回</button>
      <div class="chat-head-center">
        <div id="chatTitle" class="chat-head-title">聊天</div>
        <div id="chatSubStatus" class="chat-head-sub">在线</div>
      </div>
      <button class="icon-btn" id="chatToolsBtn" title="聊天工具">✦</button>
    </div>
    <div id="chatMsgs"></div>
    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="输入消息..."></textarea>
      <div class="send-actions">
        <button class="btn store" id="storeBtn" title="储存" aria-label="储存"></button>
        <button class="btn p" id="sendBtn">发送</button>
      </div>
    </div>
  </section>

  <!-- API -->
  <section id="api" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>API 设置</b>
      <button class="btn p" id="saveApiBtn">保存</button>
    </div>
    <div class="page">
      <div class="card">
        <div class="small">API预设</div>
        <div class="row" style="margin-top:8px;">
          <select id="apiPresetSelect" class="select"></select>
          <button class="btn" id="newPresetBtn">新建</button>
          <button class="btn d" id="delPresetBtn">删</button>
        </div>
      </div>
      <div class="card"><div class="small">Base URL</div><input id="apiBase" class="input" placeholder="https://api.cetaceang.qzz.io" /></div>
      <div class="card"><div class="small">API Key</div><input id="apiKey" class="input" type="password" /></div>
      <div class="card">
        <div class="small">Model</div>
        <select id="apiModel" class="select"></select>
        <div style="margin-top:8px"><button class="btn" id="fetchModelsBtn">拉取模型</button></div>
      </div>
      <div class="card"><div class="small">Temperature</div><input id="apiTemp" class="input" type="number" min="0" max="2" step="0.1" value="0.8" /></div>
      <div class="card"><button class="btn" id="testApiBtn">测试连接</button><div id="apiStatus" class="small" style="margin-top:8px;">状态：未测试</div></div>
    </div>
  </section>

  <!-- 创建联系人 -->
  <div id="contactModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">创建联系人</h3>
      <div class="small">昵称</div>
      <input id="newName" class="input" placeholder="例如：弥洛" />
      <div class="small" style="margin-top:8px;">头像（上传 或 URL）</div>
      <div class="row">
        <button class="btn" id="pickAvatarBtn">上传</button>
        <input id="newAvatarUrl" class="input" placeholder="https://..." />
      </div>
      <input id="newAvatarFile" type="file" accept="image/*" class="hidden" />
      <img id="newAvatarPreview" class="mini-avatar hidden" style="margin-top:8px;" />
      <div class="small" style="margin-top:8px;">人设</div>
      <textarea id="newPersona" class="ta" style="min-height:180px;"></textarea>
      <div class="row" style="justify-content:flex-end;margin-top:10px;">
        <button class="btn" id="cancelCreateBtn">取消</button>
        <button class="btn p" id="saveCreateBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 联系人操作 -->
  <div id="contactActionModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 8px;">联系人操作</h3>
      <div class="small" id="contactActionText">删除联系人及聊天记录</div>
      <div class="row" style="justify-content:flex-end;margin-top:10px;">
        <button class="btn" id="cancelContactActionBtn">取消</button>
        <button class="btn d" id="deleteContactBtn">删除</button>
      </div>
    </div>
  </div>

  <!-- 聊天工具 -->
  <div id="chatToolsModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">聊天模式与人设</h3>

      <div class="small">模式切换（即时生效）</div>
      <div class="seg" style="margin-top:8px;">
        <button id="toolModeOnlineBtn" class="active">线上</button>
        <button id="toolModeOfflineBtn">线下</button>
      </div>

      <hr style="opacity:.2;margin:14px 0;">
      <div class="small"><b>线下字数区间</b></div>
      <div class="row" style="margin-top:8px;">
        <div style="flex:1">
          <div class="small">最小字数</div>
          <input id="toolOfflineMin" class="input" type="number" min="60" max="2000" />
        </div>
        <div style="flex:1">
          <div class="small">最大字数</div>
          <input id="toolOfflineMax" class="input" type="number" min="80" max="2600" />
        </div>
      </div>

      <hr style="opacity:.2;margin:14px 0;">
      <div class="small"><b>对方人设（当前联系人）</b></div>
      <textarea id="toolAiPersona" class="ta" style="min-height:85px;margin-top:8px;"></textarea>
      <div class="avatar-row">
        <img id="toolAiAvatarPreview" class="mini-avatar" src="" />
        <div style="flex:1;">
          <input id="toolAiAvatarUrl" class="input" placeholder="对方头像 URL（可选）" />
          <div class="avatar-actions" style="margin-top:8px;">
            <button class="avatar-btn" id="toolAiAvatarPickBtn" type="button">上传头像</button>
            <button class="avatar-btn" id="toolAiAvatarClearBtn" type="button">清空头像</button>
          </div>
        </div>
      </div>

      <hr style="opacity:.2;margin:14px 0;">
      <div class="small"><b>我的人设（全局）</b></div>
      <textarea id="toolMyPersona" class="ta" style="min-height:85px;margin-top:8px;"></textarea>
      <div class="avatar-row">
        <img id="toolMyAvatarPreview" class="mini-avatar" src="" />
        <div style="flex:1;">
          <input id="toolMyAvatarUrl" class="input" placeholder="我的头像 URL（可选）" />
          <div class="avatar-actions" style="margin-top:8px;">
            <button class="avatar-btn" id="toolMyAvatarPickBtn" type="button">上传头像</button>
            <button class="avatar-btn" id="toolMyAvatarClearBtn" type="button">清空头像</button>
          </div>
        </div>
      </div>

      <div class="row" style="justify-content:flex-end;margin-top:12px;">
        <button class="btn" id="closeToolsBtn">取消</button>
        <button class="btn p" id="saveToolsBtn">保存</button>
      </div>
    </div>
  </div>

  <input id="toolAiAvatarFile" type="file" accept="image/*" hidden />
  <input id="toolMyAvatarFile" type="file" accept="image/*" hidden />

</div>

<script>
(() => {
  // storage
  const memStore = {};
  const STORAGE_OK = (() => {
    try{ localStorage.setItem('__mp_test__','1'); localStorage.removeItem('__mp_test__'); return true; }catch{ return false; }
  })();

  const getJ=(k,d)=>{
    if(STORAGE_OK){
      try{ const v=localStorage.getItem(k); return v===null?d:JSON.parse(v); }catch{return d;}
    }
    return k in memStore ? memStore[k] : d;
  };

  function compressImage(file,maxSide=260,quality=0.5){
    return new Promise((resolve,reject)=>{
      const fr=new FileReader();
      fr.onload=()=>{
        const img=new Image();
        img.onload=()=>{
          let w=img.width,h=img.height;
          const s=Math.min(1,maxSide/Math.max(w,h));
          w=Math.round(w*s); h=Math.round(h*s);
          const c=document.createElement('canvas');
          c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          let out='';
          try{ out=c.toDataURL('image/webp',quality);}catch(e){}
          if(!out || out.startsWith('data:,')) out=c.toDataURL('image/jpeg',quality);
          resolve(out);
        };
        img.onerror=reject; img.src=fr.result;
      };
      fr.onerror=reject; fr.readAsDataURL(file);
    });
  }

  // split
  function splitSentence(text){
    const arr=text.match(/[^。！？!?；;]+[。！？!?；;]?/g);
    return arr&&arr.length?arr.map(s=>s.trim()).filter(Boolean):[text];
  }
  function splitLongSmart(s,target=28,hardMax=36){
    const out=[]; let str=s.trim();
    while(str.length>hardMax){
      let cut=-1;
      const nearMin=Math.max(10,target-8), nearMax=Math.min(str.length-1,target+8);
      for(let i=nearMax;i>=nearMin;i--){ if('，、；：,;:'.includes(str[i])){ cut=i+1; break; } }
      if(cut<0){ for(let i=nearMax;i>=nearMin;i--){ if(str[i]===' '){ cut=i+1; break; } } }
      if(cut<0) cut=target;
      out.push(str.slice(0,cut).trim());
      str=str.slice(cut).trim();
    }
    if(str) out.push(str);
    return out.filter(Boolean);
  }
  function splitAiBubbles(raw){
    let txt=clean(raw); if(!txt) return ['...'];
    txt=txt.replace(/^```[\w-]*\n?/,'').replace(/```$/,'').trim();
    let lines=txt.split(/\n+/).map(s=>s.trim()).filter(Boolean);
    if(lines.length<=1) lines=splitSentence(txt);

    const bubbles=[];
    for(let line of lines){
      if(!line) continue;
      if(line.length<=36){ bubbles.push(line); continue; }
      const segs=splitSentence(line);
      let buf='';
      for(let seg of segs){
        seg=seg.trim(); if(!seg) continue;
        if(seg.length>36){
          if(buf){ bubbles.push(buf); buf=''; }
          bubbles.push(...splitLongSmart(seg,28,36));
          continue;
        }
        if((buf+seg).length<=30) buf+=seg;
        else{ if(buf) bubbles.push(buf); buf=seg; }
      }
      if(buf) bubbles.push(buf);
    }

    const merged=[];
    for(const b of bubbles){
      if(!merged.length){ merged.push(b); continue; }
      if(b.length<=2 && merged[merged.length-1].length+b.length<=36) merged[merged.length-1]+=b;
      else merged.push(b);
    }
    return merged.filter(Boolean).slice(0,24);
  }

  async function sendMsg(){
    if(!currentId) return;
    const t=clean($('chatInput').value);
    if(t) pushUser(t);

    $('chatInput').value=''; resetInputH(); renderChat();

    const map=getChats();
    const hist=(map[currentId]||[]).filter(x=>x.text&&x.text!=='...').slice(-24);
    if(!hist.length) return;

    const c=getContacts().find(x=>x.id===currentId);
    const me=getMe();
    const cfg=getModeCfg(currentId);
    const api=getActiveApiCfg();

    setChatSubStatus('对方正在输入…');

    try{
      const system=cfg.mode==='online' ? onlinePrompt(c,me) : offlinePrompt(c,me,cfg.offlineMin,cfg.offlineMax);
      const messages=[{role:'system',content:system}, ...hist.map(x=>({role:x.role==='user'?'user':'assistant',content:x.text}))];

      let out=await callApi(messages,api);

      if(cfg.mode==='online'){
        const parts=splitAiBubbles(out);
        await emitAiSequential(parts.length?parts:['...'], map);

        const contacts=getContacts();
        const i=contacts.findIndex(x=>x.id===currentId);
        if(i>=0){ contacts[i].preview=parts[0]||'...'; contacts[i].time='刚刚'; setContacts(contacts); }
        renderContacts($('searchInput').value||'');
      }else{
        if(out.length<Math.floor(cfg.offlineMin*0.75)){
          const retry=[{role:'system',content:offlinePrompt(c,me,cfg.offlineMin,cfg.offlineMax)}, ...hist.map(x=>({role:x.role==='user'?'user':'assistant',content:x.text})), {role:'user',content:`请重写，严格控制在 ${cfg.offlineMin}-${cfg.offlineMax} 字，保留“状态+正文”格式。`}];
          out=await callApi(retry,api);
        }
        await sleep(900+Math.floor(Math.random()*260));
        map[currentId].push({role:'assistant',text:out||'…',time:Date.now()});
        setChats(map); renderChat();

        const contacts=getContacts();
        const i=contacts.findIndex(x=>x.id===currentId);
        if(i>=0){ contacts[i].preview='[线下沉浸回复]'; contacts[i].time='刚刚'; setContacts(contacts); }
        renderContacts($('searchInput').value||'');
      }

      setChatSubStatus('在线');
    }catch(e){
      const arr=map[currentId]||[];
      arr.push({role:'assistant',text:'请求失败：'+clean(e.message),time:Date.now()});
      map[currentId]=arr;
      setChats(map);
      renderChat();
      setChatSubStatus('在线');
    }
  }

    $('toolOfflineMin').value=cfg.offlineMin;
    $('toolOfflineMax').value=cfg.offlineMax;

    const c=getContacts().find(x=>x.id===currentId);
    const me=getMe();

    toolAiAvatarTemp=c?.avatar||'';
    toolMyAvatarTemp=me?.avatar||'';

    $('toolAiPersona').value=c?.persona||'';
    $('toolMyPersona').value=me?.persona||'';

    $('toolAiAvatarPreview').src=toolAiAvatarTemp||'https://via.placeholder.com/92x92?text=TA';
    $('toolMyAvatarPreview').src=toolMyAvatarTemp||'https://via.placeholder.com/92x92?text=ME';

    $('toolAiAvatarUrl').value='';
    $('toolMyAvatarUrl').value='';
  }

  function openChatTools(){
    if(!currentId) return;
    syncToolUI();
    $('chatToolsModal').classList.add('active');
  }
  function closeChatTools(){ $('chatToolsModal').classList.remove('active'); }

  $('chatToolsBtn').onclick=openChatTools;
  $('closeToolsBtn').onclick=closeChatTools;
  $('chatToolsModal').addEventListener('click',e=>{ if(e.target.id==='chatToolsModal') closeChatTools(); });

  $('toolModeOnlineBtn').onclick=()=>{
    if(!currentId) return;
    const cfg=getModeCfg(currentId); cfg.mode='online'; setModeCfg(currentId,cfg);
    syncToolUI(); applyModeUI();
  };
  $('toolModeOfflineBtn').onclick=()=>{
    if(!currentId) return;
    const cfg=getModeCfg(currentId); cfg.mode='offline'; setModeCfg(currentId,cfg);
    syncToolUI(); applyModeUI();
  };

  $('toolAiAvatarPickBtn').onclick=()=> $('toolAiAvatarFile').click();
  $('toolMyAvatarPickBtn').onclick=()=> $('toolMyAvatarFile').click();

  $('toolAiAvatarFile').onchange=async e=>{
    const f=e.target.files?.[0]; if(!f) return;
    toolAiAvatarTemp=await compressImage(f,260,0.55);
    $('toolAiAvatarPreview').src=toolAiAvatarTemp;
    e.target.value='';
  };
  $('toolMyAvatarFile').onchange=async e=>{
    const f=e.target.files?.[0]; if(!f) return;
    toolMyAvatarTemp=await compressImage(f,260,0.55);
    $('toolMyAvatarPreview').src=toolMyAvatarTemp;
    e.target.value='';
  };

  $('toolAiAvatarClearBtn').onclick=()=>{
    toolAiAvatarTemp='';
    $('toolAiAvatarPreview').src='https://via.placeholder.com/92x92?text=TA';
    $('toolAiAvatarUrl').value='';
  };
  $('toolMyAvatarClearBtn').onclick=()=>{
    toolMyAvatarTemp='';
    $('toolMyAvatarPreview').src='https://via.placeholder.com/92x92?text=ME';
    $('toolMyAvatarUrl').value='';
  };

  $('saveToolsBtn').onclick=()=>{
    if(!currentId) return;
    const cfg=getModeCfg(currentId);
    cfg.offlineMin=clamp(Number($('toolOfflineMin').value||140),60,2000);
    cfg.offlineMax=clamp(Number($('toolOfflineMax').value||280),80,2600);
    if(cfg.offlineMin>cfg.offlineMax){ const t=cfg.offlineMin; cfg.offlineMin=cfg.offlineMax; cfg.offlineMax=t; }
    setModeCfg(currentId,cfg);

    const contacts=getContacts();
    const idx=contacts.findIndex(x=>x.id===currentId);
    if(idx>=0){
      contacts[idx].persona=clean($('toolAiPersona').value);
      const url=clean($('toolAiAvatarUrl').value);
      contacts[idx].avatar=toolAiAvatarTemp||url||contacts[idx].avatar||'';
      setContacts(contacts);
    }

    const me=getMe();
    me.persona=clean($('toolMyPersona').value);
    const myUrl=clean($('toolMyAvatarUrl').value);
    me.avatar=toolMyAvatarTemp||myUrl||me.avatar||'';
    setMe(me);

    applyModeUI();
    renderContacts($('searchInput').value||'');
    closeChatTools();
  };

  // create contact handlers
  $('addContactBtn').onclick=openCreateModal;
  $('cancelCreateBtn').onclick=closeCreateModal;
  $('saveCreateBtn').onclick=saveContact;
  $('contactModal').addEventListener('click',e=>{ if(e.target.id==='contactModal') closeCreateModal(); });
  $('searchInput').oninput=e=>renderContacts(e.target.value||'');

  $('pickAvatarBtn').onclick=()=> $('newAvatarFile').click();
  $('newAvatarFile').onchange=async e=>{
    const f=e.target.files?.[0]; if(!f) return;
    createAvatar=await compressImage(f,260,0.5);
    $('newAvatarPreview').src=createAvatar;
    $('newAvatarPreview').classList.remove('hidden');
    e.target.value='';
  };

  // init
  refreshPresetUI();
  $('searchInput').value='';
  renderContacts();

  if(!STORAGE_OK){
    setTimeout(()=>alert('当前环境本地存储受限，重进会丢失数据。建议用系统浏览器普通标签页打开。'),200);
  }
})();
</script>
</body>
</html>
