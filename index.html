<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AI Chat</title>
  <style>
    :root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--bd:#2a3040;--tx:#e0d5c8;--tx2:#8b8094;--tx3:#5a5466;--ac1:#8b6f5a;--ac2:#c9a87c;--ok:#5a9e6f;--err:#b8607a}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{display:flex;flex-direction:column;background:var(--bg);color:var(--tx);font-family:-apple-system,PingFang SC,Microsoft YaHei,sans-serif}
    .hd{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg2);border-bottom:1px solid var(--bd)}
    .hdL{display:flex;gap:10px;align-items:center}
    .av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700}
    .nm{font-size:15px;font-weight:700}
    .st{font-size:11px;color:var(--ok)}
    .st.off{color:var(--tx3)}
    .icon{width:34px;height:34px;border:1px solid var(--bd);border-radius:10px;background:transparent;color:var(--tx2)}
    .chat{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .welcome{margin:auto;text-align:center;color:var(--tx3);font-size:13px;line-height:1.8}
    .msg{max-width:82%;padding:10px 12px;border-radius:14px;font-size:14px;line-height:1.6;word-break:break-word}
    .ai{align-self:flex-start;background:var(--bg3);border:1px solid var(--bd);border-bottom-left-radius:4px}
    .me{align-self:flex-end;background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;border-bottom-right-radius:4px}
    .tm{font-size:10px;opacity:.55;margin-top:4px}
    .inputBar{display:flex;gap:8px;align-items:flex-end;padding:10px;background:var(--bg2);border-top:1px solid var(--bd)}
    #inp{flex:1;resize:none;max-height:100px;min-height:40px;border:1px solid var(--bd);border-radius:20px;background:var(--bg3);color:var(--tx);padding:10px 14px;font-size:14px;outline:none}
    #sendBtn{width:40px;height:40px;border:none;border-radius:50%;background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700}
    #sendBtn:disabled{opacity:.35}
    .typ{align-self:flex-start;background:var(--bg3);border:1px solid var(--bd);border-radius:14px;padding:10px 12px}
    .typ i{display:inline-block;width:5px;height:5px;margin-right:4px;background:var(--tx2);border-radius:50%;animation:b 1.1s infinite}
    .typ i:nth-child(2){animation-delay:.2s}
    .typ i:nth-child(3){animation-delay:.4s}
    @keyframes b{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
    .cur{display:inline-block;animation:blink .8s step-end infinite}
    @keyframes blink{50%{opacity:0}}

    .mask{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:20}
    .mask.show{display:flex;align-items:flex-end;justify-content:center}
    .panel{width:100%;max-width:520px;max-height:88vh;overflow:auto;background:var(--bg2);border-radius:18px 18px 0 0;padding:16px}
    .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .pt{font-weight:700}
    .pc{width:30px;height:30px;border:1px solid var(--bd);border-radius:50%;background:transparent;color:var(--tx2)}
    .f{margin-bottom:12px}
    .fl{font-size:11px;color:var(--tx2);margin-bottom:5px}
    .fi,.fs,.ta{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;color:var(--tx);padding:10px 12px;font-size:13px;outline:none}
    .ta{min-height:120px;resize:vertical;line-height:1.6}
    .row{display:flex;gap:8px}
    .row .f{flex:1}
    .btn{width:100%;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700}
    .bp{background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111}
    .bs{background:var(--bg3);color:var(--tx);border:1px solid var(--bd)}
    .bd{background:transparent;color:var(--err);border:1px solid #6b3040}
    .note{font-size:10px;color:var(--tx3);margin-top:4px}
    .toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:#242d3d;border:1px solid var(--bd);padding:7px 14px;border-radius:16px;font-size:12px;z-index:99}
  </style>
</head>
<body>
  <div class="hd">
    <div class="hdL">
      <div class="av">AI</div>
      <div>
        <div class="nm">自定义助手</div>
        <div id="status" class="st off">未配置</div>
      </div>
    </div>
    <button class="icon" onclick="openSet()">⚙</button>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBar">
    <textarea id="inp" rows="1" placeholder="说点什么……" oninput="autoGrow(this)" onkeydown="hotKey(event)"></textarea>
    <button id="sendBtn" onclick="send()">↑</button>
  </div>

  <div id="setMask" class="mask" onclick="maskClose(event)">
    <div class="panel">
      <div class="ph">
        <div class="pt">API 设置</div>
        <button class="pc" onclick="closeSet()">✕</button>
      </div>

      <div class="f">
        <div class="fl">反代地址（不用带 /v1）</div>
        <input id="cUrl" class="fi" placeholder="https://api.openai.com" />
        <div class="note">代码会自动拼接 /v1/models 和 /v1/chat/completions</div>
      </div>

      <div class="f">
        <div class="fl">API 密钥</div>
        <input id="cKey" class="fi" type="password" placeholder="sk-xxxx" />
      </div>

      <div class="row">
        <div class="f" style="flex:2">
          <div class="fl">模型</div>
          <select id="cModel" class="fs"><option value="">先拉取模型</option></select>
        </div>
        <div class="f" style="flex:0 0 auto;align-self:flex-end">
          <button id="fetchBtn" class="btn bs" style="width:auto;padding:10px 14px" onclick="fetchModels()">拉取模型</button>
        </div>
      </div>

      <div class="row">
        <div class="f">
          <div class="fl">Temperature</div>
          <input id="cTemp" class="fi" type="number" min="0" max="2" step="0.1" value="0.8" />
        </div>
        <div class="f">
          <div class="fl">最大回复长度</div>
          <input id="cMax" class="fi" type="number" min="50" max="8192" step="50" value="800" />
        </div>
      </div>

      <div class="f">
        <div class="fl">System Prompt（可空）</div>
        <textarea id="cPrompt" class="ta" placeholder="留空=不注入默认人设"></textarea>
      </div>

      <button class="btn bp" onclick="saveCfg()">保存配置</button>
      <button class="btn bs" style="margin-top:8px" onclick="testOnce()">测试连接</button>
      <button class="btn bd" style="margin-top:8px" onclick="clearChat()">清空聊天记录</button>
    </div>
  </div>

  <script>
    let C = {url:'',key:'',model:'',temp:0.8,max:800,prompt:''};
    let H = []; // [{role,content,time}]
    let M = []; // OpenAI messages
    let streaming = false;

    const $ = s => document.querySelector(s);
    const chat = $('#chat');

    function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
    function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
    function now(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
    function esc(s=''){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
    function normBaseUrl(u=''){return u.trim().replace(/\/+$/,'').replace(/\/v1$/,'')}
    function apiUrl(base,path){return normBaseUrl(base) + '/v1' + path}
    function toast(msg){
      const t=document.createElement('div');
      t.className='toast';
      t.textContent=msg;
      document.body.appendChild(t);
      setTimeout(()=>t.remove(),2000);
    }
    function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}
    function hotKey(e){if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();send()}}

    function render(){
      if(!H.length){
        chat.innerHTML = `<div class="welcome">${C.url&&C.key&&C.model?'开始聊吧':'点右上角⚙先配置 API'}</div>`;
        return;
      }
      chat.innerHTML = H.map(m=>`
        <div class="msg ${m.role==='user'?'me':'ai'}">
          ${esc(m.content).replace(/\n/g,'<br>')}
          <div class="tm">${m.time||''}</div>
        </div>
      `).join('');
      chat.scrollTop = chat.scrollHeight;
    }

    function setStatus(){
      const s = $('#status');
      if(C.url && C.key && C.model){s.textContent='在线';s.className='st'}
      else {s.textContent='未配置';s.className='st off'}
    }

    function openSet(){ fillForm(); $('#setMask').classList.add('show'); }
    function closeSet(){ $('#setMask').classList.remove('show'); }
    function maskClose(e){ if(e.target.id==='setMask') closeSet(); }

    function fillForm(){
      $('#cUrl').value = C.url||'';
      $('#cKey').value = C.key||'';
      $('#cTemp').value = C.temp ?? 0.8;
      $('#cMax').value = C.max ?? 800;
      $('#cPrompt').value = C.prompt || '';
      const sel = $('#cModel');
      if(C.model){
        if(![...sel.options].some(o=>o.value===C.model)){
          const o=document.createElement('option');
          o.value=C.model;
          o.textContent=C.model;
          sel.appendChild(o);
        }
        sel.value=C.model;
      }
    }

    function saveCfg(){
      C.url = normBaseUrl($('#cUrl').value);
      C.key = $('#cKey').value.trim();
      C.model = $('#cModel').value;
      C.temp = parseFloat($('#cTemp').value)||0.8;
      C.max = parseInt($('#cMax').value)||800;
      C.prompt = $('#cPrompt').value.trim();
      save('sy_cfg', C);
      closeSet();
      setStatus();
      toast('配置已保存');
      render();
    }

    async function fetchModels(){
      const url = normBaseUrl($('#cUrl').value);
      const key = $('#cKey').value.trim();
      if(!url){toast('先填反代地址');return;}
      const btn = $('#fetchBtn');
      btn.disabled=true;
      btn.textContent='拉取中…';
      try{
        const headers = {'Content-Type':'application/json'};
        if(key) headers['Authorization'] = 'Bearer ' + key;
        const r = await fetch(apiUrl(url,'/models'), {headers});
        if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
        const j = await r.json();
        let list = [];
        if(Array.isArray(j?.data)) list = j.data.map(x=>x.id).filter(Boolean);
        else if(Array.isArray(j)) list = j.map(x=>typeof x==='string'?x:x?.id).filter(Boolean);
        list = [...new Set(list)].sort();
        if(!list.length) throw new Error('没拿到模型');
        const sel = $('#cModel');
        sel.innerHTML = '';
        list.forEach(m=>{
          const o=document.createElement('option');
          o.value=m;
          o.textContent=m;
          sel.appendChild(o);
        });
        if(C.model && list.includes(C.model)) sel.value = C.model;
        toast(`模型 ${list.length} 个`);
      }catch(e){
        toast('拉取失败: ' + String(e.message||e).slice(0,120));
      }finally{
        btn.disabled=false;
        btn.textContent='拉取模型';
      }
    }

    async function testOnce(){
      const tUrl = normBaseUrl($('#cUrl').value);
      const tKey = $('#cKey').value.trim();
      const tModel = $('#cModel').value;
      if(!tUrl||!tKey||!tModel){toast('URL/Key/模型没填全');return;}
      try{
        const headers={'Content-Type':'application/json','Authorization':'Bearer '+tKey};
        const body={
          model:tModel,
          messages:[{role:'user',content:'回1'}],
          temperature:0,
          max_tokens:5,
          stream:false
        };
        const r=await fetch(apiUrl(tUrl,'/chat/completions'),{method:'POST',headers,body:JSON.stringify(body)});
        if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
        toast('连接正常');
      }catch(e){
        toast('测试失败: '+String(e.message||e).slice(0,120));
      }
    }

    function addTyping(){
      const d=document.createElement('div');
      d.className='typ';
      d.id='typing';
      d.innerHTML='<i></i><i></i><i></i>';
      chat.appendChild(d);
      chat.scrollTop=chat.scrollHeight;
    }
    function removeTyping(){
      const t=$('#typing');
      if(t) t.remove();
    }

    async function send(){
      const inp = $('#inp');
      const text = inp.value.trim();
      if(!text || streaming) return;
      if(!C.url || !C.key || !C.model){toast('先配好URL/Key/模型');return;}

      inp.value='';
      inp.style.height='auto';

      const t=now();
      H.push({role:'user',content:text,time:t});
      M.push({role:'user',content:text});
      save('sy_his',H);
      render();

      streaming = true;
      $('#sendBtn').disabled = true;
      $('#status').textContent='正在输入…';
      addTyping();

      const headers={'Content-Type':'application/json','Authorization':'Bearer '+C.key};
      const systemMsgs = C.prompt ? [{role:'system',content:C.prompt}] : [];
      const payload = {
        model:C.model,
        messages:[...systemMsgs, ...M.slice(-40)],
        temperature:C.temp,
        max_tokens:C.max
      };

      try{
        let r = await fetch(apiUrl(C.url,'/chat/completions'),{
          method:'POST',
          headers,
          body:JSON.stringify({...payload, stream:true})
        });

        if(!r.ok){
          r = await fetch(apiUrl(C.url,'/chat/completions'),{
            method:'POST',
            headers,
            body:JSON.stringify({...payload, stream:false})
          });
          if(!r.ok) throw new Error(`${r.status}: ${(await r.text()).slice(0,200)}`);
          const j = await r.json();
          const out = j?.choices?.[0]?.message?.content?.trim() || '……';
          const at=now();
          H.push({role:'assistant',content:out,time:at});
          M.push({role:'assistant',content:out});
          save('sy_his',H);
          removeTyping();
          render();
        }else{
          removeTyping();
          const at=now();
          const holder=document.createElement('div');
          holder.className='msg ai';
          holder.innerHTML='<span class="cur">▊</span><div class="tm">'+at+'</div>';
          chat.appendChild(holder);
          chat.scrollTop=chat.scrollHeight;

          let full='',buf='';
          const reader=r.body.getReader();
          const dec=new TextDecoder();

          while(true){
            const {done,value}=await reader.read();
            if(done) break;
            buf += dec.decode(value,{stream:true});
            const lines = buf.split('\n');
            buf = lines.pop();

            for(const line of lines){
              const s=line.trim();
              if(!s.startsWith('data:')) continue;
              const data=s.slice(5).trim();
              if(data==='[DONE]') continue;
              try{
                const j=JSON.parse(data);
                const delta=j?.choices?.[0]?.delta?.content;
                if(delta){
                  full += delta;
                  holder.innerHTML = esc(full).replace(/\n/g,'<br>') + '<span class="cur">▊</span><div class="tm">'+at+'</div>';
                  chat.scrollTop=chat.scrollHeight;
                }
              }catch{}
            }
          }

          if(!full) full='……';
          holder.innerHTML = esc(full).replace(/\n/g,'<br>') + '<div class="tm">'+at+'</div>';
          H.push({role:'assistant',content:full,time:at});
          M.push({role:'assistant',content:full});
          save('sy_his',H);
        }
      }catch(e){
        removeTyping();
        const et=now();
        const err='[请求失败] '+String(e.message||e).slice(0,220);
        H.push({role:'assistant',content:err,time:et});
        M.push({role:'assistant',content:err});
        save('sy_his',H);
        render();
      }finally{
        streaming=false;
        $('#sendBtn').disabled=false;
        setStatus();
      }
    }

    function clearChat(){
      if(!confirm('确定清空聊天记录？')) return;
      H=[];M=[];
      localStorage.removeItem('sy_his');
      render();
      closeSet();
      toast('已清空');
    }

    function init(){
      C = load('sy_cfg', C);
      H = load('sy_his', []);
      M = H.map(x=>({role:x.role==='assistant'?'assistant':'user',content:x.content}));
      if(typeof C.prompt !== 'string') C.prompt = '';
      setStatus();
      render();
    }
    init();
  </script>
</body>
</html>
