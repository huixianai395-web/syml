
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>小手机 v1.3.3 稳定</title>
  <style>
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --line:#e6e9f5;
      --bg:#f6f8ff;
      --blue:#2f66d8;
      --glass: rgba(255,255,255,.30);
      --glass-border: rgba(255,255,255,.48);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;height:100%;
      background:linear-gradient(160deg,#2c57c8,#5ba9ff);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    #app{
      width:100%;
      max-width:430px;
      height:100dvh;
      min-height:100dvh;
      margin:0 auto;
      position:relative;
      overflow:hidden;
      background:var(--bg);
    }

    .screen{position:absolute;inset:0;display:none;background:var(--bg)}
    .screen.active{display:block}

    .header{
      height:calc(52px + var(--safe-top));
      padding-top:var(--safe-top);
      display:flex;align-items:center;justify-content:space-between;
      padding-left:12px;padding-right:12px;
      background:linear-gradient(180deg,#f8f9ff,#f6f8ff);
      border-bottom:1px solid var(--line);
    }

    .btn{
      border:none;border-radius:10px;padding:8px 12px;font-size:13px;
      background:#edf2ff;color:#173a7a;cursor:pointer;
    }
    .btn.p{background:var(--blue);color:#fff}
    .btn.d{background:#d9534f;color:#fff}

    .page{
      height:calc(100% - (52px + var(--safe-top)));
      overflow:auto;
      padding:12px;
      padding-bottom:calc(12px + var(--safe-bottom));
      display:flex;flex-direction:column;gap:10px;
      background:var(--bg);
    }

    .card{background:#fff;border:1px solid #ececf2;border-radius:14px;padding:12px}
    .small{font-size:12px;color:#777}
    .row{display:flex;gap:8px;align-items:center}
    .input,.ta,.select{
      width:100%;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fff;
      font-size:16px;
    }
    .ta{resize:none}
    .hidden{display:none !important}

    /* HOME */
    #home{color:#fff}
    .wall{
      position:absolute;inset:0;z-index:0;
      background:
        linear-gradient(160deg, rgba(40,96,255,.34), rgba(125,221,255,.18)),
        url('https://picsum.photos/900/1800?blur=1') center/cover no-repeat;
    }
    .home-layer{
      position:relative;z-index:2;height:100%;
      padding:calc(18px + var(--safe-top)) 12px calc(14px + var(--safe-bottom));
      display:flex;flex-direction:column;
    }
    .date{font-size:15px;opacity:.95}
    .time{
      font-size:72px;line-height:1.02;font-weight:760;letter-spacing:-2px;
      text-shadow:0 2px 12px rgba(0,0,0,.2);
    }

    /* 风铃（更明显） */
    .windchime{
      position:absolute;
      top:calc(6px + var(--safe-top));
      right:12px;
      width:72px;
      height:126px;
      transform-origin:top center;
      animation:chimeSwing 3.2s ease-in-out infinite;
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.26));
      pointer-events:none;
      z-index:3;
    }
    .windchime .ring{
      width:28px;height:10px;margin:0 auto;
      border:2px solid rgba(255,255,255,.95);
      border-radius:999px;
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(1px);
    }
    .windchime .line{
      position:absolute;top:10px;width:2px;
      background:linear-gradient(to bottom,rgba(255,255,255,.95),rgba(255,255,255,.18));
      transform-origin:top center;
    }
    .windchime .line span{
      position:absolute;left:50%;transform:translateX(-50%);
      border-radius:999px;
      background:rgba(255,255,255,.92);
      box-shadow:0 0 10px rgba(255,255,255,.5);
    }
    .windchime .l1{left:17px;height:42px;animation:lineSwingA 3.2s ease-in-out infinite}
    .windchime .l2{left:35px;height:55px;animation:lineSwingB 3.2s ease-in-out infinite}
    .windchime .l3{left:53px;height:46px;animation:lineSwingC 3.2s ease-in-out infinite}
    .windchime .l1 span{bottom:-6px;width:8px;height:8px}
    .windchime .l2 span{bottom:-7px;width:10px;height:10px}
    .windchime .l3 span{bottom:-6px;width:8px;height:8px}
    .windchime .pendulum{
      position:absolute;left:35px;top:66px;transform:translateX(-50%);
      width:2px;height:42px;
      background:linear-gradient(to bottom,rgba(255,255,255,.85),rgba(255,255,255,.2));
    }
    .windchime .pendulum::after{
      content:"";
      position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);
      width:22px;height:14px;
      border-radius:4px 4px 8px 8px;
      background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(220,240,255,.72));
      box-shadow:0 0 12px rgba(255,255,255,.5);
    }

    @keyframes chimeSwing{
      0%,100%{transform:rotate(8deg)}
      50%{transform:rotate(-8deg)}
    }
    @keyframes lineSwingA{
      0%,100%{transform:rotate(6deg)}
      50%{transform:rotate(-5deg)}
    }
    @keyframes lineSwingB{
      0%,100%{transform:rotate(3deg)}
      50%{transform:rotate(-3deg)}
    }
    @keyframes lineSwingC{
      0%,100%{transform:rotate(-5deg)}
      50%{transform:rotate(5deg)}
    }

    .widgets{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .widget{
      background:var(--glass);border:1px solid var(--glass-border);
      border-radius:18px;padding:10px 12px;backdrop-filter:blur(12px)
    }
    .widget .t{font-size:12px;opacity:.88}
    .widget .v{font-size:16px;font-weight:700;margin-top:4px}

    .grid{margin-top:16px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px 8px}
    .icon{text-align:center;cursor:pointer}
    .ibox{
      width:62px;height:62px;margin:0 auto 6px;border-radius:16px;display:grid;place-items:center;
      background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.45);font-size:27px;
      transition:transform .12s ease;
    }
    .icon:active .ibox{transform:scale(.88)}
    .lab{font-size:12px;text-shadow:0 1px 2px rgba(0,0,0,.25)}

    /* Wechat list */
    .list{display:flex;flex-direction:column;gap:8px}
    .item{
      background:#fff;border:1px solid #ececf2;border-radius:12px;padding:10px;
      display:flex;gap:10px;align-items:center;
    }
    .avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;background:#eef2ff;flex-shrink:0}
    .main{flex:1;min-width:0;cursor:pointer}
    .name{font-weight:600;color:#222}
    .preview{margin-top:4px;font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .t{font-size:11px;color:#999}

    /* Chat */
    #chatMsgs{
      height:calc(100% - (52px + var(--safe-top)) - (74px + var(--safe-bottom)));
      overflow:auto;
      padding:12px;
      background:linear-gradient(180deg,#edf2ff,#edf1f8);
      display:flex;flex-direction:column;gap:10px;
    }
    .msg-row{display:flex;gap:8px;align-items:flex-end}
    .msg-row.me{justify-content:flex-end}
    .chat-avatar{
      width:32px;height:32px;border-radius:10px;object-fit:cover;background:#dde6ff;flex-shrink:0;
    }
    .bubble{
      max-width:74%;
      padding:10px 12px;
      border-radius:14px;
      line-height:1.45;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .bubble.me{background:#2f66d8;color:#fff;border-bottom-right-radius:6px}
    .bubble.ai{background:#fff;border:1px solid #e8e8ef;border-bottom-left-radius:6px}

    .chatInputBar{
      position:absolute;left:0;right:0;bottom:0;
      padding:10px;
      padding-bottom:calc(10px + var(--safe-bottom));
      background:linear-gradient(180deg,#f8f9ff,#f6f8ff);
      border-top:1px solid #e4e8f5;
      display:flex;gap:8px;align-items:flex-end;
    }
    #chatInput{
      flex:1;
      height:44px;
      min-height:44px;
      max-height:96px;
      overflow-y:auto;
      resize:none;
    }
    .send-actions{
      display:flex;gap:8px;align-items:center;align-self:flex-end;
    }

    /* 储存键：风铃风（克制高级） */
 /* 替换你当前这段：.btn.store / .btn.store::before / .btn.store::after */

.btn.store{
  width:40px;
  height:40px;
  padding:0;
  border:none;
  border-radius:12px;
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(180deg, rgba(255,255,255,.92), rgba(238,244,255,.88));
  border:1px solid #d9e3f4;
  box-shadow:
    0 3px 10px rgba(60,88,145,.14),
    inset 0 1px 0 rgba(255,255,255,.95);
  transition:all .18s ease;
  font-size:0; /* 保证无文字显示 */
}

.btn.store::before{
  content:"";
  position:absolute;
  inset:1px;
  border-radius:11px;
  border:1px solid rgba(255,255,255,.62);
  pointer-events:none;
}

.btn.store::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:16px;
  height:16px;
  transform:translate(-50%,-50%);
  border-radius:999px;
  background:
    radial-gradient(circle at 50% 40%, rgba(255,255,255,.95) 0 28%, rgba(165,184,221,.7) 29% 40%, transparent 41%),
    linear-gradient(180deg, rgba(96,121,170,.72), rgba(96,121,170,.18));
  clip-path: polygon(46% 0,54% 0,54% 45%,70% 82%,30% 82%,46% 45%);
  opacity:.9;
}

.btn.store:hover{
  border-color:#ccd8ef;
  box-shadow:
    0 5px 14px rgba(60,88,145,.18),
    inset 0 1px 0 rgba(255,255,255,.98);
}

.btn.store:active{
  transform:translateY(1px) scale(.98);
  box-shadow:
    0 2px 7px rgba(60,88,145,.12),
    inset 0 1px 0 rgba(255,255,255,.9);
}
    .btn.store:active{transform:translateY(1px)}

    /* modal */
    .modal{
      position:absolute;inset:0;background:rgba(0,0,0,.35);
      display:none;place-items:center;z-index:99;padding:12px;
    }
    .modal.active{display:grid}
    .modal-card{
      width:100%;max-width:360px;max-height:90dvh;overflow:auto;
      background:#fff;border-radius:14px;padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .preview-img{
      width:64px;height:64px;border-radius:12px;object-fit:cover;
      border:1px solid #eee;background:#f3f5ff;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <section id="home" class="screen active">
    <div class="wall"></div>
    <div class="home-layer">
      <div class="windchime" aria-hidden="true">
        <div class="ring"></div>
        <div class="line l1"><span></span></div>
        <div class="line l2"><span></span></div>
        <div class="line l3"><span></span></div>
        <div class="pendulum"></div>
      </div>

      <div class="date" id="homeDate"></div>
      <div class="time" id="homeTime"></div>

      <div class="widgets">
        <div class="widget"><div class="t">纪念日</div><div class="v">第 233 天</div></div>
        <div class="widget"><div class="t">天气</div><div class="v">22°C 晴</div></div>
      </div>

      <div class="grid">
        <div class="icon" data-nav="wechat"><div class="ibox">💬</div><div class="lab">微信</div></div>
        <div class="icon" data-nav="api"><div class="ibox">🔑</div><div class="lab">API</div></div>
      </div>
    </div>
  </section>

  <!-- WECHAT -->
  <section id="wechat" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>微信</b>
      <button class="btn" id="addContactBtn">+联系人</button>
    </div>
    <div class="page">
      <input id="searchInput" class="input" placeholder="搜索联系人" />
      <div id="contactList" class="list"></div>
    </div>
  </section>

  <!-- CHAT -->
  <section id="chatRoom" class="screen">
    <div class="header">
      <button class="btn" data-nav="wechat">‹ 返回</button>
      <b id="chatTitle">聊天</b>
      <button class="btn" id="clearChatBtn">清空</button>
    </div>

    <div id="chatMsgs"></div>

    <div class="chatInputBar">
      <textarea id="chatInput" class="ta" placeholder="输入消息..."></textarea>
      <div class="send-actions">
        <button class="btn store" id="storeBtn" title="储存" aria-label="储存"></button>
        <button class="btn p" id="sendBtn">发送</button>
      </div>
    </div>
  </section>

  <!-- API -->
  <section id="api" class="screen">
    <div class="header">
      <button class="btn" data-nav="home">‹ 返回</button>
      <b>API 设置</b>
      <button class="btn p" id="saveApiBtn">保存</button>
    </div>
    <div class="page">
      <div class="card">
        <div class="small">API预设</div>
        <div class="row" style="margin-top:8px;">
          <select id="apiPresetSelect" class="select"></select>
          <button class="btn" id="newPresetBtn">新建</button>
          <button class="btn d" id="delPresetBtn">删</button>
        </div>
      </div>

      <div class="card"><div class="small">Base URL</div><input id="apiBase" class="input" placeholder="https://api.cetaceang.qzz.io" /></div>
      <div class="card"><div class="small">API Key</div><input id="apiKey" class="input" type="password" /></div>
      <div class="card">
        <div class="small">Model</div>
        <select id="apiModel" class="select"></select>
        <div style="margin-top:8px"><button class="btn" id="fetchModelsBtn">拉取模型</button></div>
      </div>
      <div class="card"><div class="small">Temperature</div><input id="apiTemp" class="input" type="number" min="0" max="2" step="0.1" value="0.8" /></div>
      <div class="card"><button class="btn" id="testApiBtn">测试连接</button><div id="apiStatus" class="small" style="margin-top:8px;">状态：未测试</div></div>
    </div>
  </section>

  <!-- 创建联系人 -->
  <div id="contactModal" class="modal">
    <div class="modal-card">
      <h3 style="margin:0 0 10px;">创建联系人</h3>
      <div class="small">昵称</div>
      <input id="newName" class="input" placeholder="例如：沈昼白" />

      <div class="small" style="margin-top:8px;">头像（上传 或 URL）</div>
      <div class="row">
        <button class="btn" id="pickAvatarBtn">上传</button>
        <input id="newAvatarUrl" class="input" placeholder="https://..." />
      </div>
      <input id="newAvatarFile" type="file" accept="image/*" class="hidden" />
      <img id="newAvatarPreview" class="preview-img hidden" style="margin-top:8px;" />

      <div class="small" style="margin-top:8px;">人设</div>
      <textarea id="newPersona" class="ta" style="min-height:220px;"></textarea>

      <div class="row" style="justify-content:flex-end;margin-top:10px;">
        <button class="btn" id="cancelCreateBtn">取消</button>
        <button class="btn p" id="saveCreateBtn">保存</button>
      </div>
    </div>
  </div>

</div>

<script>
(() => {
  const K_CONTACT='mp_fix_contacts';
  const K_CHAT='mp_fix_chats';
  const K_API='mp_fix_api';
  const K_ME='mp_fix_me';

  let currentId=null;
  let createAvatar='';

  const $ = id => document.getElementById(id);
  const getJ=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}catch{return d;}};
  const setJ=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
  const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  const clean=s=>String(s||'').replace(/[\u0000-\u001F\u007F\uFFFD]/g,'').trim();

  function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el=$(id); if(el) el.classList.add('active');
  }

  // nav
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>show(el.getAttribute('data-nav')));

  // time
  function tick(){
    const n=new Date(), h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0');
    const w=['周日','周一','周二','周三','周四','周五','周六'][n.getDay()];
    $('homeDate').textContent=`${n.getMonth()+1}月${n.getDate()}日 ${w}`;
    $('homeTime').textContent=`${h}:${m}`;
  }
  tick(); setInterval(tick,1000);

  // data
  function getContacts(){
    let arr=getJ(K_CONTACT,null);
    if(!arr){
      arr=[{
        id:'c1',
        name:'沈昼白',
        avatar:'https://i.postimg.cc/y8xWzCqj/anime-boy.jpg',
        preview:'在吗 我刚遛狗回来',
        time:'刚刚',
        persona:'计算机系大三，爱分享日常'
      }];
      setJ(K_CONTACT,arr);
    }
    return arr;
  }
  function setContacts(v){setJ(K_CONTACT,v);}
  function getChats(){return getJ(K_CHAT,{});}
  function setChats(v){setJ(K_CHAT,v);}
  function getMe(){return getJ(K_ME,{name:'我',avatar:'',persona:''});}
  function setMe(v){setJ(K_ME,v);}

  // contacts
  function renderContacts(k=''){
    k=(k||'').trim();
    const arr=getContacts().filter(c=>!k||c.name.includes(k)||(c.preview||'').includes(k));
    $('contactList').innerHTML=arr.map(c=>`
      <div class="item">
        <img class="avatar" src="${c.avatar||'https://via.placeholder.com/88x88?text=头像'}"/>
        <div class="main" onclick="openChat('${c.id}')">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div class="name">${esc(c.name)}</div><div class="t">${esc(c.time||'')}</div>
          </div>
          <div class="preview">${esc(c.preview||'')}</div>
        </div>
      </div>
    `).join('') || `<div class="card small">暂无联系人</div>`;
  }

  function openCreateModal(){ $('contactModal').classList.add('active'); }
  function closeCreateModal(){
    $('contactModal').classList.remove('active');
    $('newName').value=''; $('newAvatarUrl').value=''; $('newPersona').value='';
    createAvatar=''; $('newAvatarPreview').classList.add('hidden'); $('newAvatarPreview').src='';
  }

  function compressImage(file,maxSide=260,quality=0.5){
    return new Promise((resolve,reject)=>{
      const fr=new FileReader();
      fr.onload=()=>{
        const img=new Image();
        img.onload=()=>{
          let w=img.width,h=img.height;
          const s=Math.min(1,maxSide/Math.max(w,h));
          w=Math.round(w*s); h=Math.round(h*s);
          const c=document.createElement('canvas');
          c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          let out='';
          try{ out=c.toDataURL('image/webp',quality);}catch(e){}
          if(!out || out.startsWith('data:,')) out=c.toDataURL('image/jpeg',quality);
          resolve(out);
        };
        img.onerror=reject;
        img.src=fr.result;
      };
      fr.onerror=reject;
      fr.readAsDataURL(file);
    });
  }

  async function saveContact(){
    const name=clean($('newName').value);
    if(!name) return alert('昵称不能为空');
    const avatarUrl=clean($('newAvatarUrl').value);
    const persona=clean($('newPersona').value);

    const arr=getContacts();
    arr.unshift({
      id:'c'+Date.now()+'_'+Math.floor(Math.random()*9999),
      name,
      avatar:createAvatar||avatarUrl||'',
      preview:'新的聊天已创建',
      time:'刚刚',
      persona
    });
    try{ setContacts(arr); }
    catch{ return alert('保存失败：存储空间不足'); }

    renderContacts($('searchInput').value||'');
    closeCreateModal();
  }

  $('addContactBtn').onclick=openCreateModal;
  $('cancelCreateBtn').onclick=closeCreateModal;
  $('saveCreateBtn').onclick=saveContact;
  $('contactModal').addEventListener('click',e=>{ if(e.target.id==='contactModal') closeCreateModal(); });
  $('searchInput').oninput=e=>renderContacts(e.target.value||'');

  $('pickAvatarBtn').onclick=()=> $('newAvatarFile').click();
  $('newAvatarFile').onchange=async e=>{
    const f=e.target.files?.[0]; if(!f) return;
    createAvatar=await compressImage(f,260,0.5);
    $('newAvatarPreview').src=createAvatar;
    $('newAvatarPreview').classList.remove('hidden');
    e.target.value='';
  };

  // chat
  window.openChat=function(id){
    currentId=id;
    const c=getContacts().find(x=>x.id===id);
    $('chatTitle').textContent=c?c.name:'聊天';
    renderChat();
    show('chatRoom');
  };

  function renderChat(){
    const c=getContacts().find(x=>x.id===currentId);
    const me=getMe();
    const roleAvatar=c?.avatar||'https://via.placeholder.com/64x64?text=TA';
    const meAvatar=me.avatar||'https://via.placeholder.com/64x64?text=我';
    const map=getChats();
    const arr=map[currentId]||[];

    $('chatMsgs').innerHTML=arr.map(m=>{
      if(m.role==='user'){
        return `<div class="msg-row me"><div class="bubble me">${esc(m.text)}</div><img class="chat-avatar" src="${meAvatar}"></div>`;
      }
      return `<div class="msg-row"><img class="chat-avatar" src="${roleAvatar}"><div class="bubble ai">${esc(m.text)}</div></div>`;
    }).join('');
    $('chatMsgs').scrollTop=$('chatMsgs').scrollHeight;
  }

  function clearChat(){
    if(!currentId) return;
    if(!confirm('清空当前聊天？')) return;
    const map=getChats(); map[currentId]=[]; setChats(map); renderChat();
  }
  $('clearChatBtn').onclick=clearChat;

  function resetInputH(){ $('chatInput').style.height='44px'; }
  $('chatInput').addEventListener('input', ()=>{
    const el=$('chatInput');
    el.style.height='44px';
    el.style.height=Math.min(el.scrollHeight,96)+'px';
  });

  function pushUser(text){
    const map=getChats(); map[currentId]=map[currentId]||[];
    map[currentId].push({role:'user',text,time:Date.now(),stored:true});
    setChats(map);
  }

  function storeCurrentInput(){
    if(!currentId) return;
    const t=clean($('chatInput').value);
    if(!t) return;
    pushUser(t);
    $('chatInput').value=''; resetInputH(); renderChat();
  }

  $('storeBtn').onclick=storeCurrentInput;

  function forceSplitByLen(text, len){
    const out=[];
    let i=0;
    while(i<text.length){
      out.push(text.slice(i,i+len));
      i+=len;
    }
    return out;
  }

  function splitAiBubbles(raw){
    const txt=clean(raw);
    if(!txt) return ['...'];

    try{
      const j=JSON.parse(txt);
      if(Array.isArray(j.messages)){
        return j.messages
          .map(x=>clean(x))
          .filter(Boolean)
          .flatMap(x=>x.length>34?forceSplitByLen(x,34):[x])
          .slice(0,18);
      }
    }catch{}

    const normalized = txt
      .replace(/\r/g,'')
      .replace(/[ \t]+\n/g,'\n')
      .replace(/\n{3,}/g,'\n\n')
      .trim();

    const blocks = normalized.split(/\n{2,}/).filter(Boolean);
    const pieces = [];

    for(const block of blocks){
      const segs = block.match(/[^。！？!?；;，,\n]+[。！？!?；;，,]?/g) || [block];
      let buf = '';

      for(let seg of segs){
        seg = seg.trim();
        if(!seg) continue;

        if(seg.length > 34){
          const chunks = forceSplitByLen(seg, 28);
          if(buf){ pieces.push(buf); buf=''; }
          pieces.push(...chunks);
          continue;
        }

        if((buf + seg).length <= 34){
          buf += seg;
        }else{
          if(buf) pieces.push(buf);
          buf = seg;
        }
      }
      if(buf) pieces.push(buf);
    }

    const cleaned = pieces.map(s=>s.trim()).filter(Boolean);
    return (cleaned.length ? cleaned : [txt]).slice(0, 18);
  }

  // 修复串聊：按 targetId 写入，不再依赖 currentId
  async function emitAiSequential(parts,map,targetId){
    for(let i=0;i<parts.length;i++){
      map[targetId]=map[targetId]||[];
      map[targetId].push({role:'assistant',text:parts[i],time:Date.now()});
      setChats(map);

      // 仅当还在当前聊天页并且目标会话就是当前会话时才刷新
      if(currentId===targetId) renderChat();

      const delay = i===0
        ? 130 + Math.floor(Math.random()*170)
        : 360 + Math.floor(Math.random()*620);
      await new Promise(r=>setTimeout(r,delay));
    }
  }

  // API preset
  function getApiState(){
    return getJ(K_API,{
      current:'默认',
      presets:{'默认':{base:'',key:'',model:'gpt-4o-mini',temp:0.8}}
    });
  }
  function setApiState(v){setJ(K_API,v);}
  function refreshPresetUI(){
    const s=getApiState();
    const names=Object.keys(s.presets);
    $('apiPresetSelect').innerHTML=names.map(n=>`<option ${n===s.current?'selected':''}>${n}</option>`).join('');
    loadApiForm();
  }
  function loadApiForm(){
    const s=getApiState(), c=s.presets[s.current];
    $('apiBase').value=c.base||'';
    $('apiKey').value=c.key||'';
    $('apiTemp').value=c.temp??0.8;
    $('apiModel').innerHTML=`<option value="${c.model||'gpt-4o-mini'}">${c.model||'gpt-4o-mini'}</option>`;
  }
  function saveApiForm(){
    const s=getApiState();
    s.presets[s.current]={
      base:clean($('apiBase').value),
      key:clean($('apiKey').value),
      model:clean($('apiModel').value)||'gpt-4o-mini',
      temp:Number($('apiTemp').value||0.8)
    };
    setApiState(s);
    $('apiStatus').textContent='状态：已保存';
    return s.presets[s.current];
  }

  $('apiPresetSelect').onchange=e=>{
    const s=getApiState();
    s.presets[s.current]={
      base:clean($('apiBase').value), key:clean($('apiKey').value),
      model:clean($('apiModel').value)||'gpt-4o-mini', temp:Number($('apiTemp').value||0.8)
    };
    s.current=e.target.value;
    setApiState(s);
    loadApiForm();
  };

  $('newPresetBtn').onclick=()=>{
    const name=(prompt('新预设名：')||'').trim();
    if(!name) return;
    const s=getApiState();
    if(s.presets[name]) return alert('预设已存在');
    s.presets[name]={base:'',key:'',model:'gpt-4o-mini',temp:0.8};
    s.current=name; setApiState(s); refreshPresetUI();
  };
  $('delPresetBtn').onclick=()=>{
    const s=getApiState(), names=Object.keys(s.presets);
    if(names.length<=1) return alert('至少保留一个预设');
    if(!confirm('删除当前预设？')) return;
    delete s.presets[s.current];
    s.current=Object.keys(s.presets)[0];
    setApiState(s); refreshPresetUI();
  };

  function buildUrl(base,path){
    const b=(base||'').replace(/\/+$/,'');
    if(b.endsWith('/v1')) return b+path.replace('/v1','');
    return b+path;
  }

  // 报错兜底增强：非 JSON 响应也能拿到错误文本
  async function callApi(messages){
    const cfg=saveApiForm();
    if(!cfg.base||!cfg.key) throw new Error('请先配置 Base URL 和 API Key');
    const url=buildUrl(cfg.base,'/v1/chat/completions');

    const r=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.key},
      body:JSON.stringify({model:cfg.model,temperature:cfg.temp,messages})
    });

    const ct = (r.headers.get('content-type') || '').toLowerCase();
    let data = null;
    let rawText = '';

    if(ct.includes('application/json')){
      data = await r.json().catch(()=>null);
    }else{
      rawText = await r.text().catch(()=>'');
    }

    if(!r.ok){
      const msg =
        data?.error?.message ||
        data?.message ||
        rawText?.slice(0,200) ||
        ('HTTP '+r.status);
      throw new Error(clean(msg) || ('HTTP '+r.status));
    }

    const content = clean(data?.choices?.[0]?.message?.content || '');
    if(!content) throw new Error('接口返回为空内容');
    return content;
  }

  async function fetchModels(){
    try{
      const c=saveApiForm();
      if(!c.base||!c.key) throw new Error('请先配置 Base URL 和 API Key');
      $('apiStatus').textContent='状态：拉取模型中...';
      const url=buildUrl(c.base,'/v1/models');
      const r=await fetch(url,{headers:{'Authorization':'Bearer '+c.key}});
      const data=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(data?.error?.message || ('HTTP '+r.status));
      const list=(data.data||[]).map(x=>x.id).filter(Boolean);
      if(!list.length) throw new Error('未返回模型列表');
      $('apiModel').innerHTML=list.map(m=>`<option>${m}</option>`).join('');
      if(list.includes(c.model)) $('apiModel').value=c.model;
      $('apiStatus').textContent='状态：模型拉取成功（'+list.length+'）';
    }catch(e){
      $('apiStatus').textContent='状态：拉取失败 -> '+e.message;
    }
  }

  async function testApi(){
    try{
      $('apiStatus').textContent='状态：测试中...';
      const out=await callApi([{role:'user',content:'只回复 ok'}]);
      $('apiStatus').textContent='状态：连接成功 -> '+(out||'ok');
    }catch(e){
      $('apiStatus').textContent='状态：失败 -> '+e.message;
    }
  }

  $('saveApiBtn').onclick=saveApiForm;
  $('fetchModelsBtn').onclick=fetchModels;
  $('testApiBtn').onclick=testApi;

  async function sendMsg(){
    if(!currentId) return;

    const chatId = currentId; // 锁定本次发送会话ID
    const t=clean($('chatInput').value);
    if(t) pushUser(t);

    $('chatInput').value=''; resetInputH();
    if(currentId===chatId) renderChat();

    const map=getChats();
    const hist=(map[chatId]||[]).filter(x=>x.text&&x.text!=='...').slice(-20);
    if(!hist.length) return;

    map[chatId]=map[chatId]||[];
    map[chatId].push({role:'assistant',text:'...',typing:true,time:Date.now()});
    setChats(map);
    if(currentId===chatId) renderChat();

    try{
      const c=getContacts().find(x=>x.id===chatId);
      const messages=[
        {role:'system',content:`你是${c?.name||'聊天对象'}。人设：${c?.persona||'自然聊天'}。用即时聊天口吻回复；内容多时请拆多条短消息。每条尽量短。`},
        ...hist.map(x=>({role:x.role==='user'?'user':'assistant',content:x.text}))
      ];
      const out=await callApi(messages);

      const arr=map[chatId]||[];
      if(arr.length && arr[arr.length-1].typing) arr.pop();

      const parts=splitAiBubbles(out);
      await emitAiSequential(parts.length?parts:['...'], map, chatId);

      const contacts=getContacts();
      const i=contacts.findIndex(x=>x.id===chatId);
      if(i>=0){
        contacts[i].preview=parts[0]||'...';
        contacts[i].time='刚刚';
        setContacts(contacts);
      }
      renderContacts($('searchInput').value||'');
    }catch(e){
      const arr=map[chatId]||[];
      if(arr.length && arr[arr.length-1].typing) arr.pop();
      arr.push({role:'assistant',text:'请求失败：'+clean(e.message),time:Date.now()});
      map[chatId]=arr;
      setChats(map);
      if(currentId===chatId) renderChat();
    }
  }

  $('sendBtn').onclick=sendMsg;

  // Enter 默认储存；Ctrl/Cmd + Enter 发送
  $('chatInput').addEventListener('keydown',e=>{
    if(e.key==='Enter' && !e.shiftKey){
      e.preventDefault();
      if(e.ctrlKey || e.metaKey){
        sendMsg();
      }else{
        storeCurrentInput();
      }
    }
  });

  // init
  refreshPresetUI();
  renderContacts();
})();
</script>
</body>
