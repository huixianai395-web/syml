<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Noctis</title>
  <style>
    :root{
      --bg:#0a0e1a;--bg2:#111827;--bg3:#1e2740;--bd:#2a3553;
      --tx:#f0ebe3;--tx2:#a0aec0;--tx3:#5a6680;
      --ac1:#c9a87c;--ac2:#e8cfa0;--ok:#6dd5a0;--err:#f28ba8;
      --glass:rgba(17,24,39,.72);--shadow:0 8px 32px rgba(0,0,0,.35);
      --avRadius:50%;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    @supports(padding-bottom:env(safe-area-inset-bottom)){
      .tabs{padding-bottom:env(safe-area-inset-bottom)}
      .lockMask{padding-bottom:env(safe-area-inset-bottom)}
    }
    body{
      display:flex;flex-direction:column;
      background:
        radial-gradient(ellipse 900px 450px at 15% -8%,rgba(201,168,124,.1),transparent 50%),
        radial-gradient(ellipse 700px 350px at 90% 5%,rgba(100,140,220,.08),transparent 55%),
        var(--bg);
      color:var(--tx);
      font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .hd{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 14px;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .hdL{display:flex;align-items:center;gap:10px;min-width:0}
    .icon{
      width:34px;height:34px;border:1px solid var(--bd);border-radius:10px;
      background:var(--bg3);color:var(--tx2);font-size:16px;display:grid;place-items:center;
    }
    .av{
      width:36px;height:36px;border-radius:var(--avRadius);display:grid;place-items:center;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#13161d;font-weight:800;font-size:14px;overflow:hidden;flex-shrink:0;
      box-shadow:0 2px 8px rgba(201,168,124,.3);
    }
    .av img{width:100%;height:100%;object-fit:cover}
    .nm{font-size:15px;font-weight:700;letter-spacing:.3px}
    .sub{font-size:11px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
    .st{font-size:11px;color:var(--ok);font-weight:600}
    .st.off{color:var(--tx3)}
    .main{flex:1;overflow:hidden;position:relative}
    .page{height:100%;overflow:auto;display:none}
    .page.active{display:block}
    .page::-webkit-scrollbar{width:0}
    .chatWrap{height:100%;display:flex;flex-direction:column}
    .chat{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .chat::-webkit-scrollbar{width:0}
    .welcome{
      margin:auto;background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
      padding:16px 14px;color:var(--tx2);font-size:13px;line-height:1.8;max-width:92%;box-shadow:var(--shadow);
    }
    .line{display:flex;gap:8px;align-items:flex-start}
    .line.me{justify-content:flex-end}
    .msgAv{
      width:34px;height:34px;border-radius:var(--avRadius);overflow:hidden;flex-shrink:0;
      display:grid;place-items:center;background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-size:11px;font-weight:700
    }
    .msgAv img{width:100%;height:100%;object-fit:cover}
    .msg{
      max-width:78%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word;
      box-shadow:0 4px 16px rgba(0,0,0,.2);animation:pop .2s ease-out;
    }
    @keyframes pop{from{opacity:.15;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
    .ai{background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-bottom-left-radius:4px}
    .meBubble{background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;border-bottom-right-radius:4px}
    .tm{font-size:10px;opacity:.5;margin-top:4px}
    .chatImg{max-width:min(62vw,260px);max-height:320px;border-radius:12px;display:block;border:1px solid rgba(255,255,255,.1)}
    .chatSticker{max-width:min(24vw,92px);max-height:92px;border-radius:8px;display:block}
    .typ{align-self:flex-start;background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:10px 14px}
    .typ i{display:inline-block;width:5px;height:5px;margin-right:4px;background:var(--tx2);border-radius:50%;animation:bounce 1.1s infinite}
    .typ i:nth-child(2){animation-delay:.2s}
    .typ i:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
    .cur{display:inline-block;animation:blink .8s step-end infinite}
    @keyframes blink{50%{opacity:0}}
    .md h1,.md h2,.md h3{margin:.2em 0 .35em;line-height:1.35}
    .md h1{font-size:1.12em}
    .md h2{font-size:1.07em}
    .md h3{font-size:1.02em}
    .md ul{padding-left:1.2em;margin:.28em 0}
    .md li{margin:.18em 0}
    .md code{padding:1px 6px;border-radius:6px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9em}
    .md pre{margin:.42em 0;overflow:auto;border:1px solid rgba(255,255,255,.08);background:#080d18;border-radius:10px;padding:10px}
    .md pre code{padding:0;border:none;background:none}
    .md a{color:#8fb4ff;text-decoration:none}
    .inputBar{display:flex;flex-direction:column;gap:8px;padding:10px 12px;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,.06)}
    .tools{display:flex;gap:6px;align-items:center}
    .toolBtn{
      width:38px;height:38px;border:1px solid var(--bd);border-radius:12px;background:var(--bg3);color:var(--tx2);font-size:15px;
      display:grid;place-items:center;transition:all .15s;
    }
    .toolBtn:active{transform:scale(.92);background:var(--bg2)}
    .toolBtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .sendRow{display:flex;gap:8px;align-items:flex-end}
    #inp{
      flex:1;resize:none;max-height:120px;min-height:42px;border:1px solid var(--bd);border-radius:22px;
      background:var(--bg3);color:var(--tx);padding:10px 16px;font-size:14px;outline:none;line-height:1.5;
      transition:border-color .2s;
    }
    #inp:focus{border-color:var(--ac1)}
    .actBtn{width:42px;height:42px;border:none;border-radius:50%;font-weight:700;font-size:16px;transition:all .15s}
    #addBtn{background:var(--bg3);color:var(--ac2);border:1px solid var(--bd)}
    #replyBtn{background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;box-shadow:0 2px 10px rgba(201,168,124,.35)}
    .actBtn:active{transform:scale(.9)}
    .actBtn:disabled{opacity:.3;box-shadow:none}
    .panelWrap{
      display:none;border:1px solid var(--bd);border-radius:14px;background:var(--bg2);
      overflow:hidden;max-height:260px;
    }
    .panelWrap.show{display:block}
    .panelTabs{display:flex;border-bottom:1px solid var(--bd);overflow-x:auto;gap:0}
    .panelTabs::-webkit-scrollbar{height:0}
    .panelTab{
      padding:8px 14px;font-size:12px;font-weight:600;color:var(--tx3);white-space:nowrap;
      border:none;background:none;border-bottom:2px solid transparent;flex-shrink:0;
    }
    .panelTab.active{color:var(--ac2);border-bottom-color:var(--ac2)}
    .panelGrid{
      display:flex;gap:6px;flex-wrap:wrap;padding:10px;overflow-y:auto;max-height:200px;
    }
    .panelGrid::-webkit-scrollbar{width:0}
    .emoji{width:36px;height:36px;border:none;background:var(--bg3);border:1px solid rgba(255,255,255,.05);border-radius:10px;color:#fff;font-size:20px;line-height:1;transition:transform .1s}
    .emoji:active{transform:scale(1.2)}
    .stickerBtn{width:52px;height:52px;border:1px solid rgba(255,255,255,.06);border-radius:10px;background:var(--bg3);padding:2px;overflow:hidden;transition:transform .1s}
    .stickerBtn:active{transform:scale(.92)}
    .stickerBtn img{width:100%;height:100%;object-fit:cover;display:block;border-radius:8px}
    .stickerEmpty{font-size:12px;color:var(--tx3);padding:20px 10px;text-align:center}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:999;padding:16px}
    .modal.show{display:flex}
    .modalCard{
      width:min(94vw,400px);max-height:80vh;background:var(--bg2);border:1px solid var(--bd);border-radius:18px;
      box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;
      animation:modalIn .2s ease-out;
    }
    @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
    .modalHd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd)}
    .modalTitle{font-size:15px;font-weight:700}
    .modalClose{width:32px;height:32px;border:none;background:var(--bg3);border-radius:10px;color:var(--tx2);font-size:16px;display:grid;place-items:center}
    .modalBody{padding:14px 16px;overflow-y:auto;flex:1}
    .modalBody::-webkit-scrollbar{width:0}
    .wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
    .card{background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
    .ct{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .f{margin-bottom:10px}
    .fl{font-size:11px;color:var(--tx2);margin-bottom:5px;font-weight:600;letter-spacing:.3px}
    .fi,.fs,.ta{
      width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:12px;color:var(--tx);
      padding:10px 12px;font-size:13px;outline:none;transition:border-color .2s;
    }
    .fi:focus,.ta:focus,.fs:focus{border-color:var(--ac1)}
    .ta{min-height:90px;resize:vertical;line-height:1.6;font-family:inherit}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .row .f{flex:1;min-width:140px}
    .btn{
      padding:10px 16px;border:none;border-radius:12px;font-size:13px;font-weight:700;color:#111;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));box-shadow:0 2px 8px rgba(201,168,124,.25);transition:all .15s;
    }
    .btn:active{transform:scale(.96)}
    .btn2{
      padding:10px 14px;border:1px solid var(--bd);border-radius:12px;font-size:13px;
      color:var(--tx);background:var(--bg3);font-weight:600;transition:all .15s;
    }
    .btn2:active{transform:scale(.96)}
    .btnDanger{border-color:rgba(242,139,168,.25);color:var(--err);background:rgba(242,139,168,.06)}
    .mini,.note{font-size:11px;color:var(--tx3)}
    .list{display:flex;flex-direction:column;gap:8px}
    .roleItem{
      border:1px solid var(--bd);border-radius:14px;background:var(--bg3);padding:12px;
      display:flex;justify-content:space-between;align-items:center;gap:8px;transition:all .15s;
    }
    .roleItem.active{border-color:var(--ac1);background:rgba(201,168,124,.06);box-shadow:0 0 0 1px rgba(201,168,124,.15) inset}
    .roleL{display:flex;gap:10px;align-items:center;min-width:0}
    .rAv{
      width:30px;height:30px;border-radius:var(--avRadius);display:grid;place-items:center;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700;font-size:12px;overflow:hidden;flex-shrink:0
    }
    .rAv img{width:100%;height:100%;object-fit:cover}
    .rName{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rSub{font-size:11px;color:var(--tx2)}
    .preview{
      width:48px;height:48px;border-radius:var(--avRadius);border:1px solid var(--bd);overflow:hidden;
      display:grid;place-items:center;background:var(--bg3);color:var(--tx2);font-size:12px
    }
    .preview img{width:100%;height:100%;object-fit:cover}
    .tabs{
      display:grid;grid-template-columns:repeat(4,1fr);
      border-top:1px solid rgba(255,255,255,.06);background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    }
    .tab{
      border:none;background:none;color:var(--tx3);
      padding:10px 6px 8px;font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;
    }
    .tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .tab.active{color:var(--ac2)}
    .toast{
      position:fixed;top:58px;left:50%;transform:translateX(-50%);
      background:var(--bg2);border:1px solid var(--bd);padding:8px 16px;border-radius:20px;
      font-size:12px;z-index:9999;box-shadow:var(--shadow);
    }
    .lockMask{
      position:fixed;inset:0;background:rgba(7,10,18,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:none;align-items:center;justify-content:center;z-index:9999;
    }
    .lockMask.show{display:flex}
    .lockCard{
      width:min(90vw,340px);background:var(--bg2);border:1px solid var(--bd);border-radius:20px;
      padding:24px 20px;box-shadow:var(--shadow);text-align:center;
    }
    .lockTitle{font-size:18px;font-weight:700;margin-bottom:6px}
    .lockSub{font-size:12px;color:var(--tx2);margin-bottom:16px}
    .switchRow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  </style>
</head>
<body>

  <div class="hd">
    <div class="hdL">
      <button class="icon" onclick="goBack()">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="av" id="topAv">N</div>
      <div style="min-width:0">
        <div class="nm">Noctis</div>
        <div class="sub" id="topRole"></div>
      </div>
    </div>
    <div id="status" class="st off"></div>
  </div>

  <div class="main">
    <section id="page-chat" class="page active">
      <div class="chatWrap">
        <div id="chat" class="chat"></div>
        <div class="inputBar">
          <div class="tools">
            <button class="toolBtn" onclick="openImagePick()">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            </button>
            <button class="toolBtn" onclick="togglePanel('emoji')">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9h.01M15 9h.01"/><path d="M8 13c1 2 7 2 8 0"/></svg>
            </button>
            <button class="toolBtn" onclick="togglePanel('sticker')">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 15h6a3 3 0 003-3V3"/></svg>
            </button>
            <button class="toolBtn" onclick="openStickerManager()">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </button>
            <input id="imgPick" type="file" accept="image/*" style="display:none" onchange="pickImage(event)" />
          </div>
          <div id="emojiPanel" class="panelWrap">
            <div id="emojiGrid" class="panelGrid"></div>
          </div>
          <div id="stickerPanel" class="panelWrap">
            <div id="stickerTabs" class="panelTabs"></div>
            <div id="stickerGrid" class="panelGrid"></div>
          </div>
          <div class="sendRow">
            <textarea id="inp" rows="1" placeholder="说点什么……（回车=暂存）" oninput="autoGrow(this)" onkeydown="hotKey(event)"></textarea>
            <button id="addBtn" class="actBtn" onclick="queueMessage()">＋</button>
            <button id="replyBtn" class="actBtn" onclick="requestReply()">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="#111" fill="none" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <section id="page-roles" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">角色列表</div>
          <div id="roleList" class="list"></div>
          <div class="mini" style="margin-top:8px">切换角色会切换对应聊天记录。</div>
        </div>
        <div class="card">
          <div class="ct">新建 / 编辑角色</div>
          <input type="hidden" id="rId" />
          <input type="hidden" id="rAvatarImg" />
          <div class="row">
            <div class="f"><div class="fl">角色名</div><input id="rName" class="fi" placeholder="例如：冷淡男友 / 温柔姐姐" /></div>
            <div class="f"><div class="fl">头像字</div><input id="rAvatar" class="fi" maxlength="2" placeholder="AI" /></div>
          </div>
          <div class="f">
            <div class="fl">角色头像</div>
            <div class="row" style="align-items:center">
              <div id="rPreview" class="preview">无图</div>
              <input id="rAvatarFile" type="file" accept="image/*" class="fi" onchange="onRoleAvatarPick(event)" />
              <button class="btn2" onclick="clearRoleAvatar()">清空</button>
            </div>
          </div>
          <div class="f"><div class="fl">开场白</div><input id="rGreeting" class="fi" placeholder="第一次进入该角色时显示" /></div>
          <div class="f"><div class="fl">System Prompt</div><textarea id="rPrompt" class="ta" placeholder="留空则无默认人设"></textarea></div>
          <div class="row">
            <button class="btn" onclick="saveRole()">保存角色</button>
            <button class="btn2" onclick="resetRoleForm()">清空表单</button>
            <button class="btn2 btnDanger" onclick="deleteRole()">删除当前</button>
          </div>
        </div>
      </div>
	</section><section id="page-worldbook" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">世界书</div>
          <div class="note" style="margin-bottom:8px">按关键词命中，发送时自动注入上下文。</div>
          <div id="wbList" class="list"></div>
        </div>
        <div class="card">
          <div class="ct">新增 / 编辑词条</div>
          <input type="hidden" id="wbId" />
          <div class="f"><div class="fl">关键词（逗号分隔）</div><input id="wbKeys" class="fi" placeholder="例如：沈厌,弥洛,小窝" /></div>
          <div class="f"><div class="fl">内容</div><textarea id="wbContent" class="ta" placeholder="命中关键词时注入给模型"></textarea></div>
          <div class="row"><label class="btn2" style="display:flex;align-items:center;gap:6px"><input id="wbEnabled" type="checkbox" checked />启用</label></div>
          <div class="row">
            <button class="btn" onclick="saveWB()">保存词条</button>
            <button class="btn2" onclick="resetWBForm()">清空表单</button>
            <button class="btn2 btnDanger" onclick="deleteWB()">删除当前</button>
          </div>
        </div>
      </div>
    </section>

    <section id="page-settings" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">我的头像</div>
          <input type="hidden" id="meAvatarImg" />
          <div class="row" style="align-items:center">
            <div id="mePreview" class="preview">我</div>
            <input id="meAvatarFile" type="file" accept="image/*" class="fi" onchange="onMeAvatarPick(event)" />
            <button class="btn2" onclick="clearMeAvatar()">清空</button>
          </div>
          <div class="f" style="margin-top:10px">
            <div class="fl">头像形状</div>
            <select id="avatarShape" class="fs">
              <option value="circle">圆形</option>
              <option value="round">圆角方</option>
              <option value="square">方形</option>
            </select>
          </div>
        </div>
        <div class="card">
          <div class="ct">API 设置</div>
          <div class="f"><div class="fl">反代地址（不用带 /v1）</div><input id="cUrl" class="fi" placeholder="https://api.example.com" /></div>
          <div class="f"><div class="fl">API 密钥</div><input id="cKey" class="fi" type="password" placeholder="sk-xxxx" /></div>
          <div class="row">

<script>
var C={

var roles=[],activeRoleId="",HMap={},streaming=false,currentPage="chat";

var worldbook=[];
var EMOJIS=["😀","😎","🥺","🥰","😭","😤","🤍","💙","💜","💛","🔥","✨","🎀","🍓","🫶","😴","🙄","😈","📌","✅","😘","🤭","💕","🥲","😏","🫠","💤","🎉","🍵","🌙"];

function $(s){return document.querySelector(s)}
var chatEl=$("#chat");

function load(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function now(){var d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
function esc(s){s=s||"";return s.replace(/&/g,"&").replace(/</g,"<").replace(/>/g,">")}
function normBaseUrl(u){u=u||"";return u.trim().replace(/\/+$/,"").replace(/\/v1$/,"")}
function apiUrl(base,path){return normBaseUrl(base)+"/v1"+path}
function uid(){return "r_"+Math.random().toString(36).slice(2,10)}
function toast(msg){var t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2200)}
function autoGrow(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,120)+"px"}
function hotKey(e){if(e.key==="Enter"&&!e.shiftKey&&!e.isComposing){e.preventDefault();queueMessage()}}

function shapeRadius(shape){if(shape==="square")return "4px";if(shape==="round")return "12px";return "50%"}
function applyAvatarShape(){document.documentElement.style.setProperty("--avRadius",shapeRadius(C.avatarShape||"circle"))}
function toggleMultiReplyUI(){var on=!!($("#multiReplyEnabled")&&$("#multiReplyEnabled").checked);if($("#multiReplyMin"))$("#multiReplyMin").disabled=!on;if($("#multiReplyMax"))$("#multiReplyMax").disabled=!on}
function pickReplyCount(){var a=parseInt(C.multiReplyMin,10)||1,b=parseInt(C.multiReplyMax,10)||1;if(a<1)a=1;if(b<1)b=1;if(a>b){var t=a;a=b;b=t}return Math.floor(Math.random()*(b-a+1))+a}

function injectModeControls(){
  if($("#chatMode")) return;

  var cards=document.querySelectorAll("#page-settings .card"),apiCard=null;
  for(var i=0;i<cards.length;i++){
    var t=cards[i].querySelector(".ct");

  var box=document.createElement("div");

    '<div class="f"><div class="fl">对话模式</div><select id="chatMode" class="fs"><option value="online">线上模式（自然聊天）</option><option value="offline">线下模式（沉浸长文）</option></select></div>'+
    '<div class="row">'+
      '<div class="f"><div class="fl">线下最少字数</div><input id="offlineMinChars" class="fi" type="number" min="120" max="3000" step="10" value="320" /></div>'+
      '<div class="f"><div class="fl">线下最多字数</div><input id="offlineMaxChars" class="fi" type="number" min="120" max="3000" step="10" value="900" /></div>'+
    '</div>'+
    '<div class="mini" style="margin-bottom:10px">线上自适应短消息；线下单条沉浸长文。</div>';

  var anchor=apiCard.querySelector(".switchRow.f");
  if(anchor) apiCard.insertBefore(box,anchor);
  else apiCard.appendChild(box);

  function syncOfflineInputs(){
    var off=(($("#chatMode")&&$("#chatMode").value)||"online")==="offline";
    if($("#offlineMinChars")) $("#offlineMinChars").disabled=!off;
    if($("#offlineMaxChars")) $("#offlineMaxChars").disabled=!off;
  }

  $("#chatMode").addEventListener("change",function(){
    C.chatMode=this.value||"online";

    refreshHeader();

  syncOfflineInputs();
	}

function fileToDataURL(file){return new Promise(function(r,j){var fr=new FileReader();fr.onload=function(){r(fr.result)};fr.onerror=j;fr.readAsDataURL(file)})}
function compressImageFile(file,maxW,maxH,q){
  maxW=maxW||1280;maxH=maxH||1280;q=q||0.82;
  return fileToDataURL(file).then(function(du){
    return new Promise(function(r,j){var i=new Image();i.onload=function(){r(i)};i.onerror=j;i.src=du});
  }).then(function(img){
    var s=Math.min(maxW/img.width,maxH/img.height,1);
    var w=Math.max(1,Math.round(img.width*s)),h=Math.max(1,Math.round(img.height*s));
    var c=document.createElement("canvas");c.width=w;c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    return c.toDataURL("image/jpeg",q);
  });
}
function roughSizeOf(obj){try{return new Blob([JSON.stringify(obj)]).size}catch(e){return JSON.stringify(obj).length}}

function currentRole(){return roles.find(function(r){return r.id===activeRoleId})||null}
function currentHistory(){if(!activeRoleId)return[];if(!Array.isArray(HMap[activeRoleId]))HMap[activeRoleId]=[];return HMap[activeRoleId]}
function avatarHTML(img,text){return img?'<img src="'+img+'" alt="">':esc((text||"AI").slice(0,2))}

function setStatus(){
  var s=$("#status");
  if(C.url&&C.key&&C.model){s.textContent="在线";s.className="st"}

function switchTab(name,btn){
  currentPage=name;
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
  $("#page-"+name).classList.add("active");
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});

}
function goBack(){
  if($("#lockMask").classList.contains("show"))return;
  if(currentPage!=="chat"){switchTab("chat",document.querySelector('.tab[data-page="chat"]'));return}
  toast("已在首页");
}

function markdownToHtml(src){
  var s=String(src||""),blocks=[];
  s=s.replace(/```([^\n`]*)\n?([\s\S]*?)```/g,function(_,l,code){blocks.push({code:esc(code||"")});return "@@CODE_"+(blocks.length-1)+"@@"});
  s=esc(s);
  s=s.replace(/^### (.*)$/gm,"<h3>$1</h3>").replace(/^## (.*)$/gm,"<h2>$1</h2>").replace(/^# (.*)$/gm,"<h1>$1</h1>");
  s=s.replace(/^\s*-\s+(.*)$/gm,"<li>$1</li>").replace(/(?:<li>[\s\S]*?<\/li>)/g,function(m){return "<ul>"+m+"</ul>"});
  s=s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/`([^`]+)`/g,"<code>$1</code>");
  s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  s=s.replace(/\n/g,"<br>");
  s=s.replace(/@@CODE_(\d+)@@/g,function(_,i){return "<pre><code>"+(blocks[Number(i)]?blocks[Number(i)].code:"")+"</code></pre>"});
  return '<div class="md">'+s+"</div>";
}
function renderMsgContent(m){
  if(m.type==="image") return '<img class="chatImg" src="'+m.content+'" alt="img" />';
  if(m.type==="sticker") return '<img class="chatSticker" src="'+m.content+'" alt="sticker" />';
  return markdownToHtml(m.content||"");
}
function renderChat(){
  var r=currentRole(),H=currentHistory();
  if(!r){chatEl.innerHTML='<div class="welcome"><b>欢迎使用 Noctis</b><br>先去「角色」页创建角色，再去「设置」页填 API。</div>';return}
  if(!H.length){chatEl.innerHTML='<div class="welcome"><b>'+esc(r.name)+'</b> 已就位。<br>'+(r.greeting?esc(r.greeting):"你可以开始聊天了。")+"<br><br>支持：文本 · 图片 · 表情包</div>";return}
  var html="";
  for(var i=0;i<H.length;i++){
    var m=H[i],isMe=m.role==="user",avImg=isMe?(C.selfAvatarImg||""):(r.avatarImg||""),avTxt=isMe?"我":(r.avatar||"AI");
    var isSticker=m.type==="sticker",bubbleClass=isSticker?"":(isMe?"meBubble":"ai"),bubbleStyle=isSticker?'style="background:none;border:none;box-shadow:none;padding:2px"':"";
    html+='<div class="line '+(isMe?"me":"")+'">';
    if(!isMe) html+='<div class="msgAv">'+avatarHTML(avImg,avTxt)+"</div>";
    html+='<div class="msg '+bubbleClass+'" '+bubbleStyle+">"+renderMsgContent(m)+'<div class="tm">'+(m.time||"")+"</div></div>";
    if(isMe) html+='<div class="msgAv">'+avatarHTML(avImg,avTxt)+"</div>";
    html+="</div>";
  }
  chatEl.innerHTML=html;chatEl.scrollTop=chatEl.scrollHeight;
}
function addTyping(){
  var r=currentRole(),d=document.createElement("div");d.className="line";d.id="typing";
  d.innerHTML='<div class="msgAv">'+avatarHTML(r?r.avatarImg:"",r?r.avatar:"AI")+'</div><div class="typ"><i></i><i></i><i></i></div>';
  chatEl.appendChild(d);chatEl.scrollTop=chatEl.scrollHeight;
}
function removeTyping(){var t=$("#typing");if(t)t.remove()}

function renderRoles(){
  var list=$("#roleList");if(!roles.length){list.innerHTML='<div class="mini">还没有角色，先创建一个。</div>';return}
  var html="";
  for(var i=0;i<roles.length;i++){
    var r=roles[i];
    html+='<div class="roleItem '+(r.id===activeRoleId?"active":"")+'"><div class="roleL"><div class="rAv">'+avatarHTML(r.avatarImg,r.avatar||"AI")+'</div><div style="min-width:0"><div class="rName">'+esc(r.name||"未命名")+'</div><div class="rSub">'+(r.prompt?"已设置人设":"无默认人设")+'</div></div></div><div style="display:flex;gap:6px"><button class="btn2" style="padding:8px 12px" onclick="pickRole(\''+r.id+'\')">使用</button><button class="btn2" style="padding:8px 12px" onclick="editRole(\''+r.id+'\')">编辑</button></div></div>';
  }
  list.innerHTML=html;
}
function setRolePreview(img,text){$("#rPreview").innerHTML=img?'<img src="'+img+'" alt="">':esc(text||"无图")}
function resetRoleForm(){$("#rId").value="";$("#rName").value="";$("#rAvatar").value="";$("#rGreeting").value="";$("#rPrompt").value="";$("#rAvatarImg").value="";$("#rAvatarFile").value="";setRolePreview("","无图")}
function onRoleAvatarPick(e){var f=e.target.files?e.target.files[0]:null;if(!f)return;if(f.size>2*1024*1024){toast("图片请小于2MB");return}compressImageFile(f,512,512,0.82).then(function(d){$("#rAvatarImg").value=d;setRolePreview(d)}).catch(function(){toast("读取失败")})}
function clearRoleAvatar(){$("#rAvatarImg").value="";$("#rAvatarFile").value="";setRolePreview("","无图")}
function saveRole(){
  var id=$("#rId").value||uid(),name=$("#rName").value.trim(),avatar=($("#rAvatar").value.trim()||"AI").slice(0,2),avatarImg=$("#rAvatarImg").value||"",greeting=$("#rGreeting").value.trim(),prompt=$("#rPrompt").value.trim();
  if(!name){toast("角色名不能为空");return}
  var obj={id:id,name:name,avatar:avatar,avatarImg:avatarImg,prompt:prompt,greeting:greeting},idx=-1;
  for(var i=0;i<roles.length;i++){if(roles[i].id===id){idx=i;break}}
  if(idx>=0)roles[idx]=obj;else roles.unshift(obj);
  if(!activeRoleId)activeRoleId=id;
  save("nx_roles",roles);save("nx_active_role",activeRoleId);
  renderRoles();refreshHeader();renderChat();toast("角色已保存");
}
function editRole(id){
  var r=null;for(var i=0;i<roles.length;i++){if(roles[i].id===id){r=roles[i];break}}if(!r)return;
  $("#rId").value=r.id;$("#rName").value=r.name||"";$("#rAvatar").value=r.avatar||"";$("#rGreeting").value=r.greeting||"";$("#rPrompt").value=r.prompt||"";$("#rAvatarImg").value=r.avatarImg||"";$("#rAvatarFile").value="";

function pickRole(id){activeRoleId=id;save("nx_active_role",activeRoleId);refreshHeader();renderRoles();renderChat();toast("已切换")}
function deleteRole(){
  var id=$("#rId").value||activeRoleId;if(!id){toast("无角色");return}
  var r=null;for(var i=0;i<roles.length;i++){if(roles[i].id===id){r=roles[i];break}}if(!r){toast("不存在");return}
  if(!confirm("删除角色「"+r.name+"」？"))return;
  roles=roles.filter(function(x){return x.id!==id});delete HMap[id];
  if(activeRoleId===id)activeRoleId=roles.length?roles[0].id:"";
  save("nx_roles",roles);save("nx_active_role",activeRoleId);save("nx_hmap",HMap);
  resetRoleForm();renderRoles();refreshHeader();renderChat();toast("已删除");

function fillCfgForm(){
  $("#cUrl").value=C.url||"";$("#cKey").value=C.key||"";$("#cTemp").value=C.temp!=null?C.temp:0.8;$("#cMax").value=C.max||800;
  $("#meAvatarImg").value=C.selfAvatarImg||"";setMePreview(C.selfAvatarImg||"");
  $("#lockEnabled").checked=!!C.lockEnabled;$("#lockPin").value=C.lockPin||"";
  $("#avatarShape").value=C.avatarShape||"circle";
  $("#multiReplyEnabled").checked=!!C.multiReplyEnabled;
  $("#multiReplyMin").value=C.multiReplyMin||2;
  $("#multiReplyMax").value=C.multiReplyMax||4;
  if($("#chatMode"))$("#chatMode").value=C.chatMode||"online";
  if($("#onlineModel"))$("#onlineModel").value=C.onlineModel||"";
  if($("#offlineModel"))$("#offlineModel").value=C.offlineModel||"";
  toggleMultiReplyUI();applyAvatarShape();
  var sel=$("#cModel");
  if(C.model){
    var found=false;for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===C.model)found=true}
    if(!found){var o=document.createElement("option");o.value=C.model;o.textContent=C.model;sel.appendChild(o)}
    sel.value=C.model;
  }
}
function saveCfg(){
  C.url=normBaseUrl($("#cUrl").value);C.key=$("#cKey").value.trim();C.model=$("#cModel").value;
  C.temp=parseFloat($("#cTemp").value)||0.8;C.max=parseInt($("#cMax").value)||800;
  C.avatarShape=$("#avatarShape").value||"circle";
  C.selfAvatarImg=$("#meAvatarImg").value||C.selfAvatarImg||"";
  C.multiReplyEnabled=!!$("#multiReplyEnabled").checked;

function normalizeAssistantText(out,mode){
  out=(out||"").replace(/\u0000/g,"").trim();

  if(mode==="online"){
    out=out.replace(/\[表情包:[^\]]+\]/g,"（表情）").replace(/\n{3,}/g,"\n\n");
    return out||"继续。";
  }

  // offline
  out=out.replace(/\n{4,}/g,"\n\n");
  if(!out || /^(\.{2,}|…{1,}|。{2,})$/.test(out)){
    return "我在，别只给省略号。把场景、情绪和动作说完整。";
  }
  return out;
	}
function callChatOnce(messages,modelName){
  return fetch(apiUrl(C.url,"/chat/completions"),{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+C.key},
    body:JSON.stringify({model:modelName||C.model,messages:messages,temperature:C.temp,max_tokens:C.max,stream:false})
  }).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error(r.status+": "+t.slice(0,200))});
    return r.json();
  }).then(function(j){
    var out=(j&&j.choices&&j.choices[0]&&j.choices[0].message)?j.choices[0].message.content:"";
    return (out||"").trim();
  });
}
function splitOnlineBubbles(out, limit){
  out=(out||"").trim();
  var arr=[];

  // 先吃 <msg> 包裹
  var reg=/<msg>([\s\S]*?)<\/msg>/g,m;
  while((m=reg.exec(out))!==null){
    var t=(m[1]||"").trim();
    if(t) arr.push(t);
  }

  // 没有 <msg> 就按换行拆
  if(!arr.length){
    arr=out.split(/\n{1,}/).map(function(x){return x.trim()}).filter(Boolean);
  }

  // 还没有就整条
  if(!arr.length && out) arr=[out];

  // 保底
  if(!arr.length) arr=["继续。"];

  if(limit && arr.length>limit) arr=arr.slice(0,limit);
  return arr;
	}

	}function requestReply(){

    return {role:x.role==="assistant"?"assistant":"user",content:c};
  });

    sys.push({role:"system",content:"你在即时聊天模式。自然、贴人设、像真人发消息。多条请使用<msg>内容</msg>包裹每条。不要舞台说明，不要模板腔。"});

    }
  }else{
    var rg=pickCharsRange();
    sys.push({role:"system",content:"你在线下沉浸模式。只输出一条长文本，不分条。紧贴角色人设和情绪递进，强化动作、心理、环境细节。目标字数"+rg.min+"~"+rg.max+"字。禁止只回省略号。"});
  }

      arr=splitOnlineBubbles(out,limit).map(function(x){return normalizeAssistantText(x,"online")});
    }

    for(var k=0;k<arr.length;k++){

  }).catch(function(e){

  function parseMsgs(out){
    out = String(out||"").trim();
    const arr = [];
    let m, reg = /<msg>([\s\S]*?)<\/msg>/g;
    while((m=reg.exec(out))!==null){
      const t = (m[1]||"").trim();
      if(t) arr.push(t);
    }
    if(arr.length) return arr;

    let lines = out.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean);
    if(lines.length>=2) return lines;
    lines = out.split(/\n+/).map(x=>x.trim()).filter(Boolean);
    if(lines.length>=2) return lines;

    const sents = out.split(/(?<=[。！？!?])/).map(x=>x.trim()).filter(Boolean);
    if(sents.length>=2){
      const merged=[]; let buf="";
      sents.forEach(s=>{
        if((buf+s).length>38 && buf){ merged.push(buf); buf=s; }
        else buf += s;
      });
      if(buf) merged.push(buf);
      if(merged.length) return merged;
    }
    return out ? [out] : [];
  }

  async function callRaw(messages){
    const r=await fetch(apiUrl(C.url,"/chat/completions"),{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+C.key},
      body:JSON.stringify({
        model:C.model,
        messages,
        temperature:C.temp,
        max_tokens:C.max,
        max_completion_tokens:C.max,
        stream:false
      })
    });
    if(!r.ok){
      const tx=await r.text();
      throw new Error(r.status+": "+tx.slice(0,220));
    }
    const j=await r.json();
    const ch=(j&&j.choices&&j.choices[0])?j.choices[0]:{};
    return {text:((ch.message&&ch.message.content)||"").trim(), reason:(ch.finish_reason||"")};
  }

  function toLLM(H){
    return H.filter(m=>!m.hiddenFromAI).map(m=>{
      let c=m.content||"";
      if(m.type==="image") c="（用户发送了一张图片）";
      if(m.type==="sticker") c="（用户发送了一个表情包："+(m.stickerName||"未命名")+"）";
      return {role:m.role==="assistant"?"assistant":"user",content:c};
    });
  }
  function lastUser(H){
    for(let i=H.length-1;i>=0;i--) if(H[i].role==="user") return H[i].content||"";
    return "";
  }

  function parseMsgs(out){
    out=String(out||"").trim();
    let arr=[],m,reg=/<msg>([\s\S]*?)<\/msg>/g;
    while((m=reg.exec(out))!==null){ const t=(m[1]||"").trim(); if(t) arr.push(t); }
    if(arr.length) return arr;

    arr=out.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean);
    if(arr.length>=2) return arr;
    arr=out.split(/\n+/).map(x=>x.trim()).filter(Boolean);
    if(arr.length>=2) return arr;

    const sents=out.split(/(?<=[。！？!?])/).map(x=>x.trim()).filter(Boolean);
    if(sents.length>=2){
      const merged=[]; let buf="";
      sents.forEach(s=>{
        if((buf+s).length>40 && buf){ merged.push(buf); buf=s; } else buf+=s;
      });
      if(buf) merged.push(buf);
      if(merged.length) return merged;
    }
    return out?[out]:[];
  }

  function cleanOnline(arr){
    return arr.map(x=>String(x||"")
      .replace(/^\s*\*.*\*\s*$/gm,"")
      .replace(/^\s*（[^）]{0,60}）\s*$/gm,"")
      .replace(/^\s*\([^)]{0,60}\)\s*$/gm,"")
      .trim()
    ).filter(Boolean)
    .filter(x=>!/^继续[。？！!?…\s]*$/.test(x)); // 关键：滤掉“继续”
  }

  function suggestCount(text){
    const s=String(text||"");
    const n=tlen(s),q=(s.match(/[?？]/g)||[]).length,l=s.split(/\n+/).filter(Boolean).length;
    if(q>=2||l>=2||n>50) return 3;
    if(q>=1||n>14) return 2;
    return 1;
  }

  async function genOnline(sysBase, convo, lastU){
    let arr=[];
    if(!!C.multiReplyEnabled){
      const target=pickReplyCount();
      let got=[],round=0,local=convo.slice(-60);
      while(got.length<target && round<4){
        round++;
        const need=target-got.length;
        const sys=sysBase.slice();
        sys.push({role:"system",content:
          "即时聊天。严格回复"+need+"条，每条必须<msg>...</msg>。禁止舞台说明、禁止旁白心理描写、禁止单独输出“继续”。"});
        const r=await callRaw(sys.concat(local));
        let chunk=cleanOnline(parseMsgs(r.text));
        if(!chunk.length) break;
        if(chunk.length>need) chunk=chunk.slice(0,need);
        got=got.concat(chunk);
        chunk.forEach(t=>local.push({role:"assistant",content:t}));
      }
      arr=got;
    }else{
      let soft=suggestCount(lastU);
      if(Math.random()<0.3 && soft<4) soft++;

      const sys=sysBase.slice();
      sys.push({role:"system",content:
      "即时聊天。按人设和当前剧情自然决定对话气泡条数，灵活运用不要死板。像QQ聊天一样自然，多揣摩人设，一定要非常贴合，很重要，不要浮于表面。多条时使用<msg>...</msg>。禁止舞台说明、禁止‘他在想/他做了什么’这类旁白。"});
      sys.push({role:"system",content:"本轮建议约"+soft+"条（建议，不强制），重点是贴人设。"});
      const r1=await callRaw(sys.concat(convo.slice(-60)));
      arr=cleanOnline(parseMsgs(r1.text));

      if(arr.length===1 && soft>=2){
        const r2=await callRaw(sys.concat(convo.slice(-60)).concat([
          {role:"assistant",content:arr[0]},
          {role:"user",content:"补一条自然跟进短消息，不重复上一条。"}
        ]));
        const add=cleanOnline(parseMsgs(r2.text));
        if(add.length) arr.push(add[0]);
      }
    }
    if(!arr.length) arr=["我在。把话说完。"];
    return arr;
  }

  function endOk(s){ return /[。！？!?…】》）」』"']$/.test(String(s||"").trim()); }

  async function genOffline(sysBase, convo){
    const rg=getOfflineRange();
    let full="",local=convo.slice(-60),round=0;

    while(round<6){
      round++;
      const need=Math.max(0, rg.min - tlen(full));
      const sys=sysBase.slice();
      if(round===1){
        sys.push({role:"system",content:
`沉浸式角色扮演：
1）只输出剧情，不提模式/系统/AI。
2）先状态栏：
『时间』：
『地点』：
『人物』：
『关系』：
『状态』：
—— 正文 ——
3）正文以对话推进剧情，不要整段小说旁白，不替用户下结论。
4）承接上一轮聊天，禁止场景大跳。
5）目标总长度${rg.min}-${rg.max}字，结尾必须完整。`});
      }else{
        sys.push({role:"system",content:"继续接上文，只补正文，不重复状态栏，不总结，补约"+need+"字并完整收尾。"});
      }

      const r=await callRaw(sys.concat(local));
      let part=(r.text||"").trim();
      if(!part) break;

      if(!full) full=part;
      else{
        const body=part.replace(/^[\s\S]*?——\s*正文\s*——/,"").trim();
        full += "\n\n" + (body||part);
      }

      if(tlen(full)>=rg.min && endOk(full) && r.reason!=="length") break;
      local.push({role:"assistant",content:part});
      local.push({role:"user",content:"继续接上文，不重复，补完并收束。"});
    }

    if(!endOk(full)){
      const fix=await callRaw([
        {role:"system",content:"只补最后1-2句收尾，不重写前文。"},
        {role:"user",content:full}
      ]);
      if(fix.text) full += "\n\n"+fix.text.trim();
    }

    return full || "『时间』：夜间\n『地点』：当前场景\n『人物』：你、我\n『关系』：按当前人设\n『状态』：气氛未散\n\n—— 正文 ——\n我看着你，等你下一句。";
  }

    var b = document.getElementById(id);
    if(b) b.click(); else toast("功能还没就绪");
  }
  function ensureFab(){
    if(document.getElementById("nxFab")) return;

    var fab = document.createElement("button");
    fab.id = "nxFab";
    fab.textContent = "⋯";

    var ops = document.createElement("div");
    ops.id = "nxOps";
    ops.innerHTML = [
      '<button class="op" data-id="selToggle">选择模式</button>',
      '<button class="op" data-id="selAll">全选</button>',
      '<button class="op" data-id="actQuote">引用</button>',
      '<button class="op" data-id="actFav">收藏</button>',
      '<button class="op" data-id="openFav">打开收藏夹</button>',
      '<button class="op" data-id="actHide">隐藏给AI</button>',
      '<button class="op" data-id="actDel">删除</button>',
      '<button class="op" data-id="actUndo">撤销</button>'
    ].join("");

    fab.onclick = function(){
      ops.classList.toggle("show");
    };
    ops.addEventListener("click", function(e){
      var btn = e.target.closest(".op");
      if(!btn) return;
      var id = btn.getAttribute("data-id");
      clickById(id);
      ops.classList.remove("show");
    });

    document.body.appendChild(ops);
    document.body.appendChild(fab);

    document.addEventListener("click", function(e){
      if(!ops.contains(e.target) && e.target!==fab) ops.classList.remove("show");
    });
  }

  /* ---------- 收藏夹：单删/全删 ---------- */
  function ensureFavActions(){
    var hd = document.getElementById("favHd");
    if(!hd) return;
    if(document.getElementById("favActions")) return;

    var box = document.createElement("div");
    box.id = "favActions";
    box.innerHTML = [
      '<button class="btnMini" id="favRefreshBtn">刷新</button>',
      '<button class="btnMini" id="favClearBtn">全部清空</button>'
    ].join("");
    hd.appendChild(box);

    document.getElementById("favRefreshBtn").onclick = renderFavWithDelete;
    document.getElementById("favClearBtn").onclick = function(){
      var H = currentHistory();
      var changed = 0;
      for(var i=0;i<H.length;i++){
        if(H[i] && H[i].fav){ H[i].fav = false; changed++; }
      }
      save("nx_hmap", HMap);
      renderFavWithDelete();
      toast(changed ? ("已清空 "+changed+" 条收藏") : "收藏夹已空");
    };
  }

  function renderFavWithDelete(){
    var body = document.getElementById("favBd");
    if(!body) return;
    var H = currentHistory();
    var html = "";
    var count = 0;

    for(var i=0;i<H.length;i++){
      var m = H[i];
      if(m && m.fav){
        count++;
        html +=
          '<div class="favIt" data-idx="'+i+'">' +
            '<button class="favDel" data-idx="'+i+'">删除</button>' +
            '<div class="favMeta">#'+i+' · '+(m.role==="assistant"?"AI":"你")+' · '+(m.time||"")+'</div>' +
            '<div>'+escHtml((m.content||"").slice(0,240))+'</div>' +
          '</div>';
      }
    }

    if(!count) html = '<div class="favIt">还没有收藏。</div>';
    body.innerHTML = html;

    body.querySelectorAll(".favDel").forEach(function(btn){
      btn.onclick = function(){
        var idx = parseInt(this.getAttribute("data-idx"),10);
        if(isNaN(idx)) return;
        var H2 = currentHistory();
        if(H2[idx]) H2[idx].fav = false;
        save("nx_hmap", HMap);
        renderFavWithDelete();
        toast("已从收藏删除");
      };
    });
  }// 接管“打开收藏夹”按钮，确保每次进来都可删
  function hookOpenFav(){
    var b = document.getElementById("openFav");
    if(!b || b.dataset.v11a==="1") return;
    b.dataset.v11a = "1";
    b.onclick = function(){
      var modal = document.getElementById("favModal");
      if(!modal){ toast("收藏面板未就绪"); return; }
      ensureFavActions();
      renderFavWithDelete();
      modal.classList.add("show");
    };
  }


  /* ---------- 初始化 ---------- */
  function boot(){
    ensureTopFavBtn();
    ensureFavModal2();
    ensureLPSheet();
    ensureQuoteBar();
    bindLongPress();
    setTimeout(function(){
      ensureMePanel();
      renderChat();
    }, 120);
  }
  boot();
})();</script>
<script>
/* ===== ONE-SHOT FIX PACK (favorites + longpress + me-profile) ===== */
(function () {
  if (window.__NX_ONE_SHOT_FIX__) return;
  window.__NX_ONE_SHOT_FIX__ = true;

  function $(s){ return document.querySelector(s); }
  function ehtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function toastX(t){ try{ toast(t); }catch(e){ alert(t); } }
  function ch(){ try{return currentHistory()}catch(e){return[]} }

  // 可见标记：确认补丁执行
  setTimeout(function(){
    var st = document.getElementById("status");
    if(st){ st.textContent = "FIX-OK"; st.className = "st"; }
  }, 80);

  // 样式
  var css = document.createElement("style");
  css.textContent = `
    #nxTopFavBtn{margin-left:8px}
    #nxLPMask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:10050;align-items:flex-end;justify-content:center;padding:10px}
    #nxLPMask.show{display:flex}
    #nxLPCard{width:min(95vw,420px);background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:6px}
    #nxLPCard .op{width:100%;padding:10px 12px;text-align:left;border:1px solid var(--bd);border-radius:10px;background:var(--bg3);color:var(--tx)}
    .msg.sel{outline:2px solid rgba(201,168,124,.95)}
    .msg.hiddenAI{opacity:.42}
    #nxFavModal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:10060;align-items:center;justify-content:center;padding:12px}
    #nxFavModal.show{display:flex}
    #nxFavCard{width:min(95vw,440px);max-height:84vh;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
    #nxFavHd{padding:10px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:8px}
    #nxFavHd .r{display:flex;gap:6px;flex-wrap:wrap}
    #nxFavBd{padding:10px;overflow:auto;display:flex;flex-direction:column;gap:8px}
    .nxFavItem{border:1px solid var(--bd);border-radius:10px;background:var(--bg3);padding:8px}
    .nxFavMeta{font-size:11px;color:var(--tx3);margin-bottom:4px}
    .nxQuoteBar{display:none;border:1px solid var(--bd);background:var(--bg2);border-radius:10px;padding:6px 8px;margin-bottom:6px;font-size:12px;color:var(--tx2)}
    .nxQuoteBar.show{display:flex;justify-content:space-between;align-items:center;gap:8px}
  `;
  document.head.appendChild(css);

  // 数据
  var NX = {
    selMode:false,
    sel:new Set(),
    undo:[],
    quote:null, // {from,time,text}
    holdTimer:null
  };
  function pushUndo(op){ NX.undo.push(op); if(NX.undo.length>40) NX.undo.shift(); }
  function selectedIdx(){ return Array.from(NX.sel).sort(function(a,b){return a-b}); }
  function repaintSel(){
    document.querySelectorAll("#chat .msg").forEach(function(el){
      var i = parseInt(el.dataset.idx,10);
      el.classList.toggle("sel", NX.sel.has(i));
    });
  }

  // renderChat打idx + hidden样式
  var _renderChat = window.renderChat;
  window.renderChat = function(){
    _renderChat && _renderChat();
    var H = ch();
    var nodes = document.querySelectorAll("#chat .line .msg");
    nodes.forEach(function(el, idx){
      el.dataset.idx = String(idx);
      el.classList.toggle("hiddenAI", !!(H[idx] && H[idx].hiddenFromAI));
      el.classList.toggle("sel", NX.sel.has(idx));
    });
    ensureUI();
  };

  // 引用条
  function ensureQuoteBar(){
    if(document.getElementById("nxQuoteBar")) return;
    var inputBar = document.querySelector(".inputBar");
    if(!inputBar) return;
    var sendRow = inputBar.querySelector(".sendRow");
    if(!sendRow) return;
    var q = document.createElement("div");
    q.id = "nxQuoteBar";
    q.className = "nxQuoteBar";
    q.innerHTML = '<span id="nxQuoteText"></span><button id="nxQuoteCancel" class="btn2" style="padding:3px 8px;font-size:11px">取消</button>';
    inputBar.insertBefore(q, sendRow);
    document.getElementById("nxQuoteCancel").onclick = function(){
      NX.quote = null; refreshQuoteBar();
    };
  }
  function refreshQuoteBar(){
    ensureQuoteBar();
    var bar = document.getElementById("nxQuoteBar");
    var txt = document.getElementById("nxQuoteText");
    if(!bar || !txt) return;
    if(!NX.quote){ bar.classList.remove("show"); txt.textContent = ""; return; }
    txt.textContent = "引用 " + NX.quote.from + " " + (NX.quote.time||"") + "：" + String(NX.quote.text||"").slice(0,60);
    bar.classList.add("show");
  }
  function quoteObj(){
    return NX.quote ? {from:NX.quote.from,time:NX.quote.time,text:NX.quote.text} : null;
  }

  // 把引用挂到用户发送
  var _queue = window.queueMessage;
  window.queueMessage = function(){
    var inp = document.getElementById("inp");
    var text = (inp && inp.value ? inp.value : "").trim();
    if(!text) return _queue && _queue();

    var H = ch();
    H.push({
      role:"user", type:"text", content:text, time:(typeof now==="function"?now():""),
      mode:(window.C&&C.chatMode)||"online", quote:quoteObj()
    });
    try{ save("nx_hmap", HMap); }catch(e){}
    if(inp){ inp.value=""; inp.style.height="auto"; }
    NX.quote = null; refreshQuoteBar();
    if(typeof renderChat==="function") renderChat();
    toastX("已暂存");
  };

  // 收藏夹
  function ensureFavModal(){
    if(document.getElementById("nxFavModal")) return;
    var m = document.createElement("div");
    m.id = "nxFavModal";
    m.innerHTML =
      '<div id="nxFavCard">'+
        '<div id="nxFavHd"><b>收藏夹</b><div class="r">'+
          '<button id="nxFavAll" class="btn2" style="padding:4px 8px;font-size:11px">全选</button>'+
          '<button id="nxFavDelSel" class="btn2 btnDanger" style="padding:4px 8px;font-size:11px">删选中</button>'+
          '<button id="nxFavDelAll" class="btn2 btnDanger" style="padding:4px 8px;font-size:11px">全部清空</button>'+
          '<button id="nxFavClose" class="btn2" style="padding:4px 8px;font-size:11px">关闭</button>'+
        '</div></div>'+
        '<div id="nxFavBd"></div>'+
      '</div>';
    document.body.appendChild(m);

    m.addEventListener("click", function(e){ if(e.target===m) m.classList.remove("show"); });
    document.getElementById("nxFavClose").onclick = function(){ m.classList.remove("show"); };
    document.getElementById("nxFavAll").onclick = function(){
      document.querySelectorAll("#nxFavBd .favChk").forEach(function(c){ c.checked=true; });
    };
    document.getElementById("nxFavDelSel").onclick = function(){
      var H = ch(); var ids=[];
      document.querySelectorAll("#nxFavBd .favChk:checked").forEach(function(c){ ids.push(parseInt(c.dataset.idx,10)); });
      if(!ids.length){ toastX("没选收藏"); return; }
      ids.forEach(function(i){ if(H[i]) H[i].fav=false; });
      try{ save("nx_hmap", HMap); }catch(e){}
      renderFavModal();
      if(typeof renderChat==="function") renderChat();
      toastX("已删除选中收藏");
    };
    document.getElementById("nxFavDelAll").onclick = function(){
      var H = ch(), n=0;
      for(var i=0;i<H.length;i++){ if(H[i]&&H[i].fav){ H[i].fav=false; n++; } }
      try{ save("nx_hmap", HMap); }catch(e){}
      renderFavModal();
      if(typeof renderChat==="function") renderChat();
      toastX(n?("已清空 "+n+" 条收藏"):"收藏夹已空");
    };
  }

  function renderFavModal(){
    ensureFavModal();
    var body = document.getElementById("nxFavBd");
    var H = ch();
    var html="", n=0;
    for(var i=0;i<H.length;i++){
      var m=H[i];
      if(m && m.fav){
        n++;
        html += '<div class="nxFavItem">'+
          '<div style="display:flex;gap:8px;align-items:flex-start">'+
            '<input class="favChk" type="checkbox" data-idx="'+i+'">'+
            '<div style="flex:1;min-width:0">'+
              '<div class="nxFavMeta">#'+i+' · '+(m.role==="assistant"?"AI":"你")+' · '+(m.time||"")+'</div>'+
              '<div>'+ehtml((m.content||"").slice(0,260))+'</div>'+
            '</div>'+
          '</div>'+
        '</div>';
      }
    }
    if(!n) html = '<div class="nxFavItem">还没有收藏。</div>';
    body.innerHTML = html;
  }
  function openFavModal(){
    renderFavModal();
    document.getElementById("nxFavModal").classList.add("show");
  }

  // 头部收藏按钮（稳定）
  function ensureTopFav(){
    if(document.getElementById("nxTopFavBtn")) return;
    var hd = document.querySelector(".hd");
    if(!hd) return;
    var b = document.createElement("button");
    b.id = "nxTopFavBtn";
    b.className = "icon";
    b.textContent = "★";
    b.onclick = openFavModal;
    hd.appendChild(b);
  }

  // 长按操作面板
  function ensureSheet(){
    if(document.getElementById("nxLPMask")) return;
    var m = document.createElement("div");
    m.id = "nxLPMask";
    m.innerHTML =
      '<div id="nxLPCard">'+
        '<button class="op" data-act="toggleSel">选择/取消选择</button>'+
        '<button class="op" data-act="selectAll">全选</button>'+
        '<button class="op" data-act="quote">引用</button>'+
        '<button class="op" data-act="fav">收藏</button>'+
        '<button class="op" data-act="unfav">取消收藏</button>'+
        '<button class="op" data-act="hide">隐藏给AI</button>'+
        '<button class="op" data-act="unhide">取消隐藏</button>'+
        '<button class="op" data-act="del">删除</button>'+
        '<button class="op" data-act="undo">撤销</button>'+
        '<button class="op" data-act="openFav">打开收藏夹</button>'+
        '<button class="op" data-act="cancel">取消</button>'+
      '</div>';
    document.body.appendChild(m);
    m.addEventListener("click", function(e){ if(e.target===m) m.classList.remove("show"); });
    m.querySelectorAll(".op").forEach(function(btn){
      btn.onclick = function(){ runAct(this.dataset.act); };
    });
  }
  function showSheet(){ ensureSheet(); document.getElementById("nxLPMask").classList.add("show"); }
  function hideSheet(){ var m=document.getElementById("nxLPMask"); if(m) m.classList.remove("show"); }

  function runAct(act){
    var H = ch();
    var idxs = selectedIdx();

    if(act==="cancel"){ hideSheet(); return; }
    if(act==="openFav"){ openFavModal(); hideSheet(); return; }

    if(act==="toggleSel"){
      NX.selMode = !NX.selMode;
      if(!NX.selMode) NX.sel.clear();
      repaintSel();
      toastX(NX.selMode?"选择模式已开":"选择模式已关");
      return;
    }
    if(act==="selectAll"){
      NX.selMode = true;
      NX.sel.clear();
      for(var i=0;i<H.length;i++) NX.sel.add(i);
      repaintSel();
      return;
    }
    if(act==="undo"){
      var op = NX.undo.pop();
      if(!op){ toastX("没有可撤销操作"); return; }
      if(op.type==="fav"){ op.memo.forEach(function(x){ if(H[x.i]) H[x.i].fav = x.prev; }); }
      if(op.type==="hide"){ op.memo.forEach(function(x){ if(H[x.i]) H[x.i].hiddenFromAI = x.prev; }); }
      if(op.type==="del"){ op.removed.forEach(function(x){ H.splice(x.i,0,x.msg); }); }
      try{ save("nx_hmap", HMap); }catch(e){}
      if(typeof renderChat==="function") renderChat();
      toastX("已撤销");
      return;
    }

    if(!idxs.length){ toastX("先选消息"); return; }

    if(act==="quote"){
      if(idxs.length!==1){ toastX("引用需选1条"); return; }
      var q = H[idxs[0]];
      NX.quote = {from:q.role==="assistant"?"AI":"你", time:q.time||"", text:q.content||""};
      refreshQuoteBar();
      hideSheet();
      return;
    }

    if(act==="fav"||act==="unfav"){
      var to = (act==="fav"), memo=[];
      idxs.forEach(function(i){ if(H[i]){ memo.push({i:i,prev:!!H[i].fav}); H[i].fav=to; } });
      pushUndo({type:"fav",memo:memo});
      try{ save("nx_hmap", HMap); }catch(e){}
      if(typeof renderChat==="function") renderChat();
      toastX(to?"已收藏":"已取消收藏");
      return;
    }

    if(act==="hide"||act==="unhide"){
      var hv = (act==="hide"), memo2=[];
      idxs.forEach(function(i){ if(H[i]){ memo2.push({i:i,prev:!!H[i].hiddenFromAI}); H[i].hiddenFromAI=hv; } });
      pushUndo({type:"hide",memo:memo2});
      try{ save("nx_hmap", HMap); }catch(e){}
      if(typeof renderChat==="function") renderChat();
      toastX(hv?"已隐藏给AI":"已取消隐藏");
      return;
    }

    if(act==="del"){
      var removed=[];
      for(var k=idxs.length-1;k>=0;k--){
        var di=idxs[k];
        if(H[di]) removed.push({i:di,msg:JSON.parse(JSON.stringify(H[di]))});
        H.splice(di,1);
      }
      removed.sort(function(a,b){return a.i-b.i});
      pushUndo({type:"del",removed:removed});
      NX.sel.clear();
      try{ save("nx_hmap", HMap); }catch(e){}
      if(typeof renderChat==="function") renderChat();
      toastX("已删除");
      return;
    }
  }

  function bindLongPress(){
    var chat = document.getElementById("chat");
    if(!chat || chat.dataset.fixlp==="1") return;
    chat.dataset.fixlp = "1";

    chat.addEventListener("touchstart", function(e){
      var msg = e.target.closest(".msg");
      if(!msg) return;
      var idx = parseInt(msg.dataset.idx,10);
      if(isNaN(idx)) return;

      NX.holdTimer = setTimeout(function(){
        NX.selMode = true;
        NX.sel.add(idx);
        repaintSel();
        showSheet();
      }, 420);
    }, {passive:true});

    chat.addEventListener("touchend", function(){ if(NX.holdTimer) clearTimeout(NX.holdTimer); }, {passive:true});
    chat.addEventListener("touchmove", function(){ if(NX.holdTimer) clearTimeout(NX.holdTimer); }, {passive:true});

    chat.addEventListener("click", function(e){
      if(!NX.selMode) return;
      var msg = e.target.closest(".msg");
      if(!msg) return;
      var idx = parseInt(msg.dataset.idx,10);
      if(isNaN(idx)) return;
      if(NX.sel.has(idx)) NX.sel.delete(idx); else NX.sel.add(idx);
      repaintSel();
      e.preventDefault();
    }, true);
  }

  /* ---------- 我的人设 ---------- */
  var meProfiles = load("nx_me_profiles_fix", []);
  var roleMeMap = load("nx_role_me_map_fix", {});

  function saveMeData(){
    save("nx_me_profiles_fix", meProfiles);
    save("nx_role_me_map_fix", roleMeMap);
  }
  function meById(id){
    for(var i=0;i<meProfiles.length;i++) if(meProfiles[i].id===id) return meProfiles[i];
    return null;
  }

  function ensureMePanel(){
    var wrap = document.querySelector("#page-settings .wrap");
    if(!wrap) return;
    if(document.getElementById("meFixCard")) return;

    var card = document.createElement("div");
    card.className = "card";
    card.id = "meFixCard";
    card.innerHTML =
      '<div class="ct">我的人设</div>'+
      '<div class="f"><div class="fl">已有人设</div><select id="meFixSel" class="fs"></select></div>'+
      '<div class="f"><div class="fl">名称</div><input id="meFixName" class="fi" placeholder="例如：弥洛"></div>'+
      '<div class="f"><div class="fl">内容</div><textarea id="meFixContent" class="ta" placeholder="身份、关系、称呼、说话习惯等"></textarea></div>'+
      '<div class="row"><button class="btn2" id="meFixSave">保存/更新</button><button class="btn2 btnDanger" id="meFixDel">删除</button></div>'+
      '<div class="row" style="margin-top:8px">'+
        '<div class="f"><div class="fl">角色</div><select id="meFixRoleSel" class="fs"></select></div>'+
        '<div class="f"><div class="fl">绑定人设</div><select id="meFixBindSel" class="fs"></select></div>'+
      '</div>'+
      '<div class="row"><button class="btn" id="meFixBindSave">保存绑定</button></div>';

    wrap.appendChild(card);

    function renderMe(){
      var sel = document.getElementById("meFixSel");
      var bind = document.getElementById("meFixBindSel");
      var h = '<option value="">-- 新建 --</option>';
      for(var i=0;i<meProfiles.length;i++) h += '<option value="'+meProfiles[i].id+'">'+ehtml(meProfiles[i].name||("人设"+(i+1)))+'</option>';
      sel.innerHTML = h;
      bind.innerHTML = '<option value="">-- 不绑定 --</option>' + h.replace('<option value="">-- 新建 --</option>','');
    }

    function renderRole(){
      var rs = document.getElementById("meFixRoleSel");
      var h = "";
      for(var i=0;i<roles.length;i++) h += '<option value="'+roles[i].id+'">'+ehtml(roles[i].name||"未命名")+'</option>';
      rs.innerHTML = h || '<option value="">无角色</option>';
      if(rs.value) document.getElementById("meFixBindSel").value = roleMeMap[rs.value] || "";
    }

    document.getElementById("meFixSel").onchange = function(){
      var m = meById(this.value);
      document.getElementById("meFixName").value = m?(m.name||""):"";
      document.getElementById("meFixContent").value = m?(m.content||""):"";
    };

    document.getElementById("meFixSave").onclick = function(){
      var id = document.getElementById("meFixSel").value || ("me_"+Math.random().toString(36).slice(2,9));
      var name = (document.getElementById("meFixName").value||"").trim();
      var content = (document.getElementById("meFixContent").value||"").trim();
      if(!name || !content){ toastX("名称和内容都要填"); return; }

      var idx = -1;
      for(var i=0;i<meProfiles.length;i++) if(meProfiles[i].id===id){ idx=i; break; }
      var obj = {id:id,name:name,content:content};
      if(idx>=0) meProfiles[idx]=obj; else meProfiles.unshift(obj);
      saveMeData();
      renderMe();
      document.getElementById("meFixSel").value = id;
      document.getElementById("meFixBindSel").value = id;
      toastX("我的人设已保存");
    };

    document.getElementById("meFixDel").onclick = function(){
      var id = document.getElementById("meFixSel").value;
      if(!id){ toastX("先选一个人设"); return; }
      meProfiles = meProfiles.filter(function(x){ return x.id!==id; });
      Object.keys(roleMeMap).forEach(function(rid){ if(roleMeMap[rid]===id) delete roleMeMap[rid]; });
      saveMeData();
      document.getElementById("meFixName").value = "";
      document.getElementById("meFixContent").value = "";
      renderMe(); renderRole();
      toastX("已删除");
    };

    document.getElementById("meFixRoleSel").onchange = function(){
      document.getElementById("meFixBindSel").value = roleMeMap[this.value] || "";
    };

    document.getElementById("meFixBindSave").onclick = function(){
      var rid = document.getElementById("meFixRoleSel").value;
      var mid = document.getElementById("meFixBindSel").value;
      if(!rid){ toastX("先选角色"); return; }
      if(mid) roleMeMap[rid]=mid; else delete roleMeMap[rid];
      saveMeData();
      toastX("绑定已保存");
    };

    renderMe();
    renderRole();
  }

  // 进设置页时确保注入
  var _switchTab = window.switchTab;
  window.switchTab = function(name,btn){
    _switchTab && _switchTab(name,btn);
    if(name==="settings") setTimeout(function(){ ensureMePanel(); }, 40);
  };

  // 注入到请求
  var _request = window.requestReply;
  window.requestReply = async function(){
    var r = currentRole ? currentRole() : null;
    var oldPrompt = null;
    if(r){
      oldPrompt = r.prompt || "";
      var mid = roleMeMap[r.id] || "";
      var me = meById(mid);
      if(me && me.content){
        r.prompt = (oldPrompt ? oldPrompt + "\n\n" : "") +
          "【用户人设】\n名称："+(me.name||"未命名")+"\n"+me.content+
          "\n要求：按该用户设定互动，不要复述规则。";
      }
    }
    try{
      return await _request.apply(this, arguments);
    }finally{
      if(r) r.prompt = oldPrompt || "";
    }
  };

  // 初始化
  function boot(){
    ensureTopFav();
    ensureFavModal();
    ensureSheet();
    ensureQuoteBar();
    bindLongPress();
    setTimeout(function(){
      ensureMePanel();
      renderChat();
      toastX("修复补丁已加载");
    }, 120);
  }
  boot();
})();
</script>
<script>
/* ===== FINAL TAIL PATCH: unified ops + QQ/WeChat quote + big editor ===== */
(function(){
  if (window.__NX_FINAL_TAIL_PATCH__) return;
  window.__NX_FINAL_TAIL_PATCH__ = true;

  // ---- hard fallback: avoid "__selSet is not defined" ----
  window.__selSet = window.__selSet || new Set();

  const U = {
    selMode: false,
    selected: new Set(),
    quote: null, // {from,time,text,idx}
    undo: []
  };

  const $ = (s)=>document.querySelector(s);
  const esc = (s)=>String(s||"")
    .replace(/&/g,"&").replace(/</g,"<").replace(/>/g,">");
  const toastX = (t)=>{ try{ toast(t); }catch(e){ alert(t); } };
  const H = ()=> (typeof currentHistory==="function" ? currentHistory() : []);
  const saveH = ()=> { try{ save("nx_hmap", HMap); }catch(e){} };
  const pushUndo = (op)=>{ U.undo.push(op); if(U.undo.length>40) U.undo.shift(); };
  const sortedIdx = ()=> Array.from(U.selected).sort((a,b)=>a-b);

  // ---------- styles ----------
  const st = document.createElement("style");
  st.textContent = `
    /* message select */
    #chat .msg.u-sel{outline:2px solid rgba(201,168,124,.92)}
    #chat .msg.hiddenAI{opacity:.42}

    /* quote bar above input */
    #uQuoteBar{
      display:none; align-items:center; justify-content:space-between; gap:8px;
      border:1px solid var(--bd); background:var(--bg2); border-radius:10px;
      padding:7px 10px; font-size:12px; color:var(--tx2);
      margin-bottom:6px;
    }
    #uQuoteBar.show{display:flex}
    #uQuoteText{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:78%}
    #uQuoteClose{border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);border-radius:8px;padding:2px 8px}

    /* quote block in message */
    .uQuote{
      border-radius:10px; padding:7px 9px; margin-bottom:7px; font-size:12px; line-height:1.4;
      border-left:3px solid #62a7ff; background:rgba(98,167,255,.14); color:#dbe9ff;
    }
    .uQuote .m{opacity:.78;font-size:11px;margin-bottom:3px}
    .uQuote.qq{border-left-color:#8ab4ff;background:rgba(138,180,255,.10)}
    .uQuote.qq .t:before{content:"> ";opacity:.85}

    /* unified ops panel */
    #uOpsMask{
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:none; align-items:flex-end; justify-content:center; z-index:10090; padding:10px;
    }
    #uOpsMask.show{display:flex}
    #uOps{
      width:min(96vw,460px); background:var(--bg2); border:1px solid var(--bd); border-radius:14px;
      padding:8px; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    }
    #uOps .op{
      border:1px solid var(--bd); background:var(--bg3); color:var(--tx);
      border-radius:10px; padding:10px 8px; font-size:13px;
    }
    #uOps .op.wide{grid-column:1 / -1}

    /* big editor modal */
    #uEditMask{
      position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
      align-items:center; justify-content:center; z-index:10100; padding:14px;
    }
    #uEditMask.show{display:flex}
    #uEditCard{
      width:min(95vw,760px); max-height:88vh; background:var(--bg2); border:1px solid var(--bd);
      border-radius:14px; display:flex; flex-direction:column; overflow:hidden;
    }
    #uEditHd{padding:12px 14px; border-bottom:1px solid var(--bd); font-weight:700}
    #uEditBd{padding:12px; flex:1; display:flex; flex-direction:column; gap:10px}
    #uEditTa{
      width:100%; min-height:42vh; max-height:58vh; resize:none;
      background:var(--bg3); color:var(--tx); border:1px solid var(--bd);
      border-radius:10px; padding:12px; font-size:15px; line-height:1.6; outline:none;
    }
    #uEditFt{display:flex; justify-content:flex-end; gap:8px}
    #uEditFt button{
      border:1px solid var(--bd); background:var(--bg3); color:var(--tx);
      border-radius:10px; padding:8px 14px;
    }
    #uEditOk{background:linear-gradient(135deg,var(--ac1),var(--ac2))!important;color:#111!important;border:none!important}
  `;
  document.head.appendChild(st);

  // ---------- UI builders ----------
  function ensureQuoteBar(){
    if ($("#uQuoteBar")) return;
    const ib = document.querySelector(".inputBar");
    if(!ib) return;
    const sendRow = ib.querySelector(".sendRow");
    const q = document.createElement("div");
    q.id = "uQuoteBar";
    q.innerHTML = `<span id="uQuoteText"></span><button id="uQuoteClose">取消</button>`;
    ib.insertBefore(q, sendRow);
    $("#uQuoteClose").onclick = ()=>{ U.quote=null; refreshQuoteBar(); };
  }
  function refreshQuoteBar(){
    ensureQuoteBar();
    const bar=$("#uQuoteBar"), t=$("#uQuoteText");
    if(!bar||!t) return;
    if(!U.quote){ bar.classList.remove("show"); t.textContent=""; return; }
    t.textContent = `引用 ${U.quote.from} ${U.quote.time||""}：${String(U.quote.text||"").slice(0,60)}`;
    bar.classList.add("show");
  }

  function ensureOps(){
    if ($("#uOpsMask")) return;
    const m = document.createElement("div");
    m.id = "uOpsMask";
    m.innerHTML = `
      <div id="uOps">
        <button class="op" data-a="quote">引用</button>
        <button class="op" data-a="fav">收藏</button>
        <button class="op" data-a="hide">隐藏给AI</button>

        <button class="op" data-a="unhide">取消隐藏</button>
        <button class="op" data-a="edit">编辑</button>
        <button class="op" data-a="del">删除</button>

        <button class="op" data-a="all">全选</button>
        <button class="op" data-a="toggle">选择/取消选择</button>
        <button class="op" data-a="undo">撤销</button>

        <button class="op wide" data-a="openFav">打开收藏夹</button>
        <button class="op wide" data-a="cancel">取消</button>
      </div>
    `;
    document.body.appendChild(m);
    m.addEventListener("click", (e)=>{
      if (e.target === m) return hideOps();
      const b = e.target.closest(".op"); if(!b) return;
      runAct(b.dataset.a);
    });
  }
  function showOps(){ ensureOps(); $("#uOpsMask").classList.add("show"); }
  function hideOps(){ const m=$("#uOpsMask"); if(m) m.classList.remove("show"); }

  function ensureEditor(){
    if ($("#uEditMask")) return;
    const m = document.createElement("div");
    m.id = "uEditMask";
    m.innerHTML = `
      <div id="uEditCard">
        <div id="uEditHd">编辑消息</div>
        <div id="uEditBd">
          <textarea id="uEditTa"></textarea>
          <div id="uEditFt">
            <button id="uEditCancel">取消</button>
            <button id="uEditOk">保存</button>
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(m);
    $("#uEditCancel").onclick = ()=> m.classList.remove("show");
  }
  function openEditor(init, onOk){
    ensureEditor();
    const m=$("#uEditMask"), ta=$("#uEditTa");
    ta.value = init||"";
    m.classList.add("show");
    setTimeout(()=>ta.focus(),10);
    $("#uEditOk").onclick = ()=>{
      onOk(ta.value);
      m.classList.remove("show");
    };
  }

  // ---------- actions ----------
  function paintSel(){
    const arr = document.querySelectorAll("#chat .line .msg");
    arr.forEach((el,idx)=>{
      el.classList.toggle("u-sel", U.selected.has(idx));
      const hh = H();
      el.classList.toggle("hiddenAI", !!(hh[idx] && hh[idx].hiddenFromAI));
    });
  }
  function clearSel(){ U.selected.clear(); paintSel(); }

  function runAct(a){
    const h = H();
    const idxs = sortedIdx();

    if(a==="cancel"){ hideOps(); return; }
    if(a==="toggle"){
      U.selMode = !U.selMode;
      if(!U.selMode) clearSel();
      toastX(U.selMode ? "选择模式已开" : "选择模式已关");
      return;
    }
    if(a==="all"){
      U.selMode = true; U.selected.clear();
      for(let i=0;i<h.length;i++) U.selected.add(i);
      paintSel(); return;
    }
    if(a==="undo"){
      const op = U.undo.pop();
      if(!op){ toastX("没有可撤销操作"); return; }
      if(op.t==="fav") op.m.forEach(x=>{ if(h[x.i]) h[x.i].fav=x.p; });
      if(op.t==="hide") op.m.forEach(x=>{ if(h[x.i]) h[x.i].hiddenFromAI=x.p; });
      if(op.t==="del") op.r.forEach(x=>h.splice(x.i,0,x.m));
      if(op.t==="edit" && h[op.i]) h[op.i].content = op.p;
      saveH(); renderChat(); toastX("已撤销"); return;
    }

    if(a==="openFav"){
      const b = $("#nxTopFavBtn") || $("#favOpenBtn") || $("#openFav");
      if(b) b.click(); else toastX("收藏夹入口未找到");
      hideOps(); return;
    }

    if(!idxs.length){ toastX("先选消息"); return; }

    if(a==="quote"){
      if(idxs.length!==1){ toastX("引用需选1条"); return; }
      const m = h[idxs[0]]; if(!m){ toastX("无效消息"); return; }
      U.quote = { from: m.role==="assistant"?"AI":"你", time:m.time||"", text:m.content||"", idx:idxs[0] };
      refreshQuoteBar();
      clearSel(); hideOps();
      return;
    }

    if(a==="fav"){
      const memo=[]; idxs.forEach(i=>{ if(h[i]){ memo.push({i,p:!!h[i].fav}); h[i].fav=true; }});
      pushUndo({t:"fav",m:memo}); saveH(); renderChat(); toastX("已收藏"); return;
    }

    if(a==="hide" || a==="unhide"){
      const v = (a==="hide"), memo=[];
      idxs.forEach(i=>{ if(h[i]){ memo.push({i,p:!!h[i].hiddenFromAI}); h[i].hiddenFromAI=v; }});
      pushUndo({t:"hide",m:memo}); saveH(); renderChat(); toastX(v?"已隐藏给AI":"已取消隐藏"); return;
    }

    if(a==="del"){
      const removed=[];
      for(let k=idxs.length-1;k>=0;k--){
        const i=idxs[k];
        if(h[i]) removed.push({i,m:JSON.parse(JSON.stringify(h[i]))});
        h.splice(i,1);
      }
      removed.sort((x,y)=>x.i-y.i);
      pushUndo({t:"del",r:removed});
      clearSel(); saveH(); renderChat(); toastX("已删除"); return;
    }

    if(a==="edit"){
      if(idxs.length!==1){ toastX("编辑需选1条"); return; }
      const i=idxs[0], m=h[i];
      if(!m || m.type!=="text"){ toastX("仅文本可编辑"); return; }
      openEditor(m.content||"", (val)=>{
        pushUndo({t:"edit",i,p:m.content||""});
        m.content = (val||"").trim();
        saveH(); renderChat(); toastX("已保存");
      });
      return;
    }
  }

  // ---------- long press bind ----------
  function bindLongPress(){
    const chat = $("#chat");
    if(!chat || chat.dataset.uLongBind==="1") return;
    chat.dataset.uLongBind = "1";

    let timer=null, startIdx=null;
    chat.addEventListener("touchstart",(e)=>{
      const msg=e.target.closest(".msg"); if(!msg) return;
      const idx=parseInt(msg.dataset.idx,10); if(isNaN(idx)) return;
      startIdx = idx;
      timer=setTimeout(()=>{
        U.selMode = true;
        U.selected.add(startIdx);
        paintSel();
        showOps();
      },420);
    },{passive:true});
    chat.addEventListener("touchmove",()=>{ if(timer) clearTimeout(timer); },{passive:true});
    chat.addEventListener("touchend",()=>{ if(timer) clearTimeout(timer); },{passive:true});

    chat.addEventListener("click",(e)=>{
      if(!U.selMode) return;
      const msg=e.target.closest(".msg"); if(!msg) return;
      const idx=parseInt(msg.dataset.idx,10); if(isNaN(idx)) return;
      if(U.selected.has(idx)) U.selected.delete(idx); else U.selected.add(idx);
      paintSel();
      e.preventDefault();
    },true);
  }

  // ---------- quote rendering (QQ/微信风) ----------
  const _oldRenderMsgContent = window.renderMsgContent;
  window.renderMsgContent = function(m){
    const base = _oldRenderMsgContent ? _oldRenderMsgContent(m) : (typeof markdownToHtml==="function" ? markdownToHtml(m&&m.content||"") : esc(m&&m.content||""));
    if(!m || m.type!=="text" || !m.quote || !m.quote.text) return base;
    const qqOrWx = (m.role==="user") ? "qq" : "wx"; // 你发的像QQ，AI发的像微信
    const q = m.quote;
    const head = `<div class="m">${esc(q.from||"引用")} ${esc(q.time||"")}</div>`;
    const body = `<div class="t">${esc(String(q.text||"").slice(0,140))}</div>`;
    return `<div class="uQuote ${qqOrWx}">${head}${body}</div>` + base;
  };

  // ---------- attach quote when sending ----------
  function quoteObj(){
    return U.quote ? {from:U.quote.from,time:U.quote.time,text:U.quote.text} : null;
  }

  const _oldQueue = window.queueMessage;
  window.queueMessage = function(){
    const inp=$("#inp");
    const text=(inp&&inp.value?inp.value:"").trim();
    if(!text) return _oldQueue && _oldQueue();

    const h = H();
    h.push({
      role:"user", type:"text", content:text, time:(typeof now==="function"?now():""),
      mode:(window.C&&C.chatMode)||"online",
      quote: quoteObj()
    });
    saveH();
    inp.value=""; inp.style.height="auto";
    U.quote=null; refreshQuoteBar();
    renderChat(); toastX("已暂存");
  };

  const _oldReq = window.requestReply;
  window.requestReply = async function(){
    // 如果有引用且输入框有内容，先手动入队（防止被旧requestReply吞掉quote）
    const inp=$("#inp");
    const text=(inp&&inp.value?inp.value:"").trim();
    if(text && U.quote){
      const h = H();
      h.push({
        role:"user", type:"text", content:text, time:(typeof now==="function"?now():""),
        mode:(window.C&&C.chatMode)||"online",
        quote: quoteObj()
      });
      saveH();
      inp.value=""; inp.style.height="auto";
      U.quote=null; refreshQuoteBar();
      renderChat();
    }
    return _oldReq ? _oldReq.apply(this, arguments) : undefined;
  };

  // ---------- render hook ----------
  const _oldRenderChat = window.renderChat;
  window.renderChat = function(){
    _oldRenderChat && _oldRenderChat();
    const ch=$("#chat");
    if(ch){
      const mode = (window.C&&C.chatMode)==="offline" ? "offline":"online";
      ch.classList.remove("online","offline"); ch.classList.add(mode);
      const hh = H();
      ch.querySelectorAll(".line .msg").forEach((el,idx)=>{
        el.dataset.idx=String(idx);
        el.classList.toggle("hiddenAI", !!(hh[idx]&&hh[idx].hiddenFromAI));
      });
    }
    paintSel();
    refreshQuoteBar();
    bindLongPress();
  };

  // boot
  ensureQuoteBar();
  ensureOps();
  ensureEditor();
  bindLongPress();
  renderChat();
  toastX("FINAL PATCH OK");
})();
</script></body>
</html>
