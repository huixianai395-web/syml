<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>小手机AI · 重构骨架</title>
  <meta name="theme-color" content="#e9e9ef" />
  <style>
    :root{
      /* ===== Design Tokens（后续主题系统直接改这里）===== */
      --bg-0:#f3f4f8;
      --bg-1:#eceef4;
      --bg-2:#e4e7f0;
      --ink:#1a1d28;
      --muted:#6e7386;
      --line:rgba(255,255,255,.72);
      --glass:rgba(255,255,255,.45);
      --glass-strong:rgba(255,255,255,.62);
      --accent:#8a86ff;
      --accent-2:#6f6aff;
      --danger:#d75f6f;
      --ok:#57b881;

      --radius-xl:26px;
      --radius-lg:20px;
      --radius-md:14px;
      --radius-sm:10px;

      --shadow-1:0 8px 20px rgba(46,55,88,.12);
      --shadow-2:0 14px 28px rgba(46,55,88,.16);

      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0}
    body{
      background:linear-gradient(180deg,#f8f8fc,#f2f3f8);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--ink);
      user-select:none;
      -webkit-user-select:none;
    }

    .phone{
      width:100%;
      max-width:430px;
      height:100dvh;
      margin:0 auto;
      overflow:hidden;
      position:relative;
      background:var(--bg-0);
      border-left:1px solid rgba(255,255,255,.6);
      border-right:1px solid rgba(255,255,255,.6);
    }

    .wallpaper{
      position:absolute;inset:0;z-index:0;
      background:
        radial-gradient(1200px 500px at 10% -20%, #fff 0%, transparent 55%),
        radial-gradient(900px 500px at 100% 0%, #f0ecff 0%, transparent 45%),
        linear-gradient(180deg,var(--bg-1),var(--bg-2));
      background-size:cover;background-position:center;
      filter:saturate(1.02);
    }

    #particles{
      position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.75
    }

    .page{
      position:absolute;inset:0;z-index:2;
      opacity:0;transform:translateX(12%);
      transition:.26s ease;
      pointer-events:none;
    }
    .page.active{opacity:1;transform:translateX(0);pointer-events:auto}

    .glass{
      background:var(--glass);
      border:1px solid var(--line);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:var(--shadow-1);
    }

    .statusbar{
      padding:calc(var(--safe-top) + 8px) 16px 8px;
      display:flex;align-items:center;justify-content:space-between;
      font-size:18px;font-weight:700;
    }
    .status-icons{display:flex;align-items:center;gap:7px}
    .status-icons svg{display:block}

    /* ===== HOME ===== */
    .home-scroll{
      height:calc(100dvh - 56px - var(--safe-top));
      overflow:auto;
      padding:4px 16px calc(120px + var(--safe-bottom));
      scrollbar-width:none;
    }
    .home-scroll::-webkit-scrollbar{display:none}
    .date-line{text-align:center;font-weight:700;font-size:17px;margin-top:8px}
    .clock-big{text-align:center;font-size:82px;line-height:1;font-weight:300;letter-spacing:1px;margin:6px 0 16px}

    .hero-row{
      display:grid;grid-template-columns:1.1fr .9fr;gap:12px;margin-bottom:14px
    }
    .hero-cover{
      border-radius:var(--radius-xl);
      overflow:hidden;min-height:146px;position:relative;
    }
    .hero-cover img{width:100%;height:100%;object-fit:cover;display:block}
    .hero-meta{
      border-radius:var(--radius-xl);
      padding:12px;display:grid;grid-template-rows:1fr 1fr;gap:10px
    }
    .meta-box{
      border-radius:16px;padding:10px;
      background:rgba(255,255,255,.38);
      border:1px solid rgba(255,255,255,.68);
      display:flex;align-items:center;justify-content:space-between;
      font-size:13px;font-weight:700;color:#4a5168;
    }

    .apps-grid{
      display:grid;grid-template-columns:repeat(4,1fr);gap:14px 10px;
      margin-top:4px;
    }

    .app-icon{text-align:center}
    .app-btn{
      width:74px;height:74px;margin:0 auto 7px;border-radius:22px;border:1px solid rgba(255,255,255,.7);
      background:rgba(255,255,255,.48);
      backdrop-filter:blur(10px);
      box-shadow:0 8px 16px rgba(56,66,95,.16);
      display:grid;place-items:center;
      transition:transform .11s ease, filter .2s ease;
      overflow:hidden;
      cursor:pointer;
    }
    .app-btn:active{transform:scale(.9)}
    .app-btn img{width:100%;height:100%;object-fit:cover}
    .app-emoji{font-size:30px}
    .app-name{font-size:13px;font-weight:700;color:#2c3246;text-shadow:0 1px 0 rgba(255,255,255,.6)}

    .dock{
      position:absolute;left:16px;right:16px;bottom:calc(14px + var(--safe-bottom));z-index:3;
      border-radius:32px;padding:14px 12px;
      display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
      background:var(--glass-strong);
      border:1px solid rgba(255,255,255,.78);
      box-shadow:var(--shadow-2);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }

    .floating-actions{
      position:absolute;right:12px;bottom:calc(126px + var(--safe-bottom));z-index:3;
      display:flex;flex-direction:column;gap:10px
    }
    .fab{
      width:52px;height:52px;border:0;border-radius:999px;
      background:linear-gradient(145deg,var(--accent),var(--accent-2));
      color:#fff;font-size:22px;font-weight:700;box-shadow:var(--shadow-2);cursor:pointer;
    }

    /* ===== common app layout ===== */
    .app-shell{
      height:100%;
      display:grid;grid-template-rows:auto 1fr;
    }
    .topbar{
      padding:calc(var(--safe-top) + 8px) 12px 10px;
      display:flex;align-items:center;gap:8px;
    }
    .topbar .btn-icon{
      width:38px;height:38px;border:0;border-radius:12px;cursor:pointer;
      background:rgba(255,255,255,.68);border:1px solid rgba(255,255,255,.78);
      box-shadow:var(--shadow-1);font-size:18px;font-weight:700;
    }
    .topbar-title{
      flex:1;text-align:center;font-size:17px;font-weight:800;letter-spacing:.3px;margin-right:46px;
    }

    .scroll{
      overflow:auto;padding:0 12px calc(14px + var(--safe-bottom));scrollbar-width:none;
    }
    .scroll::-webkit-scrollbar{display:none}

    .card{
      margin-top:10px;padding:12px;border-radius:18px;
      background:rgba(255,255,255,.55);
      border:1px solid rgba(255,255,255,.8);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      box-shadow:var(--shadow-1);
    }
    .card h3{margin:0 0 10px;font-size:15px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .field{margin-bottom:10px}
    .field label{display:block;font-size:12px;font-weight:700;color:#545b73;margin-bottom:5px}
    .input,.select,.textarea{
      width:100%;border:1px solid rgba(200,206,224,.85);background:rgba(255,255,255,.85);
      border-radius:11px;outline:none;font-size:14px;color:#1f2334;
    }
    .input,.select{height:38px;padding:0 10px}
    .textarea{min-height:70px;padding:9px 10px;resize:vertical}
    .input:focus,.select:focus,.textarea:focus{border-color:#a9a5ff}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{
      border:0;border-radius:10px;padding:9px 12px;cursor:pointer;
      background:linear-gradient(140deg,var(--accent),var(--accent-2));
      color:#fff;font-weight:800;font-size:13px;
    }
    .btn.secondary{background:#8890a8}
    .btn.danger{background:var(--danger)}
    .btn.ghost{
      background:rgba(255,255,255,.7);color:#273049;border:1px solid rgba(255,255,255,.86)
    }
    .hint{font-size:12px;color:#666f88}

    /* ===== roles ===== */
    .role-list,.room-list{display:grid;gap:10px}
    .role-item,.room-item{
      display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;
      padding:10px;border-radius:14px;border:1px solid rgba(255,255,255,.78);background:rgba(255,255,255,.62);
    }
    .avatar{
      width:50px;height:50px;border-radius:15px;overflow:hidden;background:#dfe3ee;display:grid;place-items:center;font-size:22px;
      box-shadow:0 4px 10px rgba(46,55,88,.12)
    }
    .avatar img{width:100%;height:100%;object-fit:cover}
    .role-meta b{display:block;font-size:14px}
    .role-meta span{font-size:12px;color:#636d87}

    /* ===== chat ===== */
    .chat-wrap{
      height:calc(100dvh - 60px - var(--safe-top));
      display:grid;grid-template-rows:auto 1fr auto;
      gap:8px;padding:0 10px calc(10px + var(--safe-bottom));
    }
    .chat-head{
      border-radius:14px;padding:8px 10px;
      background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.8);
      display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;
    }
    .chat-head .title{font-size:14px;font-weight:800}
    .chip{
      border:1px solid rgba(255,255,255,.85);
      background:rgba(255,255,255,.72);
      color:#31374d;
      border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;
    }
    .chat-list{
      overflow:auto;display:flex;flex-direction:column;gap:8px;padding:4px 2px;
      scrollbar-width:none;
    }
    .chat-list::-webkit-scrollbar{display:none}

    .msg{
      max-width:86%;padding:10px 12px;border-radius:14px;
      font-size:14px;line-height:1.45;white-space:pre-wrap;word-break:break-word;
      border:1px solid rgba(255,255,255,.84);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      box-shadow:0 4px 10px rgba(46,55,88,.08);
      user-select:text;-webkit-user-select:text;
    }
    .msg.user{align-self:flex-end;background:rgba(132,128,255,.16)}
    .msg.assistant{align-self:flex-start;background:rgba(255,255,255,.66)}
    .msg.system{align-self:center;background:rgba(223,227,240,.72);font-size:12px;color:#4f576d}
    .msg small{display:block;margin-top:4px;color:#6f7690;font-size:11px}
    .sender{font-size:11px;color:#59617a;font-weight:800;margin-bottom:4px}

    .card-msg{
      border-radius:13px;border:1px solid rgba(255,255,255,.85);
      background:rgba(255,255,255,.72);padding:9px 10px
    }
    .card-title{font-size:12px;font-weight:800;color:#4d5570;margin-bottom:4px}
    .voice-pill{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(138,134,255,.14);padding:7px 10px;border-radius:999px;font-weight:700;font-size:12px
    }

    .composer{
      border-radius:16px;padding:8px;background:rgba(255,255,255,.66);border:1px solid rgba(255,255,255,.84);
      display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:end;
      box-shadow:var(--shadow-1);
    }
    .composer textarea{
      min-height:42px;max-height:120px;resize:none;border-radius:11px;border:1px solid #d4d8e8;background:#fff;
      padding:10px;outline:none;font-size:14px
    }
    .circle-btn{
      width:38px;height:38px;border:0;border-radius:999px;background:#eceffc;
      font-size:19px;font-weight:800;color:#3d4563;cursor:pointer
    }
    .send-btn{
      border:0;border-radius:11px;padding:10px 12px;cursor:pointer;color:#fff;font-weight:800;
      background:linear-gradient(140deg,var(--accent),var(--accent-2));
    }
    .send-btn:disabled{opacity:.6;cursor:not-allowed}

    .quick-panel{
      margin-top:6px;border-radius:13px;padding:9px;background:rgba(255,255,255,.62);
      border:1px solid rgba(255,255,255,.82);display:none;gap:8px;flex-wrap:wrap
    }
    .quick-panel.show{display:flex}
    .q-btn{
      border:1px solid rgba(255,255,255,.85);background:rgba(255,255,255,.8);
      border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer
    }

    /* sticker picker */
    .picker{
      position:fixed;left:50%;bottom:0;transform:translate(-50%,100%);
      width:min(430px,100%);z-index:20;
      transition:.24s ease;
      background:rgba(245,246,251,.95);
      border-top-left-radius:18px;border-top-right-radius:18px;
      border:1px solid rgba(255,255,255,.85);
      box-shadow:0 -8px 24px rgba(46,55,88,.16);
      padding:10px 10px calc(10px + var(--safe-bottom));
    }
    .picker.show{transform:translate(-50%,0)}
    .picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-height:240px;overflow:auto}
    .sticker{
      aspect-ratio:1;border-radius:12px;background:#fff;border:1px solid #e3e6f2;overflow:hidden;display:grid;place-items:center;cursor:pointer
    }
    .sticker img{width:100%;height:100%;object-fit:cover}
    .sticker span{font-size:30px}

    .switch{
      display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:14px;font-weight:700
    }

    /* modal */
    .overlay{
      position:fixed;inset:0;background:rgba(17,20,31,.36);z-index:30;display:none;
      align-items:flex-end;justify-content:center;
    }
    .overlay.show{display:flex}
    .sheet{
      width:min(430px,100%);
      background:#f8f8fc;border-top-left-radius:18px;border-top-right-radius:18px;
      padding:12px 12px calc(10px + var(--safe-bottom));max-height:80dvh;overflow:auto;
      border:1px solid rgba(255,255,255,.9);
    }

    /* custom inject */
    #custom-style-slot{display:none}
  </style>
  <style id="custom-style-slot"></style>
</head>
<body>
<div class="phone">
  <div id="wallpaper" class="wallpaper"></div>
  <canvas id="particles"></canvas>

  <!-- Home -->
  <section class="page active" id="page-home">
    <div class="statusbar">
      <div id="sb-time">23:33</div>
      <div class="status-icons">
        <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
          <rect x="1" y="10" width="3" height="5" rx="1" fill="#191c2a"/>
          <rect x="6" y="8" width="3" height="7" rx="1" fill="#191c2a"/>
          <rect x="11" y="5" width="3" height="10" rx="1" fill="#191c2a"/>
          <rect x="16" y="2" width="3" height="13" rx="1" fill="#191c2a"/>
        </svg>
        <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
          <path d="M2 6.3a12 12 0 0 1 16 0" stroke="#191c2a" stroke-width="2" stroke-linecap="round"/>
          <path d="M5 9a8 8 0 0 1 10 0" stroke="#191c2a" stroke-width="2" stroke-linecap="round"/>
          <path d="M8.1 11.6a4 4 0 0 1 3.8 0" stroke="#191c2a" stroke-width="2" stroke-linecap="round"/>
          <circle cx="10" cy="14" r="1.3" fill="#191c2a"/>
        </svg>
        <svg width="32" height="16" viewBox="0 0 32 16" fill="none">
          <rect x="1" y="1.3" width="27" height="13.4" rx="3.2" stroke="#191c2a" stroke-width="1.4"/>
          <rect x="29" y="5" width="2.2" height="5.8" rx="1" fill="#191c2a"/>
          <rect id="battery-fill" x="3.1" y="3.4" width="18" height="9.2" rx="2.2" fill="#191c2a"/>
        </svg>
      </div>
    </div>

    <div class="home-scroll">
      <div class="date-line" id="home-date">3月6日 星期五</div>
      <div class="clock-big" id="home-clock">23:33</div>

      <div class="hero-row">
        <div class="hero-cover glass">
          <img id="cover-img" alt="cover" />
        </div>
        <div class="hero-meta glass">
          <div class="meta-box">
            <span>当前模式</span>
            <b id="meta-mode">日常</b>
          </div>
          <div class="meta-box">
            <span>未读提醒</span>
            <b id="meta-unread">0</b>
          </div>
        </div>
      </div>

      <div id="apps-grid" class="apps-grid"></div>
    </div>

    <div id="dock" class="dock"></div>

    <div class="floating-actions">
      <button class="fab" id="btn-home-edit" title="编辑桌面">✎</button>
      <button class="fab" id="btn-home-settings" title="设置">⚙</button>
    </div>
  </section>

  <!-- Roles -->
  <section class="page" id="page-roles">
    <div class="app-shell">
      <div class="topbar">
        <button class="btn-icon" data-back-home>‹</button>
        <div class="topbar-title">角色与群聊</div>
        <button class="btn-icon" id="btn-role-create-toggle">＋</button>
      </div>
      <div class="scroll">
        <div class="card">
          <h3>角色列表</h3>
          <div id="role-list" class="role-list"></div>
        </div>

        <div class="card">
          <h3>群聊</h3>
          <div class="actions" style="margin-bottom:8px">
            <button class="btn" id="btn-create-group">创建群聊</button>
          </div>
          <div id="room-list" class="room-list"></div>
        </div>

        <div class="card" id="role-create-card" style="display:none">
          <h3>创建角色</h3>
          <div class="field"><label>角色名</label><input id="role-name" class="input" placeholder="例如：弥洛"></div>
          <div class="field"><label>关系称谓</label><input id="role-relation" class="input" placeholder="例如：恋人 / 朋友"></div>
          <div class="field"><label>人设（核心）</label><textarea id="role-persona" class="textarea" placeholder="性格、经历、价值观、雷点、说话方式"></textarea></div>
          <div class="field"><label>说话风格</label><textarea id="role-style" class="textarea" placeholder="语气词、句长习惯、是否会撒娇/毒舌"></textarea></div>
          <div class="field"><label>用户人设（TA眼里的我）</label><textarea id="role-userpersona" class="textarea" placeholder="TA如何称呼你、对你的固定认知"></textarea></div>
          <div class="field"><label>头像</label><input id="role-avatar-file" class="input" type="file" accept="image/*" style="padding-top:8px"></div>
          <div class="actions">
            <button class="btn" id="btn-role-save">保存角色</button>
            <button class="btn secondary" id="btn-role-clear">清空</button>
          </div>
        </div>

        <div class="card">
          <h3>导入角色卡</h3>
          <div class="row">
            <div class="field"><label>JSON角色卡</label><input id="import-role-json" class="input" type="file" accept=".json,application/json" style="padding-top:8px"></div>
            <div class="field"><label>PNG角色卡</label><input id="import-role-png" class="input" type="file" accept=".png,image/png" style="padding-top:8px"></div>
          </div>
          <div class="hint">PNG会尝试读取元数据；读取失败时会至少导入头像和名称，可手动补全人设。</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Chat -->
  <section class="page" id="page-chat">
    <div class="app-shell">
      <div class="topbar">
        <button class="btn-icon" id="btn-chat-back">‹</button>
        <div class="topbar-title">聊天</div>
        <button class="btn-icon" id="btn-chat-clear">⌫</button>
      </div>

      <div class="chat-wrap">
        <div class="chat-head">
          <div>
            <div class="title" id="chat-room-title">未选择会话</div>
            <div class="hint" id="chat-profile-hint">API未配置</div>
          </div>
          <select id="chat-mode" class="select" style="height:32px">
            <option value="daily">日常模式</option>
            <option value="offline">线下剧情模式</option>
          </select>
          <button id="btn-chat-switch-room" class="chip">切换</button>
        </div>

        <div id="chat-list" class="chat-list"></div>

        <div>
          <div id="quick-panel" class="quick-panel">
            <button class="q-btn" id="q-sticker">表情包</button>
            <button class="q-btn" id="q-voice">语音卡片</button>
            <button class="q-btn" id="q-transfer">转账卡片</button>
            <button class="q-btn" id="q-location">定位卡片</button>
          </div>
          <div class="composer">
            <button id="btn-plus" class="circle-btn">＋</button>
            <textarea id="chat-input" placeholder="输入消息，回车发送（Shift+Enter换行）"></textarea>
            <button id="btn-send" class="send-btn">发送</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Assets -->
  <section class="page" id="page-assets">
    <div class="app-shell">
      <div class="topbar">
        <button class="btn-icon" data-back-home>‹</button>
        <div class="topbar-title">资源库</div>
        <button class="btn-icon" id="btn-assets-refresh">↻</button>
      </div>

      <div class="scroll">
        <div class="card">
          <h3>表情包</h3>
          <div class="field"><label>上传（png/jpg/webp/gif）</label><input id="upload-stickers" class="input" type="file" accept="image/*" multiple style="padding-top:8px"></div>
          <div id="stickers-list" class="apps-grid"></div>
        </div>

        <div class="card">
          <h3>图标素材（桌面图标可用）</h3>
          <div class="field"><label>上传图标</label><input id="upload-icons" class="input" type="file" accept="image/*" multiple style="padding-top:8px"></div>
          <div id="icons-list" class="apps-grid"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- API / Settings -->
  <section class="page" id="page-api">
    <div class="app-shell">
      <div class="topbar">
        <button class="btn-icon" data-back-home>‹</button>
        <div class="topbar-title">API与系统设置</div>
        <button class="btn-icon" id="btn-save-all">✓</button>
      </div>

      <div class="scroll">
        <div class="card">
          <h3>API配置（支持反代）</h3>
          <div class="row">
            <div class="field"><label>配置</label><select id="api-profile-select" class="select"></select></div>
            <div class="field"><label>配置名</label><input id="api-profile-name" class="input" placeholder="默认"></div>
          </div>
          <div class="field"><label>聊天URL（优先）</label><input id="api-chat-url" class="input" placeholder="https://xx.com/v1/chat/completions"></div>
          <div class="field"><label>Base URL（备用）</label><input id="api-base-url" class="input" placeholder="https://api.xx.com"></div>
          <div class="row">
            <div class="field"><label>Chat Path</label><input id="api-chat-path" class="input" placeholder="/v1/chat/completions"></div>
            <div class="field"><label>Models URL（可独立）</label><input id="api-models-url" class="input" placeholder="https://xx.com/v1/models"></div>
          </div>
          <div class="row">
            <div class="field"><label>API Key</label><input id="api-key" class="input" placeholder="sk-..."></div>
            <div class="field"><label>模型</label><input id="api-model" class="input" placeholder="gpt-4o-mini"></div>
          </div>
          <div class="row">
            <div class="field"><label>temperature</label><input id="api-temperature" class="input" type="number" min="0" max="2" step="0.1"></div>
            <div class="field"><label>max_tokens</label><input id="api-max-tokens" class="input" type="number" min="1" max="8192" step="1"></div>
          </div>
          <div class="row">
            <div class="field"><label>上下文条数</label><input id="api-context-n" class="input" type="number" min="6" max="80" step="1"></div>
            <div class="field"><label>请求超时(ms)</label><input id="api-timeout" class="input" type="number" min="3000" max="120000" step="1000"></div>
          </div>
          <div class="switch"><span>流式输出</span><input id="api-stream" type="checkbox"></div>
          <div class="actions">
            <button class="btn" id="btn-api-save">保存配置</button>
            <button class="btn secondary" id="btn-api-new">新建</button>
            <button class="btn secondary" id="btn-api-delete">删除</button>
            <button class="btn ghost" id="btn-api-test">连接测试</button>
            <button class="btn ghost" id="btn-api-models">拉取模型</button>
          </div>
          <div id="api-status" class="hint" style="margin-top:8px">状态：就绪</div>
        </div>

        <div class="card">
          <h3>外观与系统</h3>
          <div class="field"><label>壁纸</label><input id="wallpaper-file" class="input" type="file" accept="image/*" style="padding-top:8px"></div>
          <div class="field"><label>主卡片图片</label><input id="cover-file" class="input" type="file" accept="image/*" style="padding-top:8px"></div>
          <div class="switch"><span>粒子特效</span><input id="toggle-particles" type="checkbox"></div>
          <div class="actions">
            <button class="btn secondary" id="btn-reset-look">恢复默认外观</button>
          </div>
        </div>

        <div class="card">
          <h3>全局美化预留（后续扩展核心）</h3>
          <div class="field">
            <label>Custom CSS（实时生效）</label>
            <textarea id="custom-css" class="textarea" placeholder=":root{ --accent:#ff8a8a; }"></textarea>
          </div>
          <div class="field">
            <label>Custom JS（谨慎）</label>
            <textarea id="custom-js" class="textarea" placeholder="console.log('hello custom js')"></textarea>
          </div>
          <div class="actions">
            <button class="btn" id="btn-apply-custom">应用</button>
            <button class="btn secondary" id="btn-clear-custom">清空</button>
          </div>
          <div class="hint">这块是给你后期做全局美化/动画/行为注入用，底层已预留。</div>
        </div>
      </div>
    </div>
  </section>
</div>

<!-- sticker picker -->
<div id="sticker-picker" class="picker">
  <div class="actions" style="margin-bottom:8px">
    <button class="btn secondary" id="picker-close">关闭</button>
  </div>
  <div id="picker-grid" class="picker-grid"></div>
</div>

<!-- sheet: home editor -->
<div id="overlay-home-editor" class="overlay">
  <div class="sheet">
    <h3 style="margin:0 0 10px">桌面编辑</h3>
    <div id="home-editor-list" style="display:grid;gap:10px"></div>
    <div class="actions" style="margin-top:10px">
      <button class="btn secondary" id="home-editor-close">完成</button>
    </div>
  </div>
</div>

<script>
(() => {
  /* =========================
     State
  ========================== */
  const K = {
    APP: "mini_phone_refactor_v1",
  };

  const defaults = {
    ui: {
      wallpaper: "",
      cover: "",
      particles: false,
      customCss: "",
      customJs: ""
    },
    api: {
      current: "默认",
      profiles: [{
        name: "默认",
        chatUrl: "",
        baseUrl: "",
        chatPath: "/v1/chat/completions",
        modelsUrl: "",
        apiKey: "",
        model: "gpt-4o-mini",
        temperature: 0.8,
        maxTokens: 1024,
        contextN: 24,
        timeout: 45000,
        stream: false
      }]
    },
    assets: {
      stickers: [], // {id,name,data}
      icons: []     // {id,name,data}
    },
    roles: [], // {id,name,relation,persona,style,userPersona,avatar}
    rooms: [], // {id,type:'dm'|'group',name,avatar,members:[roleId],mode:'daily'|'offline',messages:[]}
    currentRoomId: "",
    homeApps: [
      {id:"a1",name:"短信",route:"roles",iconType:"emoji",iconValue:"💬",dock:true},
      {id:"a2",name:"角色",route:"roles",iconType:"emoji",iconValue:"🧾",dock:false},
      {id:"a3",name:"资源库",route:"assets",iconType:"emoji",iconValue:"🧸",dock:false},
      {id:"a4",name:"API设置",route:"api",iconType:"emoji",iconValue:"⚙️",dock:true},
      {id:"a5",name:"记忆",route:"placeholder",iconType:"emoji",iconValue:"🧠",dock:false},
      {id:"a6",name:"相册",route:"placeholder",iconType:"emoji",iconValue:"🖼️",dock:false},
      {id:"a7",name:"电话",route:"placeholder",iconType:"emoji",iconValue:"📞",dock:true},
      {id:"a8",name:"论坛",route:"placeholder",iconType:"emoji",iconValue:"👥",dock:true}
    ]
  };

  let state = loadState();
  let route = "home";
  let activeRoleAvatarCache = "";

  function loadState(){
    try{
      const raw = localStorage.getItem(K.APP);
      if(!raw) return deepClone(defaults);
      const got = JSON.parse(raw);
      return mergeDeep(deepClone(defaults), got);
    }catch{
      return deepClone(defaults);
    }
  }
  function saveState(){ localStorage.setItem(K.APP, JSON.stringify(state)); }

  function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
  function mergeDeep(target, source){
    for(const k in source){
      if(source[k] && typeof source[k] === "object" && !Array.isArray(source[k])){
        if(!target[k] || typeof target[k] !== "object") target[k] = {};
        mergeDeep(target[k], source[k]);
      }else{
        target[k] = source[k];
      }
    }
    return target;
  }
  function uid(){
    return "id_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36);
  }
  function esc(s){
    return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
  }

  /* =========================
     DOM
  ========================== */
  const $ = (sel)=>document.querySelector(sel);
  const $$ = (sel)=>Array.from(document.querySelectorAll(sel));

  const pages = {
    home: $("#page-home"),
    roles: $("#page-roles"),
    chat: $("#page-chat"),
    assets: $("#page-assets"),
    api: $("#page-api"),
  };

  const el = {
    sbTime: $("#sb-time"),
    homeDate: $("#home-date"),
    homeClock: $("#home-clock"),
    batteryFill: $("#battery-fill"),
    wallpaper: $("#wallpaper"),
    coverImg: $("#cover-img"),
    metaMode: $("#meta-mode"),
    metaUnread: $("#meta-unread"),
    appsGrid: $("#apps-grid"),
    dock: $("#dock"),

    roleList: $("#role-list"),
    roomList: $("#room-list"),

    roleCreateCard: $("#role-create-card"),
    roleName: $("#role-name"),
    roleRelation: $("#role-relation"),
    rolePersona: $("#role-persona"),
    roleStyle: $("#role-style"),
    roleUserPersona: $("#role-userpersona"),
    roleAvatarFile: $("#role-avatar-file"),

    importRoleJson: $("#import-role-json"),
    importRolePng: $("#import-role-png"),

    chatRoomTitle: $("#chat-room-title"),
    chatProfileHint: $("#chat-profile-hint"),
    chatMode: $("#chat-mode"),
    chatList: $("#chat-list"),
    chatInput: $("#chat-input"),
    btnSend: $("#btn-send"),
    quickPanel: $("#quick-panel"),

    picker: $("#sticker-picker"),
    pickerGrid: $("#picker-grid"),

    stickersList: $("#stickers-list"),
    iconsList: $("#icons-list"),

    uploadStickers: $("#upload-stickers"),
    uploadIcons: $("#upload-icons"),

    apiProfileSelect: $("#api-profile-select"),
    apiProfileName: $("#api-profile-name"),
    apiChatUrl: $("#api-chat-url"),
    apiBaseUrl: $("#api-base-url"),
    apiChatPath: $("#api-chat-path"),
    apiModelsUrl: $("#api-models-url"),
    apiKey: $("#api-key"),
    apiModel: $("#api-model"),
    apiTemperature: $("#api-temperature"),
    apiMaxTokens: $("#api-max-tokens"),
    apiContextN: $("#api-context-n"),
    apiTimeout: $("#api-timeout"),
    apiStream: $("#api-stream"),
    apiStatus: $("#api-status"),

    wallpaperFile: $("#wallpaper-file"),
    coverFile: $("#cover-file"),
    toggleParticles: $("#toggle-particles"),

    customCss: $("#custom-css"),
    customJs: $("#custom-js"),

    homeEditorOverlay: $("#overlay-home-editor"),
    homeEditorList: $("#home-editor-list"),
  };

  /* =========================
     Router
  ========================== */
  function go(page){
    route = page;
    Object.values(pages).forEach(p=>p.classList.remove("active"));
    pages[page].classList.add("active");

    if(page === "home") renderHome();
    if(page === "roles") renderRoles();
    if(page === "chat") renderChat();
    if(page === "assets") renderAssets();
    if(page === "api") renderApi();
  }

  /* =========================
     Time / Status
  ========================== */
  function nowParts(){
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    const week = "日一二三四五六"[d.getDay()];
    return {
      time:`${hh}:${mm}`,
      date:`${d.getMonth()+1}月${d.getDate()}日 星期${week}`,
      hh,mm
    };
  }
  function tick(){
    const t = nowParts();
    el.sbTime.textContent = t.time;
    el.homeClock.textContent = t.time;
    el.homeDate.textContent = t.date;
    const fakeBattery = 34 + (new Date().getMinutes() % 62);
    const w = Math.max(6, Math.min(23, fakeBattery * 0.26));
    el.batteryFill.setAttribute("width", String(w));
  }

  /* =========================
     Home
  ========================== */
  function iconHTML(app, size=74){
    if(app.iconType === "image" && app.iconValue){
      return `<div class="app-btn" style="width:${size}px;height:${size}px"><img src="${app.iconValue}" alt=""></div>`;
    }
    return `<div class="app-btn" style="width:${size}px;height:${size}px"><span class="app-emoji">${esc(app.iconValue || "📦")}</span></div>`;
  }

  function renderHome(){
    const room = state.rooms.find(r=>r.id===state.currentRoomId);
    el.metaMode.textContent = room ? (room.mode === "offline" ? "线下剧情" : "日常") : "日常";
    el.metaUnread.textContent = "0";

    el.appsGrid.innerHTML = "";
    state.homeApps.filter(a=>!a.dock).forEach(app=>{
      const box = document.createElement("div");
      box.className = "app-icon";
      box.innerHTML = `${iconHTML(app)}<div class="app-name">${esc(app.name)}</div>`;
      box.addEventListener("click", ()=>openApp(app));
      el.appsGrid.appendChild(box);
    });

    el.dock.innerHTML = "";
    state.homeApps.filter(a=>a.dock).slice(0,4).forEach(app=>{
      const box = document.createElement("div");
      box.className = "app-icon";
      box.innerHTML = `${iconHTML(app,64)}<div class="app-name">${esc(app.name)}</div>`;
      box.addEventListener("click", ()=>openApp(app));
      el.dock.appendChild(box);
    });

    applyLook();
  }

  function openApp(app){
    if(app.route === "roles"){ go("roles"); return; }
    if(app.route === "assets"){ go("assets"); return; }
    if(app.route === "api"){ go("api"); return; }
    toast("该模块骨架已预留，后续可直接扩展。");
  }

  function openHomeEditor(){
    el.homeEditorList.innerHTML = "";
    state.homeApps.forEach((app,idx)=>{
      const wrap = document.createElement("div");
      wrap.className = "role-item";
      wrap.innerHTML = `
        <div class="avatar">${app.iconType==="image"&&app.iconValue?`<img src="${app.iconValue}">`:`<span>${esc(app.iconValue||"📦")}</span>`}</div>
        <div class="role-meta">
          <b>图标 ${idx+1}</b>
          <div class="hint">route: ${esc(app.route)}</div>
          <input data-k="name" data-id="${app.id}" class="input" value="${esc(app.name)}" style="margin-top:6px">
          <div class="row" style="margin-top:6px">
            <input data-k="emoji" data-id="${app.id}" class="input" placeholder="emoji，如 💬">
            <input data-k="file" data-id="${app.id}" class="input" type="file" accept="image/*" style="padding-top:8px">
          </div>
          <div class="switch">
            <span>放入Dock</span>
            <input data-k="dock" data-id="${app.id}" type="checkbox" ${app.dock?"checked":""}>
          </div>
        </div>
        <div><button class="btn secondary" data-act="reset" data-id="${app.id}">重置</button></div>
      `;

      const emojiInput = wrap.querySelector('input[data-k="emoji"]');
      emojiInput.value = app.iconType==="emoji" ? (app.iconValue||"") : "";

      wrap.querySelectorAll('input[data-k="name"]').forEach(ip=>{
        ip.addEventListener("input",e=>{
          const it = state.homeApps.find(x=>x.id===e.target.dataset.id); if(!it) return;
          it.name = e.target.value.trim() || it.name;
          saveState(); renderHome();
        });
      });

      wrap.querySelectorAll('input[data-k="emoji"]').forEach(ip=>{
        ip.addEventListener("change",e=>{
          const it = state.homeApps.find(x=>x.id===e.target.dataset.id); if(!it) return;
          if(e.target.value.trim()){
            it.iconType = "emoji";
            it.iconValue = e.target.value.trim();
            saveState(); renderHome();
          }
        });
      });

      wrap.querySelectorAll('input[data-k="file"]').forEach(ip=>{
        ip.addEventListener("change",async e=>{
          const file = e.target.files && e.target.files[0];
          if(!file) return;
          const data = await fileToDataURL(file);
          const it = state.homeApps.find(x=>x.id===e.target.dataset.id); if(!it) return;
          it.iconType = "image";
          it.iconValue = data;
          saveState(); renderHome();
          openHomeEditor();
        });
      });

      wrap.querySelectorAll('input[data-k="dock"]').forEach(ip=>{
        ip.addEventListener("change",e=>{
          const it = state.homeApps.find(x=>x.id===e.target.dataset.id); if(!it) return;
          it.dock = !!e.target.checked;
          saveState(); renderHome();
        });
      });

      wrap.querySelectorAll('[data-act="reset"]').forEach(btn=>{
        btn.addEventListener("click",()=>{
          const it = state.homeApps.find(x=>x.id===btn.dataset.id); if(!it) return;
          const df = defaults.homeApps.find(x=>x.id===it.id);
          if(df){
            it.name = df.name; it.iconType=df.iconType; it.iconValue=df.iconValue; it.dock=df.dock;
            saveState(); renderHome(); openHomeEditor();
          }
        });
      });

      el.homeEditorList.appendChild(wrap);
    });
    el.homeEditorOverlay.classList.add("show");
  }

  /* =========================
     Roles / Rooms
  ========================== */
  function renderRoles(){
    el.roleList.innerHTML = "";
    if(!state.roles.length){
      const empty = document.createElement("div");
      empty.className = "hint";
      empty.textContent = "还没有角色，先创建或导入角色卡。";
      el.roleList.appendChild(empty);
    }else{
      state.roles.forEach(r=>{
        const item = document.createElement("div");
        item.className = "role-item";
        item.innerHTML = `
          <div class="avatar">${r.avatar?`<img src="${r.avatar}">`:"👤"}</div>
          <div class="role-meta">
            <b>${esc(r.name)}</b>
            <span>${esc(r.relation || "未设关系")} · ${esc(shorten(r.persona, 24))}</span>
          </div>
          <div class="actions" style="justify-content:flex-end">
            <button class="btn" data-open="${r.id}">聊天</button>
            <button class="btn secondary" data-edit="${r.id}">编辑</button>
            <button class="btn danger" data-del="${r.id}">删</button>
          </div>
        `;
        item.querySelector('[data-open]').addEventListener("click",()=>openDM(r.id));
        item.querySelector('[data-edit]').addEventListener("click",()=>editRole(r.id));
        item.querySelector('[data-del]').addEventListener("click",()=>deleteRole(r.id));
        el.roleList.appendChild(item);
      });
    }

    el.roomList.innerHTML = "";
    const groups = state.rooms.filter(r=>r.type==="group");
    if(!groups.length){
      const empty = document.createElement("div");
      empty.className = "hint";
      empty.textContent = "暂无群聊。";
      el.roomList.appendChild(empty);
    }else{
      groups.forEach(g=>{
        const members = g.members.map(id=>roleName(id)).join("、");
        const item = document.createElement("div");
        item.className = "room-item";
        item.innerHTML = `
          <div class="avatar">👥</div>
          <div class="role-meta">
            <b>${esc(g.name)}</b>
            <span>${esc(members || "空群")}</span>
          </div>
          <div class="actions" style="justify-content:flex-end">
            <button class="btn" data-open="${g.id}">进入</button>
            <button class="btn danger" data-del="${g.id}">删</button>
          </div>
        `;
        item.querySelector('[data-open]').addEventListener("click",()=>openRoom(g.id));
        item.querySelector('[data-del]').addEventListener("click",()=>deleteGroup(g.id));
        el.roomList.appendChild(item);
      });
    }
  }

  function roleName(id){
    return (state.roles.find(r=>r.id===id)||{}).name || "未知角色";
  }

  function createRole(data){
    const role = {
      id: uid(),
      name: data.name || "未命名角色",
      relation: data.relation || "",
      persona: data.persona || "",
      style: data.style || "",
      userPersona: data.userPersona || "",
      avatar: data.avatar || ""
    };
    state.roles.unshift(role);
    saveState();
    renderRoles();
    return role;
  }

  async function saveRoleFromForm(){
    const name = el.roleName.value.trim();
    if(!name) return toast("请填写角色名");
    let avatar = "";
    if(el.roleAvatarFile.files && el.roleAvatarFile.files[0]){
      avatar = await fileToDataURL(el.roleAvatarFile.files[0]);
    }
    createRole({
      name,
      relation: el.roleRelation.value.trim(),
      persona: el.rolePersona.value.trim(),
      style: el.roleStyle.value.trim(),
      userPersona: el.roleUserPersona.value.trim(),
      avatar
    });
    clearRoleForm();
    toast("角色已创建");
  }
  function clearRoleForm(){
    el.roleName.value="";
    el.roleRelation.value="";
    el.rolePersona.value="";
    el.roleStyle.value="";
    el.roleUserPersona.value="";
    el.roleAvatarFile.value="";
  }

  function editRole(roleId){
    const r = state.roles.find(x=>x.id===roleId);
    if(!r) return;
    const name = prompt("角色名", r.name); if(name===null) return;
    const relation = prompt("关系称谓", r.relation||""); if(relation===null) return;
    const persona = prompt("人设", r.persona||""); if(persona===null) return;
    const style = prompt("说话风格", r.style||""); if(style===null) return;
    const userPersona = prompt("用户人设", r.userPersona||""); if(userPersona===null) return;
    r.name=name.trim()||r.name; r.relation=relation.trim(); r.persona=persona.trim(); r.style=style.trim(); r.userPersona=userPersona.trim();
    saveState(); renderRoles();
  }

  function deleteRole(roleId){
    if(!confirm("删除角色？其单聊会话也会删除。")) return;
    state.roles = state.roles.filter(r=>r.id!==roleId);
    state.rooms = state.rooms.filter(room=>!(room.type==="dm" && room.members[0]===roleId) && !room.members.includes(roleId));
    if(state.currentRoomId && !state.rooms.find(r=>r.id===state.currentRoomId)) state.currentRoomId = "";
    saveState();
    renderRoles();
  }

  function openDM(roleId){
    let room = state.rooms.find(r=>r.type==="dm" && r.members[0]===roleId);
    if(!room){
      const rr = state.roles.find(r=>r.id===roleId);
      room = {
        id: uid(),
        type:"dm",
        name: rr ? rr.name : "私聊",
        avatar: rr ? rr.avatar : "",
        members:[roleId],
        mode:"daily",
        messages:[{id:uid(),sender:"system",type:"text",content:"会话创建完成，开始聊天吧。",time:timeHM()}]
      };
      state.rooms.unshift(room);
    }
    state.currentRoomId = room.id;
    saveState();
    go("chat");
  }

  function openRoom(roomId){
    state.currentRoomId = roomId;
    saveState();
    go("chat");
  }

  function deleteGroup(roomId){
    if(!confirm("删除该群聊？")) return;
    state.rooms = state.rooms.filter(r=>r.id!==roomId);
    if(state.currentRoomId===roomId) state.currentRoomId = "";
    saveState(); renderRoles();
  }

  function createGroup(){
    if(state.roles.length < 2) return toast("至少需要两个角色才能建群");
    const name = prompt("群聊名称", "新群聊");
    if(name===null) return;
    const roleTips = state.roles.map((r,i)=>`${i+1}. ${r.name}`).join("\n");
    const input = prompt(`输入成员序号，用逗号分隔：\n${roleTips}`, "1,2");
    if(input===null) return;
    const idxs = input.split(",").map(s=>parseInt(s.trim(),10)-1).filter(n=>!isNaN(n)&&n>=0&&n<state.roles.length);
    const ids = [...new Set(idxs.map(i=>state.roles[i].id))];
    if(ids.length < 2) return toast("群成员至少2个");
    const room = {
      id: uid(),
      type:"group",
      name: name.trim() || "群聊",
      avatar: "",
      members: ids,
      mode:"daily",
      messages:[{id:uid(),sender:"system",type:"text",content:"群聊已创建。",time:timeHM()}]
    };
    state.rooms.unshift(room);
    state.currentRoomId = room.id;
    saveState();
    go("chat");
  }

     Chat
  ========================== */
  function getCurrentRoom(){
    return state.rooms.find(r=>r.id===state.currentRoomId);
  }

  function renderChat(){
    const room = getCurrentRoom();
    if(!room){
      el.chatRoomTitle.textContent = "未选择会话";
      el.chatList.innerHTML = `<div class="msg system">请先从“角色与群聊”进入会话。</div>`;
      return;
    }

    el.chatMode.value = room.mode || "daily";

    el.chatProfileHint.textContent = `配置：${p.name} · 模型：${p.model || "未填"}`;

  function renderRoomMessages(room){
    el.chatList.innerHTML = "";
    if(!room.messages.length){
      appendSystem("开始聊天吧。");
      return;
    }
    room.messages.forEach(m=>appendMessageToList(m, room));

  function appendMessageToList(m, room){
    const div = document.createElement("div");
    const cls = m.sender==="user"?"user":m.sender==="assistant"?"assistant":"system";
    div.className = "msg " + cls;

    if(m.sender==="assistant" && room.type==="group" && m.senderRoleId){
      div.innerHTML = `<div class="sender">${esc(roleName(m.senderRoleId))}</div>`;
    }

    if(m.type==="text"){
      div.innerHTML += esc(m.content || "");
    }else if(m.type==="sticker"){
      div.innerHTML += `
        <div class="card-msg">
          <div class="card-title">表情包</div>
          ${m.meta && m.meta.data ? `<img src="${m.meta.data}" style="width:120px;height:120px;object-fit:cover;border-radius:10px">` : "🙂"}
          <div class="hint">${esc(m.meta?.name || "表情")}</div>
        </div>
      `;
    }else if(m.type==="voice"){
      div.innerHTML += `
        <div class="card-msg">
          <div class="card-title">语音消息（模拟）</div>
          <span class="voice-pill">🔊 ${esc(String(m.meta?.duration || 3))}''</span>
          <div style="margin-top:6px">${esc(m.content || "")}</div>
        </div>
      `;
    }else if(m.type==="transfer"){
      div.innerHTML += `
        <div class="card-msg">
          <div class="card-title">转账</div>
          <div style="font-size:20px;font-weight:800">¥ ${esc(String(m.meta?.amount || 0))}</div>

  function timeHM(){
    const d = new Date();
    return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;

  async function sendCard(type){

    if(!room) return toast("请先进入会话");

    if(type==="sticker"){

      const m = {id:uid(),sender:"user",type:"voice",content:txt,time:timeHM(),meta:{duration:Number(sec)||3}};
      pushMessage(room,m); appendMessageToList(m,room); scrollChatBottom(); await aiReply(room); return;
    }

      const m = {id:uid(),sender:"user",type:"transfer",content:"",time:timeHM(),meta:{amount,remark}};
      pushMessage(room,m); appendMessageToList(m,room); scrollChatBottom(); await aiReply(room); return;

  async function aiReply(room){
    const profile = getCurrentProfile();
    if(!profile) return appendSystem("未找到API配置");

    const chatUrl = resolveChatUrl(profile);
    if(!chatUrl) return appendSystem("请先配置聊天URL或Base URL");

    el.btnSend.disabled = true;
    setApiStatus("状态：请求中...");

    try{
      if(room.type==="dm"){
        const rid = room.members[0];
        const text = await callModelForRole(room, rid, profile);
        const parsed = parseAssistantSpecial(text);
        if(parsed.text){
          const msg = {id:uid(), sender:"assistant", senderRoleId:rid, type:"text", content:parsed.text, time:timeHM()};
          pushMessage(room, msg); appendMessageToList(msg, room);
        }
        if(parsed.stickerName){
          maybeSendAssistantSticker(room, rid, parsed.stickerName);
        }else{
          maybeSendAssistantSticker(room, rid, null, 0.12);
        }
      }else{
        // 群聊：依次回复（稳优先）
        for(const rid of room.members){
          const text = await callModelForRole(room, rid, profile);
          const parsed = parseAssistantSpecial(text);
          if(parsed.text){
            const msg = {id:uid(), sender:"assistant", senderRoleId:rid, type:"text", content:parsed.text, time:timeHM()};
            pushMessage(room, msg); appendMessageToList(msg, room);
          }
          if(parsed.stickerName){
            maybeSendAssistantSticker(room, rid, parsed.stickerName);
          }else{
            maybeSendAssistantSticker(room, rid, null, 0.08);
          }
        }
      }
      setApiStatus("状态：完成");
    }catch(err){
      appendSystem("请求失败：" + normalizeErr(err));
      setApiStatus("状态：失败");
    }finally{
      el.btnSend.disabled = false;
      saveState();
      scrollChatBottom();
    }
  }

  function maybeSendAssistantSticker(room, rid, byName, randomChance=1){
    if(!state.assets.stickers.length) return;
    if(Math.random() > randomChance) return;
    let st = null;
    if(byName){
      st = state.assets.stickers.find(x=> (x.name||"").toLowerCase().includes(byName.toLowerCase()));
    }
    if(!st) st = state.assets.stickers[Math.floor(Math.random()*state.assets.stickers.length)];
    if(!st) return;
    const m = {id:uid(), sender:"assistant", senderRoleId:rid, type:"sticker", content:"", time:timeHM(), meta:{name:st.name,data:st.data}};
    pushMessage(room,m); appendMessageToList(m,room);
  }

  function parseAssistantSpecial(text){
    const out = {text:String(text||""), stickerName:""};
    const reg = /\[\[sticker:([^\]]+)\]\]/i;
    const m = out.text.match(reg);
    if(m){
      out.stickerName = m[1].trim();
      out.text = out.text.replace(reg, "").trim();
    }
    return out;
  }

  async function callModelForRole(room, roleId, profile){
    const role = state.roles.find(r=>r.id===roleId);
    if(!role) throw new Error("角色不存在");

    const system = buildSystemPrompt(role, room);
    const transcript = buildTranscript(room, Number(profile.contextN||24));
    const userMsg = `以下是最近对话记录（供你参考）：
${transcript}

请你现在以角色“${role.name}”继续对话，保持自然、真实、有人味。
- 不要模板腔
- 回复长度灵活
- 可以结合前文提到的表情包/语音/转账/定位
- 允许情绪波动与临场反应
- 若你想发表情包，可在回复里附加：[[sticker:表情名]]（可选）`;

    const payload = {
      model: profile.model,
      temperature: clampNum(profile.temperature, 0, 2, 0.8),
      max_tokens: Math.max(1, Number(profile.maxTokens||1024)),
      stream: !!profile.stream,
      messages: [
        {role:"system", content: system},
        {role:"user", content: userMsg}
      ]
    };

    const result = await requestChat(payload, profile);
    return result || "……";
  }

  function buildSystemPrompt(role, room){
    const mode = room.mode || "daily";
    const modePrompt = mode === "offline"
      ? `【线下剧情模式】
你要采用“对话+动作/环境描写”的沉浸写法，但保持克制，不要每句都舞台剧。
允许更强叙事感、场景感、心理活动。`
      : `【日常模式】
以即时通讯聊天口吻回复，自然、简洁、有温度。`;

    const core = `你是一个长期稳定扮演角色的AI，不要跳脱设定，不要承认自己是模型。
你要让用户感到“这个角色住在手机里”，并持续维护关系连续性。
回复要求：
1) 不模板化，不机械重复；
2) 结合关系与记忆，避免空泛赞美；
3) 在合适时主动推进话题；
4) 不要频繁说教。`;

    return `${core}

【角色信息】
- 角色名：${role.name}
- 关系：${role.relation || "未设定"}
- 人设：${role.persona || "未设定"}
- 说话风格：${role.style || "自然"}
- 用户人设：${role.userPersona || "未设定"}

${modePrompt}`;
  }

  function buildTranscript(room, n){
    const rows = room.messages.slice(-Math.max(6,n)).map(m=>{
      const who = m.sender==="user" ? "我" : m.sender==="assistant" ? (m.senderRoleId?roleName(m.senderRoleId):"TA") : "系统";
      if(m.type==="text") return `[${m.time||""}] ${who}: ${m.content||""}`;
      if(m.type==="sticker") return `[${m.time||""}] ${who}: [表情包:${m.meta?.name||"未命名"}]`;
      if(m.type==="voice") return `[${m.time||""}] ${who}: [语音 ${m.meta?.duration||3}s] 内容:${m.content||""}`;
      if(m.type==="transfer") return `[${m.time||""}] ${who}: [转账 ¥${m.meta?.amount||0}] 备注:${m.meta?.remark||""}`;
      if(m.type==="location") return `[${m.time||""}] ${who}: [定位 ${m.meta?.place||""}] ${m.meta?.note||""}`;
      return `[${m.time||""}] ${who}: ${m.content||""}`;
    });
    return rows.join("\n");
  }

  /* =========================
     API client
  ========================== */
  function getCurrentProfile(){
    let p = state.api.profiles.find(x=>x.name===state.api.current);
    if(!p){
      p = deepClone(defaults.api.profiles[0]);
      state.api.profiles = [p];
      state.api.current = p.name;
      saveState();
    }
    return p;
  }

  function resolveChatUrl(p){
    if((p.chatUrl||"").trim()) return p.chatUrl.trim();
    const base = (p.baseUrl||"").trim().replace(/\/+$/,"");
    const path = (p.chatPath||"/v1/chat/completions").trim();
    if(!base) return "";
    return base + (path.startsWith("/")?path:"/"+path);
  }
  function resolveModelsCandidates(p){
    const arr = [];
    if((p.modelsUrl||"").trim()) arr.push(p.modelsUrl.trim());
    const base = (p.baseUrl||"").trim().replace(/\/+$/,"");
    if(base){
      arr.push(base + "/v1/models");
      arr.push(base + "/models");
    }
    return [...new Set(arr)];
  }

  async function requestChat(payload, profile){
    const url = resolveChatUrl(profile);
    if(!url) throw new Error("未配置聊天URL");

    const headers = {"Content-Type":"application/json"};
    if(profile.apiKey) headers["Authorization"] = "Bearer " + profile.apiKey;

    const ctl = new AbortController();
    const timer = setTimeout(()=>ctl.abort(), Math.max(3000, Number(profile.timeout||45000)));

    const res = await fetch(url,{
      method:"POST",
      headers,
      body:JSON.stringify(payload),
      signal:ctl.signal
    }).finally(()=>clearTimeout(timer));

    if(!res.ok){
      const t = await safeText(res);
      throw new Error(`HTTP ${res.status} ${truncate(t,220)}`);
    }

    if(payload.stream){
      return await readSSEContent(res);
    }else{
      const data = await res.json();
      return parseContentFromResponse(data);
    }
  }

  async function readSSEContent(res){
    if(!res.body){
      const j = await res.json().catch(()=>null);
      return parseContentFromResponse(j);
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder("utf-8");
    let buf = "", full = "";
    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      buf += dec.decode(value,{stream:true});
      const lines = buf.split("\n");
      buf = lines.pop() || "";
      for(const raw of lines){
        const line = raw.trim();
        if(!line.startsWith("data:")) continue;
        const data = line.slice(5).trim();
        if(data === "[DONE]") continue;
        try{
          const j = JSON.parse(data);
          const delta = j?.choices?.[0]?.delta?.content ?? j?.choices?.[0]?.message?.content ?? "";
          if(delta) full += delta;
        }catch{}
      }
    }
    return full || "（流式返回为空）";
  }

  function parseContentFromResponse(data){
    return data?.choices?.[0]?.message?.content
      ?? data?.choices?.[0]?.text
      ?? data?.output_text
      ?? data?.reply
      ?? data?.message
      ?? "";
  }

  async function safeText(res){
    try{return await res.text();}catch{return "";}
  }

  function normalizeErr(err){
    const msg = err?.message || String(err);
    if(msg.includes("Failed to fetch")) return "网络/CORS错误，检查反代与跨域";
    if(msg.includes("AbortError")) return "请求超时";
    return msg;
  }

  function saveApiProfile(){
    const oldName = state.api.current;
    const p = readApiForm();

    // remove old selected
    const oldIdx = state.api.profiles.findIndex(x=>x.name===oldName);
    if(oldIdx>=0) state.api.profiles.splice(oldIdx,1);

    const dup = state.api.profiles.find(x=>x.name===p.name);
    if(dup) Object.assign(dup,p);
    else state.api.profiles.push(p);

    state.api.current = p.name;
    saveState();
    renderApi();
    renderChat();
    setApiStatus("状态：配置已保存");
  }

  function newApiProfile(){
    const name = "配置" + (state.api.profiles.length + 1);
    const p = deepClone(defaults.api.profiles[0]);
    p.name = name;
    state.api.profiles.push(p);
    state.api.current = name;
    saveState();
    renderApi();
    setApiStatus("状态：已新建");
  }

  function deleteApiProfile(){
    if(state.api.profiles.length<=1) return setApiStatus("状态：至少保留一个配置");
    const cur = state.api.current;
    if(!confirm(`删除配置：${cur} ?`)) return;
    state.api.profiles = state.api.profiles.filter(x=>x.name!==cur);
    state.api.current = state.api.profiles[0].name;
    saveState();
    renderApi();
    setApiStatus("状态：已删除");
  }

  async function loadModels(){
    const p = readApiForm();
    const cands = resolveModelsCandidates(p);
    if(!cands.length){
      setApiStatus("状态：请先填 Base URL 或 Models URL");
      return;
    }

    const headers = {};
    if(p.apiKey) headers["Authorization"] = "Bearer " + p.apiKey;

    let ok = false;
    for(const url of cands){
      try{
        const ctl = new AbortController();
        const timer = setTimeout(()=>ctl.abort(), 12000);
        const res = await fetch(url,{headers,signal:ctl.signal}).finally(()=>clearTimeout(timer));
        if(!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        const arr = (data?.data || []).map(x=>x.id).filter(Boolean);
        if(arr.length){
          el.apiModel.value = arr[0];
          setApiStatus(`状态：模型拉取成功 (${arr.length})，已填入 ${arr[0]}`);
          ok = true;
          break;
        }else{
          throw new Error("空模型列表");
        }
      }catch(e){
        // try next
      }
    }
    if(!ok) setApiStatus("状态：拉取失败（可手填模型继续聊天）");
  }

        state.homeApps[idx].iconType = "image";

  /* =========================
     Import role cards
  ========================== */
  async function importRolesFromJsonFile(file){
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      const arr = Array.isArray(data) ? data : [data];
      let cnt = 0;
      for(const one of arr){
        const role = normalizeRoleFromAny(one);
        if(role){
          createRole(role);
          cnt++;
        }
      }
      toast(`JSON导入完成：${cnt}个角色`);
    }catch(err){
      toast("JSON导入失败");
    }
  }

  function normalizeRoleFromAny(obj){
    if(!obj || typeof obj!=="object") return null;
    const name =
      obj.name || obj.character_name || obj.char_name || obj?.data?.name || obj?.spec?.name || "";
    if(!name) return null;
    const persona =
      obj.persona || obj.description || obj?.data?.description || obj?.spec?.description || "";
    const style =
      obj.style || obj.tone || obj?.data?.personality || obj?.spec?.personality || "";
    const userPersona =
      obj.userPersona || obj?.data?.first_mes || obj?.spec?.scenario || "";
    const avatar = obj.avatar || obj.image || "";
    return {
      name,
      relation: obj.relation || "",
      persona,
      style,
      userPersona,
      avatar
    };
  }

  async function importRoleFromPng(file){
    const dataUrl = await fileToDataURL(file);
    const arrBuf = await file.arrayBuffer();
    const metaText = extractPngText(arrBuf);
    let roleData = null;

    if(metaText){
      try{
        let candidate = metaText.trim();
        if(/^[A-Za-z0-9+/=\s]+$/.test(candidate) && candidate.length > 80){
          try{ candidate = atob(candidate.replace(/\s/g,"")); }catch{}
        }
        const maybe = JSON.parse(candidate);
        roleData = normalizeRoleFromAny(maybe);
      }catch{}
    }

    if(!roleData){
      roleData = {
        name: file.name.replace(/\.png$/i,"") || "PNG角色",
        relation: "",
        persona: "",
        style: "",
        userPersona: ""
      };
    }

    roleData.avatar = dataUrl;
    createRole(roleData);
    saveState();
    renderRoles();
    toast("PNG角色卡导入完成");
  }

  function extractPngText(arrayBuffer){
    // 尝试读取 PNG 的 tEXt / iTXt / zTXt
    const bytes = new Uint8Array(arrayBuffer);
    const dv = new DataView(arrayBuffer);
    let off = 8; // skip png signature
    const decoder = new TextDecoder("utf-8");

    while(off + 8 <= bytes.length){
      if(off + 8 > bytes.length) break;
      const len = dv.getUint32(off); off += 4;
      const type = decoder.decode(bytes.slice(off, off + 4)); off += 4;
      if(off + len + 4 > bytes.length) break;

      const chunk = bytes.slice(off, off + len);
      off += len;
      off += 4; // crc

      if(type === "tEXt" || type === "iTXt"){
        const txt = decoder.decode(chunk);
        // 常见键名尝试：chara / character / comment / prompt
        const hit = txt.match(/(?:chara|character|comment|description|prompt)\x00([\s\S]+)/i);
        if(hit && hit[1]) return hit[1];
        // 没命中键名就返回整段
        if(txt.includes("{") && txt.includes("}")) return txt.slice(txt.indexOf("{"));
      }
    }
    return "";
  }

  async function fileToDataURL(file){
    return await new Promise((resolve,reject)=>{
      const fr = new FileReader();
      fr.onload = ()=>resolve(String(fr.result || ""));
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  function truncate(s,n=80){
    s = String(s||"");
    return s.length>n ? s.slice(0,n) + "..." : s;
  }
  function shorten(s,n=20){ return truncate(s,n); }
  function clampNum(v,min,max,def){
    const x = Number(v);
    if(Number.isNaN(x)) return def;
    return Math.max(min, Math.min(max, x));
  }

  function toast(text){
    // 简单系统消息提示（不打断）
    const room = getCurrentRoom();
    if(route === "chat" && room){
      appendSystem(text);
      scrollChatBottom();
      return;

    setApiStatus?.("状态：" + text);
    console.log("[toast]", text);
  }

    }
    applyCustomStyle();
    applyCustomScriptSafe();

  function applyCustomStyle(){
    const slot = document.getElementById("custom-style-slot");
    slot.textContent = state.ui.customCss || "";
  }

  function applyCustomScriptSafe(){
    if(!state.ui.customJs) return;
    try{
      // 隔离执行，避免污染主作用域
      new Function('"use strict";\n' + state.ui.customJs)();
    }catch(err){
      console.warn("custom js error:", err);
    }
  }

  // particles
  let particleRAF = 0;
  function startParticles(){
    const c = document.getElementById("particles");
    const ctx = c.getContext("2d");
    let w=0,h=0,pts=[];

    const setup=()=>{
      const dpr = Math.max(1,window.devicePixelRatio||1);
      w = c.clientWidth; h = c.clientHeight;
      c.width = Math.floor(w*dpr); c.height = Math.floor(h*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      pts = Array.from({length:34},()=>({
        x:Math.random()*w,
        y:Math.random()*h,
        r:Math.random()*1.8+.6,
        vy:Math.random()*.22+.08,
        vx:(Math.random()-.5)*.1,
        o:Math.random()*.35+.08
      }));
    };
    const loop=()=>{
      ctx.clearRect(0,0,w,h);
      for(const p of pts){
        p.x += p.vx; p.y += p.vy;
        if(p.y > h+10){ p.y = -8; p.x = Math.random()*w; }
        if(p.x < -10) p.x = w+5;
        if(p.x > w+10) p.x = -5;
        ctx.beginPath();
        ctx.fillStyle = `rgba(160,168,210,${p.o})`;
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
      }
      particleRAF = requestAnimationFrame(loop);
    };
    setup();
    loop();
    window.addEventListener("resize", setup, {passive:true});
  }
  function stopParticles(){
    cancelAnimationFrame(particleRAF);
    const c = document.getElementById("particles");
    const ctx = c.getContext("2d");
    ctx.clearRect(0,0,c.width,c.height);
  }
  function syncParticles(){
    if(state.ui.particles) startParticles();
    else stopParticles();
  }

      saveState(); renderAssets(); e.target.value="";

      const files = Array.from(e.target.files||[]);
      for(const f of files){
        const data = await fileToDataURL(f);
        state.assets.icons.unshift({id:uid(),name:f.name.replace(/\.[^.]+$/,""),data});
      }
      saveState(); renderAssets(); e.target.value="";
    });

    // api
    el.apiProfileSelect.addEventListener("change",()=>{
      state.api.current = el.apiProfileSelect.value;
      saveState(); renderApi(); renderChat();
    });
    $("#btn-api-save").addEventListener("click",saveApiProfile);
    $("#btn-save-all").addEventListener("click",saveApiProfile);
    $("#btn-api-new").addEventListener("click",newApiProfile);
    $("#btn-api-delete").addEventListener("click",deleteApiProfile);
    $("#btn-api-test").addEventListener("click",testApi);
    $("#btn-api-models").addEventListener("click",loadModels);

    el.wallpaperFile.addEventListener("change", async e=>{
      const f = e.target.files?.[0]; if(!f) return;
      state.ui.wallpaper = await fileToDataURL(f);
      saveState(); applyLook(); e.target.value="";
    });
    el.coverFile.addEventListener("change", async e=>{
      const f = e.target.files?.[0]; if(!f) return;
      state.ui.cover = await fileToDataURL(f);
      saveState(); applyLook(); e.target.value="";
    });
    el.toggleParticles.addEventListener("change",()=>{
      state.ui.particles = !!el.toggleParticles.checked;
      saveState(); syncParticles();
    });
    $("#btn-reset-look").addEventListener("click",()=>{
      state.ui.wallpaper = "";
      state.ui.cover = "";
      saveState(); applyLook();

    $("#btn-apply-custom").addEventListener("click",()=>{
      state.ui.customCss = el.customCss.value || "";
      state.ui.customJs = el.customJs.value || "";
      saveState(); applyLook(); toast("自定义已应用");
    });
    $("#btn-clear-custom").addEventListener("click",()=>{
      state.ui.customCss = "";
      state.ui.customJs = "";
      el.customCss.value = "";
      el.customJs.value = "";
      saveState(); applyLook(); toast("已清空自定义");
    });
  }

  // init
  function init(){
    tick();
    setInterval(tick, 1000);
    bindEvents();
    applyLook();
    syncParticles();
    renderHome();
    renderRoles();
    renderAssets();
    renderApi();
    go("home");
  }

  init();
})();
