<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Noctis</title>
  <style>
    :root{
      --bg:#090f1c; --bg2:#121a2c; --bg3:#1a2440; --bd:#2a3655;
      --tx:#e9e1d5; --tx2:#9da8c2; --tx3:#6f7a97;
      --ac1:#b7926d; --ac2:#d9b98b; --ok:#61b37e; --err:#ce6f8d;
      --shadow:0 10px 30px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{
      display:flex;flex-direction:column;background:
      radial-gradient(1200px 500px at 20% -10%, rgba(217,185,139,.08), transparent 45%),
      radial-gradient(800px 400px at 100% 0%, rgba(122,162,247,.08), transparent 55%),
      var(--bg);
      color:var(--tx);
      font-family:-apple-system,BlinkMacSystemFont,PingFang SC,Microsoft YaHei,sans-serif;
    }

    .hd{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 12px;background:rgba(18,26,44,.85);backdrop-filter: blur(8px);
      border-bottom:1px solid var(--bd);
    }
    .hdL{display:flex;align-items:center;gap:10px;min-width:0}
    .icon{
      width:32px;height:32px;border:1px solid var(--bd);border-radius:10px;
      background:var(--bg3);color:var(--tx2);font-weight:700
    }
    .av{
      width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#13161d;font-weight:800;overflow:hidden;flex-shrink:0
    }
    .av img{width:100%;height:100%;object-fit:cover}
    .nm{font-size:15px;font-weight:700}
    .sub{font-size:11px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
    .st{font-size:11px;color:var(--ok)} .st.off{color:var(--tx3)}

    .main{flex:1;overflow:hidden;position:relative}
    .page{height:100%;overflow:auto;display:none}
    .page.active{display:block}

    .chatWrap{height:100%;display:flex;flex-direction:column}
    .chat{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .welcome{
      margin:auto;background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
      padding:14px 12px;color:var(--tx2);font-size:13px;line-height:1.7;max-width:92%; box-shadow:var(--shadow);
    }

    .line{display:flex;gap:8px;align-items:flex-end}
    .line.me{justify-content:flex-end}
    .msgAv{
      width:24px;height:24px;border-radius:50%;overflow:hidden;flex-shrink:0;
      display:grid;place-items:center;background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-size:10px;font-weight:700
    }
    .msgAv img{width:100%;height:100%;object-fit:cover}
    .msg{
      max-width:76%;padding:10px 12px;border-radius:14px;font-size:14px;line-height:1.6;word-break:break-word;
      box-shadow:0 6px 18px rgba(0,0,0,.18); animation:pop .18s ease-out;
    }
    @keyframes pop{from{opacity:.2;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}
    .ai{background:var(--bg3);border:1px solid var(--bd);border-bottom-left-radius:4px}
    .meBubble{background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;border-bottom-right-radius:4px}
    .tm{font-size:10px;opacity:.6;margin-top:4px}
    .typ{align-self:flex-start;background:var(--bg3);border:1px solid var(--bd);border-radius:14px;padding:10px 12px}
    .typ i{display:inline-block;width:5px;height:5px;margin-right:4px;background:var(--tx2);border-radius:50%;animation:b 1.1s infinite}
    .typ i:nth-child(2){animation-delay:.2s}.typ i:nth-child(3){animation-delay:.4s}
    @keyframes b{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
    .cur{display:inline-block;animation:blink .8s step-end infinite}
    @keyframes blink{50%{opacity:0}}

    .md h1,.md h2,.md h3,.md h4{margin:.2em 0 .35em 0;line-height:1.35}
    .md h1{font-size:1.12em}.md h2{font-size:1.07em}.md h3{font-size:1.02em}.md h4{font-size:.98em}
    .md ul,.md ol{padding-left:1.2em;margin:.28em 0}
    .md li{margin:.18em 0}
    .md code.inline{
      padding:1px 6px;border-radius:6px;background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.12);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.92em
    }
    .md pre{
      margin:.42em 0;overflow:auto;border:1px solid rgba(255,255,255,.12);
      background:#0b1220;border-radius:10px;padding:10px
    }
    .md pre code{
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:12.5px;line-height:1.55;white-space:pre
    }
    .md a{color:#8fb4ff;text-decoration:none}
    .md a:hover{text-decoration:underline}
    .tok-k{color:#f29e74}
    .tok-s{color:#9dd68c}
    .tok-n{color:#a9b7ff}
    .tok-c{color:#7f8aaa}
    .langTag{
      display:inline-block;margin-bottom:6px;padding:1px 7px;border-radius:999px;
      font-size:10px;letter-spacing:.2px;background:#1d2b48;color:#a9bcdf;border:1px solid rgba(255,255,255,.12)
    }

    .inputBar{display:flex;gap:8px;align-items:flex-end;padding:10px;background:rgba(18,26,44,.9);border-top:1px solid var(--bd)}
    #inp{
      flex:1;resize:none;max-height:120px;min-height:40px;border:1px solid var(--bd);border-radius:20px;
      background:var(--bg3);color:var(--tx);padding:10px 14px;font-size:14px;outline:none
    }
    #sendBtn{
      width:40px;height:40px;border:none;border-radius:50%;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700
    }
    #sendBtn:disabled{opacity:.35}

    .wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
    .card{
      background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:12px;box-shadow:var(--shadow);
    }
    .ct{font-size:14px;font-weight:700;margin-bottom:10px}
    .f{margin-bottom:10px}
    .fl{font-size:11px;color:var(--tx2);margin-bottom:5px}
    .fi,.fs,.ta{
      width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;color:var(--tx);
      padding:10px 12px;font-size:13px;outline:none
    }
    .ta{min-height:90px;resize:vertical;line-height:1.6}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .row .f{flex:1;min-width:140px}
    .btn{
      padding:10px 12px;border:none;border-radius:10px;font-size:13px;font-weight:700;
      color:#111;background:linear-gradient(135deg,var(--ac1),var(--ac2))
    }
    .btn2{
      padding:10px 12px;border:1px solid var(--bd);border-radius:10px;font-size:13px;
      color:var(--tx);background:var(--bg3);font-weight:600
    }
    .btnDanger{border:1px solid #6d3649;color:#f3b4c4;background:transparent}
    .mini,.note{font-size:11px;color:var(--tx3)}

    .list{display:flex;flex-direction:column;gap:8px}
    .roleItem{
      border:1px solid var(--bd);border-radius:12px;background:var(--bg3);padding:10px;
      display:flex;justify-content:space-between;align-items:center;gap:8px
    }
    .roleItem.active{border-color:var(--ac2);box-shadow:0 0 0 1px rgba(217,185,139,.22) inset}
    .roleL{display:flex;gap:8px;align-items:center;min-width:0}
    .rAv{
      width:28px;height:28px;border-radius:50%;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700;overflow:hidden;flex-shrink:0
    }
    .rAv img{width:100%;height:100%;object-fit:cover}
    .rName{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rSub{font-size:11px;color:var(--tx2)}

    .preview{
      width:44px;height:44px;border-radius:50%;border:1px solid var(--bd);overflow:hidden;
      display:grid;place-items:center;background:var(--bg3);color:var(--tx2);font-size:12px
    }
    .preview img{width:100%;height:100%;object-fit:cover}

    .tabs{
      display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 10px;
      border-top:1px solid var(--bd);background:rgba(18,26,44,.9)
    }
    .tab{
      border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);border-radius:10px;
      padding:9px 6px;font-size:12px;font-weight:700
    }
    .tab.active{
      color:#111;border-color:transparent;background:linear-gradient(135deg,var(--ac1),var(--ac2))
    }

    .toast{
      position:fixed;top:58px;left:50%;transform:translateX(-50%);
      background:#222d44;border:1px solid var(--bd);padding:7px 14px;border-radius:16px;
      font-size:12px;z-index:99
    }

    .lockMask{
      position:fixed;inset:0;background:rgba(7,10,18,.88);backdrop-filter: blur(4px);
      display:none;align-items:center;justify-content:center;z-index:9999;
    }
    .lockMask.show{display:flex}
    .lockCard{
      width:min(92vw,360px);background:var(--bg2);border:1px solid var(--bd);border-radius:16px;
      padding:16px;box-shadow:var(--shadow);text-align:center
    }
    .lockTitle{font-size:16px;font-weight:700;margin-bottom:8px}
    .lockSub{font-size:12px;color:var(--tx2);margin-bottom:12px}
    .switchRow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  </style>
</head>
<body>
  <div class="hd">
    <div class="hdL">
      <button class="icon" onclick="goBack()">←</button>
      <div class="av" id="topAv">N</div>
      <div style="min-width:0">
        <div class="nm">Noctis</div>
        <div class="sub" id="topRole">当前角色：未选择</div>
      </div>
    </div>
    <div id="status" class="st off">未配置</div>
  </div>

  <div class="main">
    <section id="page-chat" class="page active">
      <div class="chatWrap">
        <div id="chat" class="chat"></div>
        <div class="inputBar">
          <textarea id="inp" rows="1" placeholder="说点什么……" oninput="autoGrow(this)" onkeydown="hotKey(event)"></textarea>
          <button id="sendBtn" onclick="send()">↑</button>
        </div>
      </div>
    </section>

    <section id="page-roles" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">角色列表</div>
          <div id="roleList" class="list"></div>
          <div class="mini" style="margin-top:8px">切换角色会切换对应聊天记录。</div>
        </div>

        <div class="card">
          <div class="ct">新建 / 编辑角色</div>
          <input type="hidden" id="rId" />
          <input type="hidden" id="rAvatarImg" />

          <div class="row">
            <div class="f">
              <div class="fl">角色名</div>
              <input id="rName" class="fi" placeholder="例如：冷淡男友 / 温柔姐姐" />
            </div>
            <div class="f">
              <div class="fl">头像字（无图时）</div>
              <input id="rAvatar" class="fi" maxlength="2" placeholder="AI" />
            </div>
          </div>

          <div class="f">
            <div class="fl">角色头像（上传）</div>
            <div class="row" style="align-items:center">
              <div id="rPreview" class="preview">无图</div>
              <input id="rAvatarFile" type="file" accept="image/*" class="fi" onchange="onRoleAvatarPick(event)" />
              <button class="btn2" type="button" onclick="clearRoleAvatar()">清空头像</button>
            </div>
          </div>

          <div class="f">
            <div class="fl">开场白</div>
            <input id="rGreeting" class="fi" placeholder="第一次进入该角色时显示" />
          </div>
          <div class="f">
            <div class="fl">System Prompt</div>
            <textarea id="rPrompt" class="ta" placeholder="留空则无默认人设"></textarea>
          </div>

          <div class="row">
            <button class="btn" onclick="saveRole()">保存角色</button>
            <button class="btn2" onclick="resetRoleForm()">清空表单</button>
            <button class="btn2 btnDanger" onclick="deleteRole()">删除当前</button>
          </div>
        </div>
      </div>
    </section>

    <section id="page-settings" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">我的头像</div>
          <input type="hidden" id="meAvatarImg" />
          <div class="row" style="align-items:center">
            <div id="mePreview" class="preview">我</div>
            <input id="meAvatarFile" type="file" accept="image/*" class="fi" onchange="onMeAvatarPick(event)" />
            <button class="btn2" type="button" onclick="clearMeAvatar()">清空头像</button>
          </div>
          <div class="note" style="margin-top:8px">只保存在浏览器本地。</div>
        </div>

        <div class="card">
          <div class="ct">API 设置</div>
          <div class="f">
            <div class="fl">反代地址（不用带 /v1）</div>
            <input id="cUrl" class="fi" placeholder="https://api.example.com" />
          </div>
          <div class="f">
            <div class="fl">API 密钥</div>
            <input id="cKey" class="fi" type="password" placeholder="sk-xxxx" />
          </div>
          <div class="row">
            <div class="f" style="flex:2">
              <div class="fl">模型</div>
              <select id="cModel" class="fs"><option value="">先拉取模型</option></select>
            </div>
            <div class="f" style="flex:0 0 auto;align-self:flex-end">
              <button id="fetchBtn" class="btn2" style="width:auto;padding:10px 14px" onclick="fetchModels()">拉取模型</button>
            </div>
          </div>
          <div class="row">
            <div class="f">
              <div class="fl">Temperature</div>
              <input id="cTemp" class="fi" type="number" min="0" max="2" step="0.1" value="0.8" />
            </div>
            <div class="f">
              <div class="fl">最大回复长度</div>
              <input id="cMax" class="fi" type="number" min="50" max="8192" step="50" value="800" />
            </div>
          </div>
          <div class="row">
            <button class="btn" onclick="saveCfg()">保存配置</button>
            <button class="btn2" onclick="testOnce()">测试连接</button>
          </div>
          <div class="note" style="margin-top:8px">聊天记录只在本地 localStorage。</div>
        </div>

        <div class="card">
          <div class="ct">安全</div>
          <div class="switchRow f">
            <div class="fl" style="margin:0">启用锁屏（PIN）</div>
            <input id="lockEnabled" type="checkbox" onchange="toggleLockEnabled(this.checked)" />
          </div>
          <div class="f">
            <div class="fl">PIN（4~8位数字）</div>
            <input id="lockPin" class="fi" type="password" inputmode="numeric" maxlength="8" placeholder="例如：1234" />
          </div>
          <div class="row">
            <button class="btn2" onclick="saveLock()">保存锁屏设置</button>
            <button class="btn2" onclick="lockNow()">立即锁屏</button>
          </div>
        </div>

        <div class="card">
          <div class="ct">数据管理</div>
          <div class="row">
            <button class="btn2" onclick="clearCurrentChat()">清空当前角色聊天</button>
            <button class="btn2 btnDanger" onclick="clearAllLocal()">清空全部本地数据</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="tabs">
    <button class="tab active" data-page="chat" onclick="switchTab('chat',this)">聊天</button>
    <button class="tab" data-page="roles" onclick="switchTab('roles',this)">角色</button>
    <button class="tab" data-page="settings" onclick="switchTab('settings',this)">设置</button>
  </div>

  <div id="lockMask" class="lockMask">
    <div class="lockCard">
      <div class="lockTitle">已锁定</div>
      <div class="lockSub">输入 PIN 解锁</div>
      <input id="unlockPin" class="fi" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" />
      <div class="row" style="margin-top:10px;justify-content:center">
        <button class="btn" onclick="unlock()">解锁</button>
      </div>
      <div class="note" style="margin-top:8px">PIN 仅保存在本地。</div>
    </div>
  </div>

<script>
  let C = {
    url:'',key:'',model:'',temp:0.8,max:800,
    selfAvatarImg:'',
    lockEnabled:false,
    lockPin:''
  };
  let roles = [];
  let activeRoleId = '';
  let HMap = {};
  let streaming = false;
  let currentPage = 'chat';

  const $ = s => document.querySelector(s);
  const chat = $('#chat');

  function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
  function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
  function now(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
  function esc(s=''){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function normBaseUrl(u=''){return u.trim().replace(/\/+$/,'').replace(/\/v1$/,'')}
  function apiUrl(base,path){return normBaseUrl(base) + '/v1' + path}
  function uid(){return 'r_'+Math.random().toString(36).slice(2,10)}
  function toast(msg){
    const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
    setTimeout(()=>t.remove(),2200);
  }
  function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
  function hotKey(e){if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();send()}}

  function fileToDataURL(file){
    return new Promise((resolve,reject)=>{
      const fr=new FileReader();
      fr.onload=()=>resolve(fr.result);
      fr.onerror=reject;
      fr.readAsDataURL(file);
    });
  }

  function currentRole(){ return roles.find(r=>r.id===activeRoleId) || null; }
  function currentHistory(){
    if(!activeRoleId) return [];
    if(!Array.isArray(HMap[activeRoleId])) HMap[activeRoleId]=[];
    return HMap[activeRoleId];
  }

  function avatarHTML(img,text){
    if(img) return `<img src="${img}" alt="">`;
    return esc((text||'AI').slice(0,2));
  }

  function setStatus(){
    const s=$('#status');
    if(C.url && C.key && C.model){s.textContent='在线';s.className='st'}
    else {s.textContent='未配置';s.className='st off'}
  }

  function refreshHeader(){
    const r=currentRole();
    $('#topRole').textContent='当前角色：'+(r?r.name:'未选择');
    $('#topAv').innerHTML = avatarHTML(r?.avatarImg, r?.avatar || 'N');
  }

  function switchTab(name,btn){
    currentPage = name;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    $('#page-'+name).classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    if(btn) btn.classList.add('active');
  }

  function goBack(){
    if($('#lockMask').classList.contains('show')) return;
    if(currentPage !== 'chat'){
      const t = document.querySelector('.tab[data-page="chat"]');
      switchTab('chat', t);
      return;
    }
    toast('已在首页');
  }

  function highlightCode(raw, lang=''){
    let code = esc(raw || '');
    const L = (lang||'').toLowerCase();

    if (['js','javascript','ts','typescript','json'].includes(L)) {
      code = code
        .replace(/(\/\/[^\n]*)/g,'<span class="tok-c">$1</span>')
        .replace(/("(?:\\.|[^"])*"|'(?:\\.|[^'])*')/g,'<span class="tok-s">$1</span>')
        .replace(/\b(const|let|var|function|return|if|else|for|while|break|continue|new|class|extends|try|catch|throw|await|async|import|from|export|default|true|false|null|undefined)\b/g,'<span class="tok-k">$1</span>')
        .replace(/\b([A-Za-z_$][\w$]*)\s*(?=\()/g,'<span class="tok-n">$1</span>');
    } else if (['html','xml'].includes(L)) {
      code = code
        .replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="tok-c">$1</span>')
        .replace(/(&lt;\/?[a-zA-Z0-9:-]+)/g,'<span class="tok-k">$1</span>')
        .replace(/([a-zA-Z-:]+)=(".*?"|'.*?')/g,'<span class="tok-n">$1</span>=<span class="tok-s">$2</span>');
    } else if (['bash','sh','shell'].includes(L)) {
      code = code
        .replace(/(#.*)/g,'<span class="tok-c">$1</span>')
        .replace(/\b(curl|echo|cat|grep|sed|awk|ls|cd|pwd|mkdir|rm|cp|mv|git|npm|pnpm|yarn|node)\b/g,'<span class="tok-k">$1</span>');
    }

    return code;
  }

  function markdownToHtml(src=''){
    let s = String(src ?? '');
    const blocks = [];

    s = s.replace(/```([^\n`]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const i = blocks.length;
      blocks.push({ lang: (lang||'').trim(), code: code || '' });
      return `@@CODE_BLOCK_${i}@@`;
    });

    s = esc(s);

    s = s.replace(/^#### (.*)$/gm, '<h4>$1</h4>');
    s = s.replace(/^### (.*)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.*)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.*)$/gm, '<h1>$1</h1>');

    s = s.replace(/^\s*-\s+(.*)$/gm, '<li>$1</li>');
    s = s.replace(/(?:<li>[\s\S]*?<\/li>)/g, m => `<ul>${m}</ul>`);

    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/`([^`]+)`/g, '<code class="inline">$1</code>');
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    s = s.replace(/\n/g, '<br>');

    s = s.replace(/@@CODE_BLOCK_(\d+)@@/g, (_, idx) => {
      const b = blocks[Number(idx)];
      if(!b) return '';
      const lang = b.lang || '';
      const codeHtml = highlightCode(b.code, lang);
      const tag = lang ? `<div class="langTag">${esc(lang)}</div>` : '';
      return `${tag}<pre><code>${codeHtml}</code></pre>`;
    });

    return `<div class="md">${s}</div>`;
  }

  function renderChat(){
    const r=currentRole();
    const H=currentHistory();

    if(!r){
      chat.innerHTML=`<div class="welcome"><b>欢迎使用 Noctis</b><br>先去「角色」页创建角色，再去「设置」页填 API。</div>`;
      return;
    }

    if(!H.length){
      chat.innerHTML=`<div class="welcome"><b>${esc(r.name)}</b> 已就位。<br>${r.greeting?esc(r.greeting):'你可以开始聊天了。'}</div>`;
      return;
    }

    chat.innerHTML = H.map(m=>{
      const isMe = m.role==='user';
      const avImg = isMe ? (C.selfAvatarImg||'') : (r.avatarImg||'');
      const avTxt = isMe ? '我' : (r.avatar||'AI');
      return `
      <div class="line ${isMe?'me':''}">
        ${isMe ? '' : `<div class="msgAv">${avatarHTML(avImg,avTxt)}</div>`}
        <div class="msg ${isMe?'meBubble':'ai'}">
          ${markdownToHtml(m.content)}
          <div class="tm">${m.time||''}</div>
        </div>
        ${isMe ? `<div class="msgAv">${avatarHTML(avImg,avTxt)}</div>` : ''}
      </div>`;
    }).join('');
    chat.scrollTop=chat.scrollHeight;
  }

  function addTyping(){
    const d=document.createElement('div');
    d.className='typ'; d.id='typing'; d.innerHTML='<i></i><i></i><i></i>';
    chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
  }
  function removeTyping(){ const t=$('#typing'); if(t) t.remove(); }

  function renderRoles(){
    const list=$('#roleList');
    if(!roles.length){list.innerHTML=`<div class="mini">还没有角色，先在下面创建一个。</div>`;return;}
    list.innerHTML = roles.map(r=>`
      <div class="roleItem ${r.id===activeRoleId?'active':''}">
        <div class="roleL">
          <div class="rAv">${avatarHTML(r.avatarImg, r.avatar||'AI')}</div>
          <div style="min-width:0">
            <div class="rName">${esc(r.name||'未命名')}</div>
            <div class="rSub">${r.prompt?'已设置人设':'无默认人设'}</div>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn2" onclick="pickRole('${r.id}')">使用</button>
          <button class="btn2" onclick="editRole('${r.id}')">编辑</button>
        </div>
      </div>
    `).join('');
  }

  function setRolePreview(img,text='无图'){
    const el=$('#rPreview');
    el.innerHTML = img ? `<img src="${img}" alt="">` : esc(text);
  }

  function resetRoleForm(){
    $('#rId').value='';
    $('#rName').value='';
    $('#rAvatar').value='';
    $('#rGreeting').value='';
    $('#rPrompt').value='';
    $('#rAvatarImg').value='';
    $('#rAvatarFile').value='';
    setRolePreview('', '无图');
  }

  async function onRoleAvatarPick(e){
    const f=e.target.files?.[0];
    if(!f) return;
    if(f.size > 2*1024*1024){toast('图片请小于2MB');e.target.value='';return;}
    try{
      const data=await fileToDataURL(f);
      $('#rAvatarImg').value=data;
      setRolePreview(data);
    }catch{toast('读取图片失败')}
  }

  function clearRoleAvatar(){
    $('#rAvatarImg').value='';
    $('#rAvatarFile').value='';
    setRolePreview('', '无图');
  }

  function saveRole(){
    const id = $('#rId').value || uid();
    const name = $('#rName').value.trim();
    const avatar = ($('#rAvatar').value.trim() || 'AI').slice(0,2);
    const avatarImg = $('#rAvatarImg').value || '';
    const greeting = $('#rGreeting').value.trim();
    const prompt = $('#rPrompt').value.trim();

    if(!name){toast('角色名不能为空');return;}

    const obj={id,name,avatar,avatarImg,prompt,greeting};
    const idx=roles.findIndex(x=>x.id===id);
    if(idx>=0) roles[idx]=obj; else roles.unshift(obj);

    if(!activeRoleId) activeRoleId=id;
    save('nx_roles',roles); save('nx_active_role',activeRoleId);

    renderRoles(); refreshHeader(); renderChat(); toast('角色已保存');
  }

  function editRole(id){
    const r=roles.find(x=>x.id===id); if(!r) return;
    $('#rId').value=r.id;
    $('#rName').value=r.name||'';
    $('#rAvatar').value=r.avatar||'';
    $('#rGreeting').value=r.greeting||'';
    $('#rPrompt').value=r.prompt||'';
    $('#rAvatarImg').value=r.avatarImg||'';
    $('#rAvatarFile').value='';
    setRolePreview(r.avatarImg||'', r.avatar||'无图');
    const t = document.querySelector('.tab[data-page="roles"]');
    switchTab('roles', t);
  }

  function pickRole(id){
    activeRoleId=id;
    save('nx_active_role',activeRoleId);
    refreshHeader(); renderRoles(); renderChat();
    toast('已切换角色');
  }

  function deleteRole(){
    const id=$('#rId').value||activeRoleId;
    if(!id){toast('没有可删除角色');return;}
    const r=roles.find(x=>x.id===id); if(!r){toast('角色不存在');return;}
    if(!confirm(`删除角色「${r.name}」？`)) return;

    roles=roles.filter(x=>x.id!==id);
    delete HMap[id];
    if(activeRoleId===id) activeRoleId=roles[0]?.id||'';

    save('nx_roles',roles); save('nx_active_role',activeRoleId); save('nx_hmap',HMap);
    resetRoleForm(); renderRoles(); refreshHeader(); renderChat(); toast('已删除');
  }

  function setMePreview(img){
    const el=$('#mePreview');
    el.innerHTML = img ? `<img src="${img}" alt="">` : '我';
  }

  async function onMeAvatarPick(e){
    const f=e.target.files?.[0];
    if(!f) return;
    if(f.size > 2*1024*1024){toast('图片请小于2MB');e.target.value='';return;}
    try{
      const data=await fileToDataURL(f);
      C.selfAvatarImg=data;
      $('#meAvatarImg').value=data;
      setMePreview(data);
      save('nx_cfg',C);
      renderChat();
    }catch{toast('读取图片失败')}
  }

  function clearMeAvatar(){
    C.selfAvatarImg='';
    $('#meAvatarImg').value='';
    $('#meAvatarFile').value='';
    setMePreview('');
    save('nx_cfg',C);
    renderChat();
  }

  function fillCfgForm(){
    $('#cUrl').value=C.url||'';
    $('#cKey').value=C.key||'';
    $('#cTemp').value=C.temp??0.8;
    $('#cMax').value=C.max??800;
    $('#meAvatarImg').value=C.selfAvatarImg||'';
    setMePreview(C.selfAvatarImg||'');

    $('#lockEnabled').checked = !!C.lockEnabled;
    $('#lockPin').value = C.lockPin || '';

    const sel=$('#cModel');
    if(C.model){
      if(![...sel.options].some(o=>o.value===C.model)){
        const o=document.createElement('option');o.value=C.model;o.textContent=C.model;sel.appendChild(o);
      }
      sel.value=C.model;
    }
  }

  function saveCfg(){
    C.url=normBaseUrl($('#cUrl').value);
    C.key=$('#cKey').value.trim();
    C.model=$('#cModel').value;
    C.temp=parseFloat($('#cTemp').value)||0.8;
    C.max=parseInt($('#cMax').value)||800;
    C.selfAvatarImg=$('#meAvatarImg').value||C.selfAvatarImg||'';
    save('nx_cfg',C);
    setStatus();
    toast('配置已保存');
    renderChat();
  }

  function toggleLockEnabled(v){
    C.lockEnabled = !!v;
  }

  function saveLock(){
    const pin = $('#lockPin').value.trim();
    if(C.lockEnabled){
      if(!/^\d{4,8}$/.test(pin)){toast('PIN需4~8位数字');return;}
      C.lockPin = pin;
    }else{
      C.lockPin = pin && /^\d{4,8}$/.test(pin) ? pin : '';
    }
    save('nx_cfg', C);
    toast('锁屏设置已保存');
  }

  function lockNow(){
    if(!C.lockEnabled){toast('先启用锁屏');return;}
    if(!/^\d{4,8}$/.test(C.lockPin||'')){toast('先保存有效PIN');return;}
    $('#unlockPin').value='';
    $('#lockMask').classList.add('show');
  }

  function unlock(){
    const val = $('#unlockPin').value.trim();
    if(val === (C.lockPin||'')){
      $('#lockMask').classList.remove('show');
      $('#unlockPin').value='';
      toast('已解锁');
    }else{
      toast('PIN错误');
    }
  }

  async function fetchModels(){
    const url=normBaseUrl($('#cUrl').value);
    const key=$('#cKey').value.trim();
    if(!url){toast('先填反代地址');return;}
    const btn=$('#fetchBtn');btn.disabled=true;btn.textContent='拉取中…';
    try{
      const headers={'Content-Type':'application/json'};
      if(key) headers['Authorization']='Bearer '+key;
      const r=await fetch(apiUrl(url,'/models'),{headers});
      if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
      const j=await r.json();

      let list=[];
      if(Array.isArray(j?.data)) list=j.data.map(x=>x.id).filter(Boolean);
      else if(Array.isArray(j)) list=j.map(x=>typeof x==='string'?x:x?.id).filter(Boolean);
      list=[...new Set(list)].sort();
      if(!list.length) throw new Error('没拿到模型');

      const sel=$('#cModel');
      sel.innerHTML='';
      list.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
      if(C.model && list.includes(C.model)) sel.value=C.model;
      toast(`模型 ${list.length} 个`);
    }catch(e){
      toast('拉取失败: '+String(e.message||e).slice(0,120));
    }finally{
      btn.disabled=false;btn.textContent='拉取模型';
    }
  }

  async function testOnce(){
    const tUrl=normBaseUrl($('#cUrl').value);
    const tKey=$('#cKey').value.trim();
    const tModel=$('#cModel').value;
    if(!tUrl||!tKey||!tModel){toast('URL/Key/模型没填全');return;}
    try{
      const headers={'Content-Type':'application/json','Authorization':'Bearer '+tKey};
      const body={model:tModel,messages:[{role:'user',content:'回1'}],temperature:0,max_tokens:5,stream:false};
      const r=await fetch(apiUrl(tUrl,'/chat/completions'),{method:'POST',headers,body:JSON.stringify(body)});
      if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
      toast('连接正常');
    }catch(e){
      toast('测试失败: '+String(e.message||e).slice(0,120));
    }
  }

  function clearCurrentChat(){
    if(!activeRoleId){toast('先选角色');return;}
    if(!confirm('清空当前角色聊天记录？')) return;
    HMap[activeRoleId]=[];
    save('nx_hmap',HMap);
    renderChat();
    toast('已清空');
  }

  function clearAllLocal(){
    if(!confirm('清空全部本地数据？不可恢复。')) return;
    localStorage.removeItem('nx_cfg');
    localStorage.removeItem('nx_roles');
    localStorage.removeItem('nx_active_role');
    localStorage.removeItem('nx_hmap');
    location.reload();
  }

  async function send(){
    if($('#lockMask').classList.contains('show')) return;

    const inp=$('#inp');
    const text=inp.value.trim();
    if(!text||streaming) return;

    const role=currentRole();
    if(!role){toast('先创建并选择角色');return;}
    if(!C.url||!C.key||!C.model){toast('先配置URL/Key/模型');return;}

    inp.value=''; inp.style.height='auto';
    const H=currentHistory();
    const t=now();
    H.push({role:'user',content:text,time:t});
    save('nx_hmap',HMap);
    renderChat();

    streaming=true;
    $('#sendBtn').disabled=true;
    $('#status').textContent='正在输入…';
    addTyping();

    const headers={'Content-Type':'application/json','Authorization':'Bearer '+C.key};
    const M=H.map(x=>({role:x.role==='assistant'?'assistant':'user',content:x.content}));
    const systemMsgs=role.prompt?[{role:'system',content:role.prompt}]:[];
    const payload={model:C.model,messages:[...systemMsgs,...M.slice(-40)],temperature:C.temp,max_tokens:C.max};

    try{
      let r=await fetch(apiUrl(C.url,'/chat/completions'),{
        method:'POST',headers,body:JSON.stringify({...payload,stream:true})
      });

      if(!r.ok){
        r=await fetch(apiUrl(C.url,'/chat/completions'),{
          method:'POST',headers,body:JSON.stringify({...payload,stream:false})
        });
        if(!r.ok) throw new Error(`${r.status}: ${(await r.text()).slice(0,200)}`);
        const j=await r.json();
        const out=j?.choices?.[0]?.message?.content?.trim()||'……';
        H.push({role:'assistant',content:out,time:now()});
        save('nx_hmap',HMap);
        removeTyping();
        renderChat();
      }else{
        removeTyping();
        const at=now();
        const holderLine=document.createElement('div');
        holderLine.className='line';
        holderLine.innerHTML=`<div class="msgAv">${avatarHTML(role.avatarImg,role.avatar||'AI')}</div><div class="msg ai"><div class="md"><span class="cur">▊</span></div><div class="tm">${at}</div></div>`;
        chat.appendChild(holderLine);
        chat.scrollTop=chat.scrollHeight;

        const holder=holderLine.querySelector('.msg .md');
        let full='',buf='';
        const reader=r.body.getReader();
        const dec=new TextDecoder();

        while(true){
          const {done,value}=await reader.read();
          if(done) break;
          buf += dec.decode(value,{stream:true});
          const lines=buf.split('\n');
          buf=lines.pop();
          for(const line of lines){
            const s=line.trim();
            if(!s.startsWith('data:')) continue;
            const data=s.slice(5).trim();
            if(data==='[DONE]') continue;
            try{
              const j=JSON.parse(data);
              const delta=j?.choices?.[0]?.delta?.content;
              if(delta){
                full += delta;
                holder.innerHTML=markdownToHtml(full)+`<span class="cur">▊</span>`;
                chat.scrollTop=chat.scrollHeight;
              }
            }catch{}
          }
        }

        if(!full) full='……';
        holder.innerHTML=markdownToHtml(full);
        H.push({role:'assistant',content:full,time:at});
        save('nx_hmap',HMap);
      }
    }catch(e){
      removeTyping();
      H.push({role:'assistant',content:'[请求失败] '+String(e.message||e).slice(0,220),time:now()});
      save('nx_hmap',HMap);
      renderChat();
    }finally{
      streaming=false;
      $('#sendBtn').disabled=false;
      setStatus();
    }
  }

  function initDefaultRoleIfEmpty(){
    if(roles.length) return;
    const id=uid();
    roles=[{
      id,name:'默认助手',avatar:'AI',avatarImg:'',
      greeting:'你好，先去角色页改你的人设。',prompt:''
    }];
    activeRoleId=id;
    save('nx_roles',roles); save('nx_active_role',activeRoleId);
  }

  function init(){
    C=load('nx_cfg',C);
    roles=load('nx_roles',[]);
    activeRoleId=load('nx_active_role','');
    HMap=load('nx_hmap',{});

    if(typeof C.selfAvatarImg!=='string') C.selfAvatarImg='';
    if(typeof C.lockEnabled!=='boolean') C.lockEnabled=false;
    if(typeof C.lockPin!=='string') C.lockPin='';

    initDefaultRoleIfEmpty();
    if(!activeRoleId && roles[0]) activeRoleId=roles[0].id;
    if(typeof HMap!=='object'||!HMap) HMap={};

    fillCfgForm();
    renderRoles();
    refreshHeader();
    setStatus();
    renderChat();

    if(C.lockEnabled && /^\d{4,8}$/.test(C.lockPin||'')){
      $('#lockMask').classList.add('show');
    }
  }

  init();
</script>
</body>
