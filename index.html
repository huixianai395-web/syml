
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Noctis</title>
  <style>
    :root{
      --bg:#0b1020; --bg2:#131a2a; --bg3:#1a2338; --bd:#2a3550;
      --tx:#e6ddcf; --tx2:#95a0b8; --tx3:#68728a;
      --ac1:#b8946f; --ac2:#d6b284; --ok:#62b37f; --err:#c96a85;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{
      display:flex;flex-direction:column;background:var(--bg);color:var(--tx);
      font-family:-apple-system,BlinkMacSystemFont,PingFang SC,Microsoft YaHei,sans-serif;
    }
    .hd{
      display:flex;justify-content:space-between;align-items:center;
      padding:12px 14px;background:var(--bg2);border-bottom:1px solid var(--bd);
    }
    .hdL{display:flex;gap:10px;align-items:center;min-width:0}
    .av{
      width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#101319;font-weight:800;
      flex-shrink:0;
    }
    .nm{font-size:15px;font-weight:700}
    .sub{font-size:11px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
    .st{font-size:11px;color:var(--ok)}
    .st.off{color:var(--tx3)}
    .main{flex:1;overflow:hidden;position:relative}
    .page{height:100%;overflow:auto;display:none}
    .page.active{display:block}

    /* chat */
    .chatWrap{height:100%;display:flex;flex-direction:column}
    .chat{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .welcome{
      margin:auto;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;
      padding:14px 12px;color:var(--tx2);font-size:13px;line-height:1.7;max-width:92%;
    }
    .msg{max-width:84%;padding:10px 12px;border-radius:14px;font-size:14px;line-height:1.6;word-break:break-word}
    .ai{align-self:flex-start;background:var(--bg3);border:1px solid var(--bd);border-bottom-left-radius:4px}
    .me{align-self:flex-end;background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;border-bottom-right-radius:4px}
    .tm{font-size:10px;opacity:.55;margin-top:4px}
    .inputBar{
      display:flex;gap:8px;align-items:flex-end;padding:10px;background:var(--bg2);border-top:1px solid var(--bd)
    }
    #inp{
      flex:1;resize:none;max-height:120px;min-height:40px;border:1px solid var(--bd);
      border-radius:20px;background:var(--bg3);color:var(--tx);padding:10px 14px;font-size:14px;outline:none
    }
    #sendBtn{
      width:40px;height:40px;border:none;border-radius:50%;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700
    }
    #sendBtn:disabled{opacity:.35}
    .typ{align-self:flex-start;background:var(--bg3);border:1px solid var(--bd);border-radius:14px;padding:10px 12px}
    .typ i{display:inline-block;width:5px;height:5px;margin-right:4px;background:var(--tx2);border-radius:50%;animation:b 1.1s infinite}
    .typ i:nth-child(2){animation-delay:.2s}.typ i:nth-child(3){animation-delay:.4s}
    @keyframes b{0%,100%{opacity:.35;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}
    .cur{display:inline-block;animation:blink .8s step-end infinite}
    @keyframes blink{50%{opacity:0}}

    /* card/form */
    .wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
    .card{
      background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:12px;
    }
    .ct{font-size:14px;font-weight:700;margin-bottom:10px}
    .f{margin-bottom:10px}
    .fl{font-size:11px;color:var(--tx2);margin-bottom:5px}
    .fi,.fs,.ta{
      width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;color:var(--tx);
      padding:10px 12px;font-size:13px;outline:none;
    }
    .ta{min-height:90px;resize:vertical;line-height:1.6}
    .row{display:flex;gap:8px}
    .row .f{flex:1}
    .btn{
      padding:10px 12px;border:none;border-radius:10px;font-size:13px;font-weight:700;
      color:#111;background:linear-gradient(135deg,var(--ac1),var(--ac2));
    }
    .btn2{
      padding:10px 12px;border:1px solid var(--bd);border-radius:10px;font-size:13px;
      color:var(--tx);background:var(--bg3);font-weight:600;
    }
    .btnDanger{border:1px solid #653243;color:#f1b1c2;background:transparent}
    .note{font-size:11px;color:var(--tx3)}
    .list{display:flex;flex-direction:column;gap:8px}
    .roleItem{
      border:1px solid var(--bd);border-radius:12px;background:var(--bg3);padding:10px;
      display:flex;justify-content:space-between;align-items:center;gap:8px;
    }
    .roleItem.active{border-color:var(--ac2);box-shadow:0 0 0 1px rgba(214,178,132,.25) inset}
    .roleL{display:flex;gap:8px;align-items:center;min-width:0}
    .rAv{
      width:28px;height:28px;border-radius:50%;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--ac1),var(--ac2));color:#111;font-weight:700;flex-shrink:0;
    }
    .rName{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rSub{font-size:11px;color:var(--tx2)}
    .mini{font-size:11px;color:var(--tx3)}

    .tabs{
      display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 10px;
      border-top:1px solid var(--bd);background:var(--bg2);
    }
    .tab{
      border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);border-radius:10px;
      padding:9px 6px;font-size:12px;font-weight:700;
    }
    .tab.active{
      color:#111;border-color:transparent;background:linear-gradient(135deg,var(--ac1),var(--ac2));
    }

    .toast{
      position:fixed;top:58px;left:50%;transform:translateX(-50%);
      background:#222d44;border:1px solid var(--bd);padding:7px 14px;border-radius:16px;
      font-size:12px;z-index:99
    }
  </style>
</head>
<body>
  <div class="hd">
    <div class="hdL">
      <div class="av" id="topAv">N</div>
      <div style="min-width:0">
        <div class="nm">Noctis</div>
        <div class="sub" id="topRole">当前角色：未选择</div>
      </div>
    </div>
    <div id="status" class="st off">未配置</div>
  </div>

  <div class="main">
    <!-- Chat -->
    <section id="page-chat" class="page active">
      <div class="chatWrap">
        <div id="chat" class="chat"></div>
        <div class="inputBar">
          <textarea id="inp" rows="1" placeholder="说点什么……" oninput="autoGrow(this)" onkeydown="hotKey(event)"></textarea>
          <button id="sendBtn" onclick="send()">↑</button>
        </div>
      </div>
    </section>

    <!-- Roles -->
    <section id="page-roles" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">角色列表</div>
          <div id="roleList" class="list"></div>
          <div class="mini" style="margin-top:8px">切换角色会切换对应聊天记录。</div>
        </div>

        <div class="card">
          <div class="ct">新建 / 编辑角色</div>
          <input type="hidden" id="rId" />
          <div class="row">
            <div class="f">
              <div class="fl">角色名</div>
              <input id="rName" class="fi" placeholder="例如：冷淡男友 / 温柔姐姐" />
            </div>
            <div class="f">
              <div class="fl">头像字</div>
              <input id="rAvatar" class="fi" maxlength="2" placeholder="AI" />
            </div>
          </div>
          <div class="f">
            <div class="fl">开场白</div>
            <input id="rGreeting" class="fi" placeholder="第一次进入该角色时显示" />
          </div>
          <div class="f">
            <div class="fl">System Prompt</div>
            <textarea id="rPrompt" class="ta" placeholder="留空则无默认人设"></textarea>
          </div>
          <div class="row">
            <button class="btn" onclick="saveRole()">保存角色</button>
            <button class="btn2" onclick="resetRoleForm()">清空表单</button>
            <button class="btn2 btnDanger" onclick="deleteRole()">删除当前</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Settings -->
    <section id="page-settings" class="page">
      <div class="wrap">
        <div class="card">
          <div class="ct">API 设置</div>
          <div class="f">
            <div class="fl">反代地址（不用带 /v1）</div>
            <input id="cUrl" class="fi" placeholder="https://api520.pro" />
          </div>
          <div class="f">
            <div class="fl">API 密钥</div>
            <input id="cKey" class="fi" type="password" placeholder="sk-xxxx" />
          </div>
          <div class="row">
            <div class="f" style="flex:2">
              <div class="fl">模型</div>
              <select id="cModel" class="fs"><option value="">先拉取模型</option></select>
            </div>
            <div class="f" style="flex:0 0 auto;align-self:flex-end">
              <button id="fetchBtn" class="btn2" style="width:auto;padding:10px 14px" onclick="fetchModels()">拉取模型</button>
            </div>
          </div>
          <div class="row">
            <div class="f">
              <div class="fl">Temperature</div>
              <input id="cTemp" class="fi" type="number" min="0" max="2" step="0.1" value="0.8" />
            </div>
            <div class="f">
              <div class="fl">最大回复长度</div>
              <input id="cMax" class="fi" type="number" min="50" max="8192" step="50" value="800" />
            </div>
          </div>
          <div class="row">
            <button class="btn" onclick="saveCfg()">保存配置</button>
            <button class="btn2" onclick="testOnce()">测试连接</button>
          </div>
          <div class="note" style="margin-top:8px">
            聊天记录只存在你设备浏览器 localStorage，不上传到本网站服务器。
          </div>
        </div>

        <div class="card">
          <div class="ct">数据管理</div>
          <div class="row">
            <button class="btn2" onclick="clearCurrentChat()">清空当前角色聊天</button>
            <button class="btn2 btnDanger" onclick="clearAllLocal()">清空全部本地数据</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="tabs">
    <button class="tab active" data-page="chat" onclick="switchTab('chat',this)">聊天</button>
    <button class="tab" data-page="roles" onclick="switchTab('roles',this)">角色</button>
    <button class="tab" data-page="settings" onclick="switchTab('settings',this)">设置</button>
  </div>

<script>
  // ===== State =====
  let C = {url:'',key:'',model:'',temp:0.8,max:800};
  let roles = []; // [{id,name,avatar,prompt,greeting}]
  let activeRoleId = '';
  let HMap = {}; // roleId -> [{role,content,time}]
  let streaming = false;

  const $ = s => document.querySelector(s);
  const chat = $('#chat');

  // ===== Utils =====
  function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
  function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
  function now(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
  function esc(s=''){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function normBaseUrl(u=''){return u.trim().replace(/\/+$/,'').replace(/\/v1$/,'')}
  function apiUrl(base,path){return normBaseUrl(base) + '/v1' + path}
  function uid(){return 'r_'+Math.random().toString(36).slice(2,10)}
  function toast(msg){
    const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);
    setTimeout(()=>t.remove(),2200);
  }
  function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
  function hotKey(e){if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();send()}}

  function currentRole(){
    return roles.find(r=>r.id===activeRoleId) || null;
  }
  function currentHistory(){
    if(!activeRoleId) return [];
    if(!Array.isArray(HMap[activeRoleId])) HMap[activeRoleId]=[];
    return HMap[activeRoleId];
  }

  // ===== Tabs =====
  function switchTab(name,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    $('#page-'+name).classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  }

  // ===== Header =====
  function refreshHeader(){
    const r = currentRole();
    $('#topRole').textContent = '当前角色：' + (r ? r.name : '未选择');
    $('#topAv').textContent = (r?.avatar || 'N').slice(0,2);
  }
  function setStatus(){
    const s = $('#status');
    if(C.url && C.key && C.model){s.textContent='在线';s.className='st'}
    else {s.textContent='未配置';s.className='st off'}
  }

  // ===== Chat Render =====
  function renderChat(){
    const r = currentRole();
    const H = currentHistory();

    if(!r){
      chat.innerHTML = `
      <div class="welcome">
        <b>欢迎使用 Noctis</b><br>
        先去「角色」页创建一个角色，再去「设置」页填 API。<br>
        完成后回来聊天。
      </div>`;
      return;
    }

    if(!H.length){
      chat.innerHTML = `
      <div class="welcome">
        <b>${esc(r.name)}</b> 已就位。<br>
        ${r.greeting ? esc(r.greeting) : '你可以开始聊天了。'}<br><br>
        提示：该角色的 System Prompt 在「角色」页可改。
      </div>`;
      return;
    }

    chat.innerHTML = H.map(m=>`
      <div class="msg ${m.role==='user'?'me':'ai'}">
        ${esc(m.content).replace(/\n/g,'<br>')}
        <div class="tm">${m.time||''}</div>
      </div>
    `).join('');
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping(){
    const d=document.createElement('div');
    d.className='typ'; d.id='typing'; d.innerHTML='<i></i><i></i><i></i>';
    chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
  }
  function removeTyping(){ const t=$('#typing'); if(t) t.remove(); }

  // ===== Roles =====
  function renderRoles(){
    const list = $('#roleList');
    if(!roles.length){
      list.innerHTML = `<div class="mini">还没有角色，先在下面创建一个。</div>`;
      return;
    }
    list.innerHTML = roles.map(r=>`
      <div class="roleItem ${r.id===activeRoleId?'active':''}">
        <div class="roleL">
          <div class="rAv">${esc((r.avatar||'AI').slice(0,2))}</div>
          <div style="min-width:0">
            <div class="rName">${esc(r.name||'未命名')}</div>
            <div class="rSub">${r.prompt ? '已设置人设' : '无默认人设'}</div>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn2" onclick="pickRole('${r.id}')">使用</button>
          <button class="btn2" onclick="editRole('${r.id}')">编辑</button>
        </div>
      </div>
    `).join('');
  }

  function resetRoleForm(){
    $('#rId').value='';
    $('#rName').value='';
    $('#rAvatar').value='';
    $('#rGreeting').value='';
    $('#rPrompt').value='';
  }

  function saveRole(){
    const id = $('#rId').value || uid();
    const name = $('#rName').value.trim();
    const avatar = ($('#rAvatar').value.trim() || 'AI').slice(0,2);
    const greeting = $('#rGreeting').value.trim();
    const prompt = $('#rPrompt').value.trim();

    if(!name){toast('角色名不能为空');return;}

    const idx = roles.findIndex(x=>x.id===id);
    const obj = {id,name,avatar,prompt,greeting};

    if(idx>=0) roles[idx]=obj;
    else roles.unshift(obj);

    if(!activeRoleId) activeRoleId=id;
    save('nx_roles', roles);
    save('nx_active_role', activeRoleId);

    renderRoles();
    refreshHeader();
    renderChat();
    toast('角色已保存');
  }

  function editRole(id){
    const r = roles.find(x=>x.id===id);
    if(!r) return;
    $('#rId').value=r.id;
    $('#rName').value=r.name||'';
    $('#rAvatar').value=r.avatar||'';
    $('#rGreeting').value=r.greeting||'';
    $('#rPrompt').value=r.prompt||'';
    switchTab('roles', document.querySelector('.tab[data-page="roles"]'));
  }

  function pickRole(id){
    activeRoleId=id;
    save('nx_active_role', activeRoleId);
    refreshHeader();
    renderRoles();
    renderChat();
    toast('已切换角色');
  }

  function deleteRole(){
    const id = $('#rId').value || activeRoleId;
    if(!id){toast('没有可删除角色');return;}
    const r = roles.find(x=>x.id===id);
    if(!r){toast('角色不存在');return;}
    if(!confirm(`删除角色「${r.name}」？`)) return;

    roles = roles.filter(x=>x.id!==id);
    delete HMap[id];

    if(activeRoleId===id) activeRoleId = roles[0]?.id || '';
    save('nx_roles', roles);
    save('nx_active_role', activeRoleId);
    save('nx_hmap', HMap);

    resetRoleForm();
    renderRoles();
    refreshHeader();
    renderChat();
    toast('已删除');
  }

  // ===== Settings =====
  function fillCfgForm(){
    $('#cUrl').value = C.url||'';
    $('#cKey').value = C.key||'';
    $('#cTemp').value = C.temp ?? 0.8;
    $('#cMax').value = C.max ?? 800;
    const sel = $('#cModel');
    if(C.model){
      if(![...sel.options].some(o=>o.value===C.model)){
        const o=document.createElement('option');o.value=C.model;o.textContent=C.model;sel.appendChild(o);
      }
      sel.value=C.model;
    }
  }

  function saveCfg(){
    C.url = normBaseUrl($('#cUrl').value);
    C.key = $('#cKey').value.trim();
    C.model = $('#cModel').value;
    C.temp = parseFloat($('#cTemp').value)||0.8;
    C.max = parseInt($('#cMax').value)||800;
    save('nx_cfg', C);
    setStatus();
    toast('配置已保存');
  }

  async function fetchModels(){
    const url = normBaseUrl($('#cUrl').value);
    const key = $('#cKey').value.trim();
    if(!url){toast('先填反代地址');return;}
    const btn = $('#fetchBtn'); btn.disabled=true; btn.textContent='拉取中…';
    try{
      const headers = {'Content-Type':'application/json'};
      if(key) headers['Authorization'] = 'Bearer ' + key;
      const r = await fetch(apiUrl(url,'/models'), {headers});
      if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
      const j = await r.json();
      let list = [];
      if(Array.isArray(j?.data)) list = j.data.map(x=>x.id).filter(Boolean);
      else if(Array.isArray(j)) list = j.map(x=>typeof x==='string'?x:x?.id).filter(Boolean);
      list = [...new Set(list)].sort();
      if(!list.length) throw new Error('没拿到模型');
      const sel = $('#cModel');
      sel.innerHTML = '';
      list.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o)});
      if(C.model && list.includes(C.model)) sel.value = C.model;
      toast(`模型 ${list.length} 个`);
    }catch(e){
      toast('拉取失败: ' + String(e.message||e).slice(0,120));
    }finally{
      btn.disabled=false; btn.textContent='拉取模型';
    }
  }

  async function testOnce(){
    const tUrl = normBaseUrl($('#cUrl').value);
    const tKey = $('#cKey').value.trim();
    const tModel = $('#cModel').value;
    if(!tUrl||!tKey||!tModel){toast('URL/Key/模型没填全');return;}
    try{
      const headers={'Content-Type':'application/json','Authorization':'Bearer '+tKey};
      const body={model:tModel,messages:[{role:'user',content:'回1'}],temperature:0,max_tokens:5,stream:false};
      const r=await fetch(apiUrl(tUrl,'/chat/completions'),{method:'POST',headers,body:JSON.stringify(body)});
      if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
      toast('连接正常');
    }catch(e){
      toast('测试失败: '+String(e.message||e).slice(0,120));
    }
  }

  function clearCurrentChat(){
    if(!activeRoleId){toast('先选角色');return;}
    if(!confirm('清空当前角色聊天记录？')) return;
    HMap[activeRoleId] = [];
    save('nx_hmap', HMap);
    renderChat();
    toast('已清空');
  }

  function clearAllLocal(){
    if(!confirm('清空全部本地数据？不可恢复。')) return;
    localStorage.removeItem('nx_cfg');
    localStorage.removeItem('nx_roles');
    localStorage.removeItem('nx_active_role');
    localStorage.removeItem('nx_hmap');
    location.reload();
  }

  // ===== Send =====
  async function send(){
    const inp = $('#inp');
    const text = inp.value.trim();
    if(!text || streaming) return;

    const role = currentRole();
    if(!role){toast('先创建并选择角色');return;}
    if(!C.url || !C.key || !C.model){toast('先配置URL/Key/模型');return;}

    inp.value=''; inp.style.height='auto';

    const H = currentHistory();
    const t=now();
    H.push({role:'user',content:text,time:t});
    save('nx_hmap', HMap);
    renderChat();

    streaming = true;
    $('#sendBtn').disabled = true;
    $('#status').textContent='正在输入…';
    addTyping();

    const headers={'Content-Type':'application/json','Authorization':'Bearer '+C.key};

    const M = H.map(x=>({role:x.role==='assistant'?'assistant':'user',content:x.content}));
    const systemMsgs = role.prompt ? [{role:'system',content:role.prompt}] : [];
    const payload = {
      model:C.model,
      messages:[...systemMsgs, ...M.slice(-40)],
      temperature:C.temp,
      max_tokens:C.max
    };

    try{
      let r = await fetch(apiUrl(C.url,'/chat/completions'),{
        method:'POST',headers,body:JSON.stringify({...payload, stream:true})
      });

      if(!r.ok){
        r = await fetch(apiUrl(C.url,'/chat/completions'),{
          method:'POST',headers,body:JSON.stringify({...payload, stream:false})
        });
        if(!r.ok) throw new Error(`${r.status}: ${(await r.text()).slice(0,200)}`);

        const j = await r.json();
        const out = j?.choices?.[0]?.message?.content?.trim() || '……';
        const at=now();
        H.push({role:'assistant',content:out,time:at});
        save('nx_hmap', HMap);
        removeTyping();
        renderChat();
      }else{
        removeTyping();
        const at=now();
        const holder=document.createElement('div');
        holder.className='msg ai';
        holder.innerHTML='<span class="cur">▊</span><div class="tm">'+at+'</div>';
        chat.appendChild(holder); chat.scrollTop=chat.scrollHeight;

        let full='',buf='';
        const reader=r.body.getReader();
        const dec=new TextDecoder();

        while(true){
          const {done,value}=await reader.read();
          if(done) break;
          buf += dec.decode(value,{stream:true});
          const lines = buf.split('\n');
          buf = lines.pop();
          for(const line of lines){
            const s=line.trim();
            if(!s.startsWith('data:')) continue;
            const data=s.slice(5).trim();
            if(data==='[DONE]') continue;
            try{
              const j=JSON.parse(data);
              const delta=j?.choices?.[0]?.delta?.content;
              if(delta){
                full += delta;
                holder.innerHTML = esc(full).replace(/\n/g,'<br>') + '<span class="cur">▊</span><div class="tm">'+at+'</div>';
                chat.scrollTop=chat.scrollHeight;
              }
            }catch{}
          }
        }

        if(!full) full='……';
        holder.innerHTML = esc(full).replace(/\n/g,'<br>') + '<div class="tm">'+at+'</div>';
        H.push({role:'assistant',content:full,time:at});
        save('nx_hmap', HMap);
      }
    }catch(e){
      removeTyping();
      const et=now();
      const err='[请求失败] '+String(e.message||e).slice(0,220);
      H.push({role:'assistant',content:err,time:et});
      save('nx_hmap', HMap);
      renderChat();
    }finally{
      streaming=false;
      $('#sendBtn').disabled=false;
      setStatus();
    }
  }

  // ===== Init =====
  function initDefaultRoleIfEmpty(){
    if(roles.length) return;
    const id = uid();
    roles = [{
      id,
      name:'默认助手',
      avatar:'AI',
      greeting:'你好，先在「角色」页改成你喜欢的人设。',
      prompt:''
    }];
    activeRoleId = id;
    save('nx_roles', roles);
    save('nx_active_role', activeRoleId);
  }

  function init(){
    C = load('nx_cfg', C);
    roles = load('nx_roles', []);
    activeRoleId = load('nx_active_role', '');
    HMap = load('nx_hmap', {});

    initDefaultRoleIfEmpty();

    if(!activeRoleId && roles[0]) activeRoleId = roles[0].id;
    if(typeof HMap !== 'object' || !HMap) HMap = {};

    fillCfgForm();
    renderRoles();
    refreshHeader();
    setStatus();
    renderChat();
  }

  init();
</script>
